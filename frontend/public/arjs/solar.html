<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>NUScape-AR · Solar</title>
  <link rel="preconnect" href="https://aframe.io">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100dvh; font-family: -apple-system, sans-serif; }
    #back-btn {
      position: fixed; top: 16px; left: 16px; z-index: 1000;
      background: rgba(0,0,0,0.55); color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 9px 14px; font-size: 11px; letter-spacing: 0.1em;
      cursor: pointer; border-radius: 4px; text-decoration: none;
      display: block; width: 100px; text-align: center;
    }
    #calib-panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(10,10,14,0.92); backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255,255,255,0.12);
      padding: 12px 16px 20px; color: #fff;
      transition: transform 0.3s ease;
    }
    #calib-panel.hidden { transform: translateY(100%); }
    #calib-toggle {
      position: fixed; bottom: 16px; right: 16px; z-index: 1001;
      background: #107b7f; color: #fff; border: none;
      padding: 10px 16px; font-size: 11px; font-weight: 700;
      letter-spacing: 0.08em; border-radius: 6px; cursor: pointer;
    }
    #calib-panel:not(.hidden) ~ #calib-toggle { display: none; }
    .calib-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .calib-title { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #107b7f; }
    .calib-close { background: none; border: none; color: rgba(255,255,255,0.5); font-size: 18px; cursor: pointer; padding: 0 4px; }
    .section-lbl { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 6px; }
    .btn-row { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
    .toggle-btn {
      padding: 5px 8px; font-size: 9px; font-weight: 700; letter-spacing: 0.06em;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.35); border-radius: 3px; cursor: pointer;
    }
    .toggle-btn.on { background: rgba(16,123,127,0.2); color: #4fc3c8; border-color: rgba(16,123,127,0.5); }
    .bld-btn {
      padding: 5px 8px; font-size: 9px; font-weight: 700; letter-spacing: 0.06em;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.45); border-radius: 3px; cursor: pointer;
    }
    .bld-btn.active { background: rgba(16,123,127,0.3); color: #fff; border-color: #107b7f; }
    .calib-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; margin-bottom: 10px; }
    .calib-row { display: flex; flex-direction: column; gap: 3px; }
    .calib-lbl { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.5); display: flex; justify-content: space-between; }
    .calib-lbl span { color: #fff; font-weight: 600; }
    .calib-row input[type=range] { width: 100%; accent-color: #107b7f; height: 3px; }
    #calib-values {
      font-size: 9px; font-family: monospace; color: #107b7f;
      background: rgba(16,123,127,0.1); border: 1px solid rgba(16,123,127,0.3);
      border-radius: 4px; padding: 8px 10px; margin-bottom: 8px;
      white-space: pre; line-height: 1.6;
    }
    #copy-btn {
      width: 100%; padding: 8px; background: #107b7f; border: none; color: #fff;
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em; border-radius: 4px;
      cursor: pointer; text-transform: uppercase;
    }
    #copy-btn.copied { background: #2e7d32; }
  </style>
</head>
<body>
  <a href="/arjs" id="back-btn">← BACK</a>
  <button id="calib-toggle" onclick="document.getElementById('calib-panel').classList.remove('hidden')">⚙ CALIBRATE</button>

  <div id="calib-panel">
    <div class="calib-header">
      <span class="calib-title">Solar Mat Calibration</span>
      <button class="calib-close" onclick="document.getElementById('calib-panel').classList.add('hidden')">✕</button>
    </div>

    <div class="section-lbl">Show buildings</div>
    <div class="btn-row" id="toggle-row"></div>

    <div class="section-lbl">Calibrate</div>
    <div class="btn-row" id="calib-row"></div>

    <div class="calib-grid">
      <div class="calib-row">
        <label class="calib-lbl">X offset <span id="vx">0.00</span></label>
        <input type="range" id="sx" min="-15" max="15" step="0.1" value="0">
      </div>
      <div class="calib-row">
        <label class="calib-lbl">Z offset <span id="vz">0.00</span></label>
        <input type="range" id="sz" min="-15" max="15" step="0.1" value="0">
      </div>
      <div class="calib-row">
        <label class="calib-lbl">Rotate Y <span id="vry">0deg</span></label>
        <input type="range" id="sry" min="-180" max="180" step="1" value="0">
      </div>
      <div class="calib-row">
        <label class="calib-lbl">Scale <span id="vs">3.00</span></label>
        <input type="range" id="ss" min="0.5" max="30" step="0.5" value="3">
      </div>
      <div class="calib-row">
        <label class="calib-lbl">Y (height) <span id="vy">0.01</span></label>
        <input type="range" id="sy" min="-5" max="5" step="0.01" value="0.01">
      </div>
    </div>
    <div id="calib-values"></div>
    <button id="copy-btn" onclick="copyValues()">Copy Values</button>
  </div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: color_and_matrix; matrixCodeType: 4x4_BCH_13_5_5; maxDetectionRate: 60; sourceWidth: 1440; sourceHeight: 1080; canvasWidth: 1440; canvasHeight: 1080;"
    vr-mode-ui="enabled: false"
    renderer="colorManagement: true;"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets id="ar-assets"></a-assets>
    <a-entity camera></a-entity>
  </a-scene>

  <script>
    // name, marker value, default calibration
    var BLDS = [
      { name: 'CELC', val: 0,  x:  0.30, z:  0.50, y: 0.01, ry:   0, s:  6.50 },
      { name: 'E1A',  val: 2,  x: -0.10, z:  2.50, ry:  -1, s:  8.00 },
      { name: 'E2A',  val: 4,  x: -0.30, z:  0.50, ry:   1, s:  4.50 },
      { name: 'E4',   val: 7,  x:  6.20, z: -1.30, ry: 180, s: 19.00 },
      { name: 'E5',   val: 9,  x:  1.50, z: -0.30, ry: 124, s:  9.50 },
      { name: 'E8',   val: 11, x: -0.90, z:  0.70, ry:-116, s: 12.00 },
      { name: 'E1',   val: 1,  x: -0.10, z:  1.10, ry:  64, s: 12.00 },
      { name: 'E2',   val: 3,  x:  2.30, z: -0.10, ry:  67, s: 10.00 },
      { name: 'E3A',  val: 6,  x:  0.10, z: -0.30, ry:-159, s:  8.00 },
      { name: 'E4A',  val: 8,  x:  0.10, z:  0.30, ry:-161, s:  7.00 },
      { name: 'E6',   val: 10, x:  0.10, z:  0.00, ry:-114, s:  8.50 },
      { name: 'T-Lab',  val: 19, x:  1.30, z:  1.50, ry:  65, s: 15.50 },
      { name: 'T-Lab-left',   val: 19, src: '/solar/Tlab-left.png',   x:  1.30, z:  1.50, y: 1.00, ry:  65, s: 15.50, vertical: true },
      { name: 'T-Lab-middle', val: 19, src: '/solar/Tlab-middle.png', x:  1.30, z:  1.50, y: 1.00, ry:  65, s: 15.50, vertical: true },
      { name: 'T-Lab-right',  val: 19, src: '/solar/Tlab-right.png',  x:  1.30, z:  1.50, y: 1.00, ry:  65, s: 15.50, vertical: true },
      { name: 'SDE2',   val: 16, x:  0.70, z: -0.50, ry:-180, s:  7.00 },
      { name: 'LT1_LT2', val: 3,  x:  2.60, z: -1.70, ry:  67, s:  6.50 },
      { name: 'E3',    val: 5,  x:  1.50, z:  1.10, ry:-180, s:  4.50 },
      { name: 'EA',    val: 12, x:  2.10, z: -0.10, ry:  -1, s:  9.00 },
      { name: 'EW1',   val: 13, x:  5.40, z:  0.30, ry:  -1, s:  4.50 },
      { name: 'E7',    val: 20, x: -0.50, z:  0.70, ry: -23, s: 12.50 },
      { name: 'IT',    val: 21, x: -1.10, z:  0.10, ry:  18, s: 13.00 },
      { name: 'Techno Edge', val: 22, x:  0.00, z:  0.00, ry:   0, s:  8.00 },
      { name: 'EW1A',  val: 14, x:  0.00, z:  0.00, ry:   0, s:  5.00 },
      { name: 'SDE1',  val: 15, x:  0.50, z:  1.70, ry:   0, s:  7.50 },
      { name: 'SDE3',  val: 17, x:  1.50, z:  1.50, ry:   1, s: 13.50 },
      { name: 'SDE4',  val: 18, x: -0.50, z:  1.90, ry:   0, s: 13.50 },
    ];

    var aspects  = {};
    var enabled  = {};
    var activeBld = BLDS[0].name;
    var scene    = document.querySelector('a-scene');
    var assets   = document.getElementById('ar-assets');

    // Build scene and UI
    BLDS.forEach(function(b) {
      aspects[b.name]  = 1;
      enabled[b.name]  = false;

      // Marker
      var marker = document.createElement('a-marker');
      marker.id = 'marker-' + b.name;
      marker.setAttribute('type', 'barcode');
      marker.setAttribute('value', String(b.val));
      marker.setAttribute('emitevents', 'true');
      marker.setAttribute('smooth', 'true');
      marker.setAttribute('smoothCount', '30');
      marker.setAttribute('smoothTolerance', '0.15');
      marker.setAttribute('smoothThreshold', '1');
      marker.setAttribute('minConfidence', '0.05');

      if (!b.y) b.y = 0.01;
      var img = document.createElement('img');
      img.id = 'img-' + b.name;
      img.src = b.src || '/solar/' + b.name + '.webp';
      img.setAttribute('crossorigin', 'anonymous');
      img.addEventListener('load', function() {
        if (img.naturalWidth && img.naturalHeight) aspects[b.name] = img.naturalWidth / img.naturalHeight;
        applyMat(b.name);
      });
      img.addEventListener('error', function() { applyMat(b.name); });
      assets.appendChild(img);

      var mat = document.createElement('a-plane');
      mat.id = 'mat-' + b.name;
      mat.setAttribute('src', '#img-' + b.name);
      mat.setAttribute('rotation', b.vertical ? '0 ' + b.ry + ' 0' : '-90 0 0');
      mat.setAttribute('position', b.x + ' ' + b.y + ' ' + b.z);
      mat.setAttribute('width',  b.s);
      mat.setAttribute('height', b.s);
      mat.setAttribute('material', 'transparent: true; alphaTest: 0.05; shader: flat; side: double');
      mat.setAttribute('visible', 'false');
      marker.appendChild(mat);
      scene.appendChild(marker);

      marker.addEventListener('markerFound', function() {
        if (enabled[b.name] && mat.object3D) mat.object3D.visible = true;
      });
      marker.addEventListener('markerLost', function() {
        if (mat.object3D) mat.object3D.visible = false;
      });

      // Toggle button
      var tog = document.createElement('button');
      tog.id = 'tog-' + b.name;
      tog.className = 'toggle-btn';
      tog.textContent = b.name;
      tog.onclick = (function(name) { return function() { toggleBld(name); }; })(b.name);
      document.getElementById('toggle-row').appendChild(tog);

      // Calibrate button
      var cb = document.createElement('button');
      cb.id = 'cb-' + b.name;
      cb.className = 'bld-btn';
      cb.textContent = b.name;
      cb.onclick = (function(name) { return function() { selectBld(name); }; })(b.name);
      document.getElementById('calib-row').appendChild(cb);
    });

    function toggleBld(name) {
      enabled[name] = !enabled[name];
      document.getElementById('tog-' + name).classList.toggle('on', enabled[name]);
      if (!enabled[name]) {
        var mat = document.getElementById('mat-' + name);
        if (mat && mat.object3D) mat.object3D.visible = false;
      }
    }

    function applyMat(name) {
      var b = BLDS.find(function(x) { return x.name === name; });
      var mat = document.getElementById('mat-' + name);
      if (!mat || !b) return;
      mat.setAttribute('position', b.x + ' ' + b.y + ' ' + b.z);
      mat.setAttribute('rotation', b.vertical ? '0 ' + b.ry + ' 0' : '-90 ' + b.ry + ' 0');
      mat.setAttribute('width',  b.s * aspects[name]);
      mat.setAttribute('height', b.s);
    }

    function selectBld(name) {
      activeBld = name;
      document.querySelectorAll('.bld-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.textContent === name);
      });
      var b = BLDS.find(function(x) { return x.name === name; });
      document.getElementById('sx').value  = b.x;
      document.getElementById('sz').value  = b.z;
      document.getElementById('sy').value  = b.y;
      document.getElementById('sry').value = b.ry;
      document.getElementById('ss').value  = b.s;
      updateDisplay();
    }

    function updateDisplay() {
      var b = BLDS.find(function(x) { return x.name === activeBld; });
      var w = (b.s * aspects[activeBld]).toFixed(2);
      document.getElementById('vx').textContent  = b.x.toFixed(2);
      document.getElementById('vz').textContent  = b.z.toFixed(2);
      document.getElementById('vy').textContent  = b.y.toFixed(2);
      document.getElementById('vry').textContent = b.ry + 'deg';
      document.getElementById('vs').textContent  = b.s.toFixed(2);
      document.getElementById('calib-values').textContent =
        '[' + activeBld + ']\n' +
        'position="' + b.x.toFixed(2) + ' ' + b.y.toFixed(2) + ' ' + b.z.toFixed(2) + '"\n' +
        'rotation="' + (b.vertical ? '0' : '-90') + ' ' + b.ry + ' 0"\n' +
        'width="' + w + '" height="' + b.s.toFixed(2) + '"';
    }

    function onSlider() {
      var b = BLDS.find(function(x) { return x.name === activeBld; });
      b.x  = parseFloat(document.getElementById('sx').value);
      b.z  = parseFloat(document.getElementById('sz').value);
      b.y  = parseFloat(document.getElementById('sy').value);
      b.ry = parseFloat(document.getElementById('sry').value);
      b.s  = parseFloat(document.getElementById('ss').value);
      applyMat(activeBld);
      updateDisplay();
    }

    ['sx','sz','sy','sry','ss'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', onSlider);
    });

    selectBld(BLDS[0].name);

    // AR.js runtime patches
    scene.addEventListener('loaded', function() {
      var tryTune = setInterval(function() {
        var ctx = scene.systems && scene.systems['arjs'];
        var ac  = ctx && ctx.ArToolkitContext && ctx.ArToolkitContext.arController;
        if (!ac) return;
        clearInterval(tryTune);
        try { ac.setThresholdMode(3); if (ac.setLabelingMode) ac.setLabelingMode(0); if (ac.setImageProcMode) ac.setImageProcMode(0); } catch(e) {}
      }, 200);
    });

    function copyValues() {
      var txt = document.getElementById('calib-values').textContent;
      navigator.clipboard.writeText(txt).catch(function() {
        var el = document.createElement('textarea');
        el.value = txt; document.body.appendChild(el);
        el.select(); document.execCommand('copy');
        document.body.removeChild(el);
      });
      var btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied!'; btn.classList.add('copied');
      setTimeout(function() { btn.textContent = 'Copy Values'; btn.classList.remove('copied'); }, 2000);
    }

    window.addEventListener('pagehide', function() {
      document.querySelectorAll('video').forEach(function(v) {
        if (v.srcObject) v.srcObject.getTracks().forEach(function(t) { t.stop(); });
      });
    });
  </script>
</body>
</html>
