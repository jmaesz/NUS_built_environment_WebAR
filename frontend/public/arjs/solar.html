<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>NUScape-AR · Solar</title>
  <link rel="preconnect" href="https://aframe.io">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100dvh; font-family: -apple-system, sans-serif; }
    #back-btn {
      position: fixed; top: 16px; left: 16px; z-index: 1000;
      background: rgba(0,0,0,0.55); color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 9px 14px; font-size: 11px; letter-spacing: 0.1em;
      cursor: pointer; border-radius: 4px; text-decoration: none;
      display: block; width: 100px; text-align: center;
    }
    #calib-panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(10,10,14,0.92); backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255,255,255,0.12);
      padding: 12px 16px 20px; color: #fff;
      transition: transform 0.3s ease;
    }
    #calib-panel.hidden { transform: translateY(100%); }
    #calib-toggle {
      position: fixed; bottom: 16px; right: 16px; z-index: 1001;
      background: #107b7f; color: #fff; border: none;
      padding: 10px 16px; font-size: 11px; font-weight: 700;
      letter-spacing: 0.08em; border-radius: 6px; cursor: pointer;
    }
    #calib-panel:not(.hidden) ~ #calib-toggle { display: none; }
    .calib-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    .calib-title { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #107b7f; }
    .calib-close { background: none; border: none; color: rgba(255,255,255,0.5); font-size: 18px; cursor: pointer; padding: 0 4px; }
    .calib-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; margin-bottom: 10px; }
    .calib-row { display: flex; flex-direction: column; gap: 3px; }
    .calib-lbl { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.5); display: flex; justify-content: space-between; }
    .calib-lbl span { color: #fff; font-weight: 600; }
    .calib-row input[type=range] { width: 100%; accent-color: #107b7f; height: 3px; }
    #calib-values {
      font-size: 9px; font-family: monospace; color: #107b7f;
      background: rgba(16,123,127,0.1); border: 1px solid rgba(16,123,127,0.3);
      border-radius: 4px; padding: 8px 10px; margin-bottom: 8px;
      white-space: pre; line-height: 1.6;
    }
    #copy-btn {
      width: 100%; padding: 8px; background: #107b7f; border: none; color: #fff;
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em; border-radius: 4px;
      cursor: pointer; text-transform: uppercase;
    }
    #copy-btn.copied { background: #2e7d32; }
  </style>
</head>
<body>
  <a href="/arjs" id="back-btn">← BACK</a>
  <button id="calib-toggle" onclick="document.getElementById('calib-panel').classList.remove('hidden')">⚙ CALIBRATE</button>

  <div id="calib-panel">
    <div class="calib-header">
      <span class="calib-title">Solar Mat Calibration — SDE4</span>
      <button class="calib-close" onclick="document.getElementById('calib-panel').classList.add('hidden')">✕</button>
    </div>
    <div class="calib-grid">
      <div class="calib-row">
        <label class="calib-lbl">X offset <span id="vx">0.00</span></label>
        <input type="range" id="sx" min="-3" max="3" step="0.05" value="0">
      </div>
      <div class="calib-row">
        <label class="calib-lbl">Y offset <span id="vy">0.01</span></label>
        <input type="range" id="sy" min="-1" max="1" step="0.01" value="0.01">
      </div>
      <div class="calib-row">
        <label class="calib-lbl">Rotate Y <span id="vry">0°</span></label>
        <input type="range" id="sry" min="-180" max="180" step="1" value="0">
      </div>
      <div class="calib-row">
        <label class="calib-lbl">Scale <span id="vs">3.00</span></label>
        <input type="range" id="ss" min="0.5" max="10" step="0.1" value="3">
      </div>
    </div>
    <div id="calib-values"></div>
    <button id="copy-btn" onclick="copyValues()">Copy Values</button>
  </div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: color_and_matrix; matrixCodeType: 4x4_BCH_13_5_5; maxDetectionRate: 60; sourceWidth: 1440; sourceHeight: 1080; canvasWidth: 1440; canvasHeight: 1080;"
    vr-mode-ui="enabled: false"
    renderer="colorManagement: true;"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <img id="solar-sde4" src="/solar/SDE4.png" crossorigin="anonymous">
    </a-assets>

    <!-- SDE4 = barcode marker value 18 -->
    <a-marker type="barcode" value="18" emitevents="true" id="sde4-marker">
      <a-plane
        id="solar-mat"
        src="#solar-sde4"
        rotation="-90 0 0"
        position="0 0.01 0"
        width="3"
        height="3"
        material="transparent: true; alphaTest: 0.05; shader: flat; side: double"
      ></a-plane>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    var mat = document.getElementById('solar-mat');

    function update() {
      var x  = parseFloat(document.getElementById('sx').value);
      var y  = parseFloat(document.getElementById('sy').value);
      var ry = parseFloat(document.getElementById('sry').value);
      var s  = parseFloat(document.getElementById('ss').value);

      document.getElementById('vx').textContent  = x.toFixed(2);
      document.getElementById('vy').textContent  = y.toFixed(2);
      document.getElementById('vry').textContent = ry + '°';
      document.getElementById('vs').textContent  = s.toFixed(2);

      mat.setAttribute('position', x + ' ' + y + ' 0');
      mat.setAttribute('rotation', '-90 ' + ry + ' 0');
      mat.setAttribute('width',  s);
      mat.setAttribute('height', s);

      document.getElementById('calib-values').textContent =
        'position="' + x.toFixed(2) + ' ' + y.toFixed(2) + ' 0"\n' +
        'rotation="-90 ' + ry + ' 0"\n' +
        'width="' + s.toFixed(2) + '" height="' + s.toFixed(2) + '"';
    }

    function copyValues() {
      var txt = document.getElementById('calib-values').textContent;
      navigator.clipboard.writeText(txt).catch(function() {
        var el = document.createElement('textarea');
        el.value = txt; document.body.appendChild(el);
        el.select(); document.execCommand('copy');
        document.body.removeChild(el);
      });
      var btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied!'; btn.classList.add('copied');
      setTimeout(function() { btn.textContent = 'Copy Values'; btn.classList.remove('copied'); }, 2000);
    }

    ['sx','sy','sry','ss'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', update);
    });

    update();

    window.addEventListener('pagehide', function() {
      document.querySelectorAll('video').forEach(function(v) {
        if (v.srcObject) v.srcObject.getTracks().forEach(function(t) { t.stop(); });
      });
    });
  </script>
</body>
</html>
