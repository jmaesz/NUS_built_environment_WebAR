  <script>
    // Always keep label on the world-up side of the marker
    AFRAME.registerComponent('up-track', {
      schema: { y: { default: 1.8 } },
      init: function () { this._v = new THREE.Vector3(); },
      tick: function () {
        this._v.set(0, 1, 0).applyQuaternion(this.el.parentEl.object3D.quaternion);
        this.el.object3D.position.y = (this._v.y >= 0 ? 1 : -1) * this.data.y;
      }
    });
    // Reliable per-frame billboard — direct lookAt, no lag
    AFRAME.registerComponent('billboard', {
      init: function () { this._v = new THREE.Vector3(); },
      tick: function () {
        var cam = this.el.sceneEl.camera;
        if (!cam) return;
        cam.getWorldPosition(this._v);
        this.el.object3D.lookAt(this._v);
      }
    });
    // Keep dashes pointing toward the marker regardless of orientation
    AFRAME.registerComponent('dash-track', {
      schema: { dashH: { default: 0.1 }, pitch: { default: 0.2 } },
      init: function () { this._v = new THREE.Vector3(); this._kids = null; },
      tick: function () {
        if (!this._kids) this._kids = Array.from(this.el.children);
        this._v.set(0, 1, 0).applyQuaternion(this.el.parentEl.object3D.quaternion);
        var sign = this._v.y >= 0 ? 1 : -1, p = this.data.pitch, h = this.data.dashH;
        this._kids.forEach(function (c, i) { c.object3D.position.y = sign * (i * p + h / 2); });
      }
    });
  </script>

<body>
  <div id="ui-layer">
    <a href="/" id="back-btn" onclick="window.location.href='/'; return false;">← BACK</a>
    <div id="scan-hint">POINT CAMERA AT MODEL</div>

    <div id="chart-panel">
      <div class="panel-tab" id="chart-tab" onclick="toggleCollapse('chart')"><span id="chart-chevron">‹</span></div>
      <div id="chart-content">
        <div id="chart-building-name"></div>
        <div id="chart-subtitle">Annual Energy Use (kWh)</div>
        <div id="chart-row">
          <div id="chart-container"><canvas id="myChart"></canvas></div>
          <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:#4A90D9"></div><span class="legend-label">Cooling</span><span class="legend-value" id="lv-cooling"></span></div>
            <div class="legend-item"><div class="legend-dot" style="background:#F5A623"></div><span class="legend-label">Equipment</span><span class="legend-value" id="lv-equipment"></span></div>
            <div class="legend-item"><div class="legend-dot" style="background:#7ED321"></div><span class="legend-label">Lighting</span><span class="legend-value" id="lv-lighting"></span></div>
          </div>
        </div>
        <div class="divider"></div>
        <div id="total-row"><span id="total-label">Total</span><span id="total-value"></span></div>
      </div>
    </div>

    <a id="maps-panel" href="#" target="_blank" rel="noopener">
      <div class="panel-tab" id="maps-tab" onclick="event.stopPropagation(); event.preventDefault(); toggleCollapse('maps')"><span id="maps-chevron">‹</span></div>
      <div id="maps-content">
        <div id="maps-panel-img-wrap">
          <img id="maps-panel-img" src="" alt="" style="display:none">
          <div id="maps-panel-top">—</div>
          <div id="maps-panel-bottom">
            <div id="maps-panel-addr-lbl"></div>
            <div id="maps-panel-cta">Open in Maps →</div>
          </div>
        </div>
      </div>
    </a>
  </div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 4x4_BCH_13_5_5; maxDetectionRate: 60; canvasWidth: 1280; canvasHeight: 960;"
    vr-mode-ui="enabled: false"
    renderer="colorManagement: true;"
    device-orientation-permission-ui="enabled: false"
  >
    <!-- Markers injected synchronously before A-Frame initialises -->
    <script>
      (function () {
        var scene = document.currentScript.parentElement;

        var assets = document.createElement('a-assets');
        assets.setAttribute('timeout', '10000');
        scene.insertBefore(assets, scene.firstChild);

        window.BUILDINGS.forEach(function (b, idx) {
          // Canvas texture — guaranteed black text, no MSDF issues
          var cv = document.createElement('canvas');
          cv.width = 1024; cv.height = 512;
          var cx = cv.getContext('2d');
          cx.fillStyle = '#ffffff';
          cx.fillRect(0, 0, 1024, 512);
          cx.textAlign = 'center';
          cx.textBaseline = 'middle';
          cx.fillStyle = '#000000';
          cx.font = 'bold 140px Arial, sans-serif';
          cx.fillText(b.name, 512, 180);
          cx.font = '110px Arial, sans-serif';
          cx.fillStyle = '#333333';
          cx.fillText('Tap for details', 512, 370);
          var img = document.createElement('img');
          img.id = 'lbl-' + idx;
          img.src = cv.toDataURL('image/png');
          assets.appendChild(img);

          var marker = document.createElement('a-marker');
          marker.setAttribute('type', 'barcode');
          marker.setAttribute('value', String(idx));
          marker.setAttribute('emitevents', 'true');
          marker.setAttribute('smooth', 'true');
          marker.setAttribute('smoothCount', '25');
          marker.setAttribute('smoothTolerance', '0.02');
          marker.setAttribute('smoothThreshold', '5');
          marker.id = 'marker-' + idx;

          // Dashes — dash-track flips their Y when marker is detected upside-down
          var dashContainer = document.createElement('a-entity');
          dashContainer.id = 'ar-dash-' + idx;
          dashContainer.setAttribute('dash-track', '');
          var dashH = 0.1, pitch = 0.2, numDashes = Math.floor(1.3 / pitch);
          for (var di = 0; di < numDashes; di++) {
            var dash = document.createElement('a-cylinder');
            dash.setAttribute('radius', '0.025');
            dash.setAttribute('height', String(dashH));
            dash.setAttribute('color', '#ffffff');
            dash.setAttribute('opacity', '0.85');
            dashContainer.appendChild(dash);
          }
          marker.appendChild(dashContainer);

          // up-track keeps label on the world-up side of the marker
          var upContainer = document.createElement('a-entity');
          upContainer.id = 'ar-up-' + idx;
          upContainer.setAttribute('up-track', 'y: 1.8');

          var label = document.createElement('a-entity');
          label.setAttribute('billboard', '');
          label.setAttribute('animation', 'property: position; from: 0 0 0; to: 0 0.3 0; dir: alternate; dur: 1600; loop: true; easing: easeInOutSine');

          var bg = document.createElement('a-plane');
          bg.id = 'ar-bg-' + idx;
          bg.setAttribute('width', '2.2');
          bg.setAttribute('height', '1.1');
          bg.setAttribute('material', 'src: #lbl-' + idx + '; side: double; transparent: false; shader: flat');

          label.appendChild(bg);
          upContainer.appendChild(label);
          marker.appendChild(upContainer);
          scene.appendChild(marker);
        });
      })();
    </script>
    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const chartPanel  = document.getElementById('chart-panel');
    const scanHint    = document.getElementById('scan-hint');
    const mapsPanel   = document.getElementById('maps-panel');
    const mapsImg     = document.getElementById('maps-panel-img');
    let chartInstance = null;
    let mapsHideTimer = null;
    let activeIdx     = null;
    const visibleMarkers = new Set();

    function fmtMWh(kwh) {
      return kwh >= 1000000 ? (kwh / 1000000).toFixed(2) + ' GWh' : (kwh / 1000).toFixed(1) + ' MWh';
    }

    function toggleCollapse(which) {
      const panel   = document.getElementById(which + '-panel');
      const chevron = document.getElementById(which + '-chevron');
      panel.classList.toggle('collapsed');
      chevron.textContent = panel.classList.contains('collapsed') ? '›' : '‹';
    }

    function setLabelHint(idx, isOpen) {
      const bg = document.getElementById('ar-bg-' + idx);
      if (!bg || !bg.object3D) return;
      const b = BUILDINGS[idx];
      const cv = document.createElement('canvas');
      cv.width = 1024; cv.height = 512;
      const cx = cv.getContext('2d');
      cx.fillStyle = '#ffffff';
      cx.fillRect(0, 0, 1024, 512);
      cx.textAlign = 'center'; cx.textBaseline = 'middle';
      cx.fillStyle = '#000000';
      cx.font = 'bold 140px Arial, sans-serif';
      cx.fillText(b.name, 512, 180);
      cx.font = '110px Arial, sans-serif';
      cx.fillStyle = isOpen ? '#e53935' : '#333333';
      cx.fillText(isOpen ? 'Tap to close' : 'Tap for details', 512, 370);
      const tex = new THREE.CanvasTexture(cv);
      bg.object3D.traverse(function (child) {
        if (!child.isMesh || !child.material) return;
        if (child.material.map) child.material.map.dispose();
        child.material.map = tex;
        child.material.needsUpdate = true;
      });
    }

    function pulseTap(idx) {
      const bg = document.getElementById('ar-bg-' + idx);
      if (!bg) return;
      const t0 = performance.now(), dur = 350;
      (function frame(now) {
        const t = Math.min((now - t0) / dur, 1);
        const s = 1 + 0.25 * Math.sin(t * Math.PI);
        bg.object3D.scale.set(s, s, s);
        if (t < 1) requestAnimationFrame(frame);
        else bg.object3D.scale.set(1, 1, 1);
      })(t0);
    }

    function setOtherLabelsVisible(skipIdx, visible) {
      BUILDINGS.forEach(function (_, i) {
        if (i === skipIdx) return;
        const up   = document.getElementById('ar-up-'   + i);
        const dash = document.getElementById('ar-dash-' + i);
        if (up)   up.object3D.visible   = visible;
        if (dash) dash.object3D.visible = visible;
      });
    }

    function showChart(idx) {
      const b = BUILDINGS[idx];
      activeIdx = idx;
      setLabelHint(idx, true);
      setOtherLabelsVisible(idx, false);
      const total = b.equipment_kWh + b.lighting_kWh + b.cooling_kWh;
      document.getElementById('chart-building-name').textContent = b.name;
      document.getElementById('total-value').textContent         = fmtMWh(total);
      document.getElementById('lv-cooling').textContent          = fmtMWh(b.cooling_kWh);
      document.getElementById('lv-equipment').textContent        = fmtMWh(b.equipment_kWh);
      document.getElementById('lv-lighting').textContent         = fmtMWh(b.lighting_kWh);

      const ctx = document.getElementById('myChart').getContext('2d');
      if (chartInstance) chartInstance.destroy();
      chartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: { datasets: [{ data: [b.cooling_kWh, b.equipment_kWh, b.lighting_kWh],
          backgroundColor: ['#4A90D9', '#F5A623', '#7ED321'], borderWidth: 0 }] },
        options: { cutout: '72%', plugins: { legend: { display: false }, tooltip: { enabled: false } }, animation: false }
      });

      chartPanel.classList.remove('collapsed');
      document.getElementById('chart-chevron').textContent = '‹';
      chartPanel.classList.add('visible');
      scanHint.style.opacity = '0';

      mapsPanel.href = b.mapsUrl;
      document.getElementById('maps-panel-top').textContent      = b.name;
      document.getElementById('maps-panel-addr-lbl').textContent = b.full_name;
      if (b.img) { mapsImg.src = b.img; mapsImg.style.display = 'block'; }
      else        { mapsImg.style.display = 'none'; }
      mapsPanel.classList.remove('collapsed');
      document.getElementById('maps-chevron').textContent = '‹';
      if (mapsHideTimer) { clearTimeout(mapsHideTimer); mapsHideTimer = null; }
      mapsPanel.style.display = 'flex';
      requestAnimationFrame(() => mapsPanel.classList.add('visible'));
    }

    function hideChart() {
      if (activeIdx !== null) setLabelHint(activeIdx, false);
      setOtherLabelsVisible(-1, true);
      activeIdx = null;
      chartPanel.classList.remove('visible');
      scanHint.style.opacity = '1';
      mapsPanel.classList.remove('visible');
      mapsHideTimer = setTimeout(() => { mapsPanel.style.display = 'none'; mapsHideTimer = null; }, 300);
    }

    // ── Wire up marker events + tap detection after scene loads ────────────────
    const sceneEl  = document.querySelector('a-scene');
    const _arVec   = new THREE.Vector3();
    let _lastTouch = 0;
    const _uiLayer = document.getElementById('ui-layer');

    BUILDINGS.forEach(function (b, idx) {
      const marker = document.getElementById('marker-' + idx);
      if (!marker) return;
      marker.addEventListener('markerFound', () => {
        visibleMarkers.add(idx);
        scanHint.style.opacity = '0';
      });
      marker.addEventListener('markerLost', () => {
        visibleMarkers.delete(idx);
        if (activeIdx === idx) hideChart();
        if (visibleMarkers.size === 0) scanHint.style.opacity = '1';
      });
    });

    function getScreenPos(entity) {
      if (!entity || !entity.object3D) return null;
      entity.object3D.getWorldPosition(_arVec);
      _arVec.project(sceneEl.camera);
      const r = sceneEl.canvas.getBoundingClientRect();
      return { x: (_arVec.x + 1) / 2 * r.width + r.left,
               y: (-_arVec.y + 1) / 2 * r.height + r.top };
    }

    function handleTap(cx, cy) {
      let bestIdx = -1, bestDist = 200;
      for (let idx = 0; idx < BUILDINGS.length; idx++) {
        if (!visibleMarkers.has(idx)) continue;
        const bg = document.getElementById('ar-bg-' + idx);
        if (!bg) continue;
        const sp = getScreenPos(bg);
        if (!sp) continue;
        const dist = Math.sqrt((cx - sp.x) ** 2 + (cy - sp.y) ** 2);
        if (dist < bestDist) { bestDist = dist; bestIdx = idx; }
      }
      if (bestIdx === -1) return;
      pulseTap(bestIdx);
      activeIdx === bestIdx && chartPanel.classList.contains('visible')
        ? hideChart() : showChart(bestIdx);
    }

    document.addEventListener('touchend', e => {
      _lastTouch = Date.now();
      if (_uiLayer.contains(e.target)) return;
      const t = e.changedTouches[0];
      handleTap(t.clientX, t.clientY);
    });
    document.addEventListener('click', e => {
      if (Date.now() - _lastTouch < 500) return;
      if (_uiLayer.contains(e.target)) return;
      handleTap(e.clientX, e.clientY);
    });
  </script>
</body>
</html>
