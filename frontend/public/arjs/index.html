  <script>
    // Patch: silence removed useLegacyLights property in THREE r165+ / A-Frame 1.7+
    (function () {
      var proto = THREE && THREE.WebGLRenderer && THREE.WebGLRenderer.prototype;
      if (proto && !('useLegacyLights' in proto)) {
        Object.defineProperty(proto, 'useLegacyLights', { get: function () { return false; }, set: function () {} });
      }
    })();
    // Always keep label on the world-up side of the marker
    AFRAME.registerComponent('up-track', {
      schema: { y: { default: 1.8 }, lockXZ: { default: false } },
      after: ['pose-filter'],
      init: function () { this._v = new THREE.Vector3(); this._sign = 1; },
      tick: function () {
        var mo = this.el.parentEl.object3D;
        if (!mo.visible) return;
        if (this.data.lockXZ) {
          this.el.object3D.position.set(0, this.data.y, 0);
        } else {
          // Hysteresis: keep label on whichever side of the marker faces world-up
          this._v.set(0, 1, 0).applyQuaternion(mo.quaternion);
          if (this._v.y > 0.3)       this._sign =  1;
          else if (this._v.y < -0.3) this._sign = -1;
          this.el.object3D.position.set(0, this._sign * this.data.y, 0);
        }
      }
    });
    // Yaw-only billboard — rotates around world Y only, zero roll, no random tilt
    AFRAME.registerComponent('billboard', {
      after: ['pose-filter'],
      init: function () {
        this._dir        = new THREE.Vector3();
        this._camPos     = new THREE.Vector3();
        this._obj        = new THREE.Vector3();
        this._euler      = new THREE.Euler(0, 0, 0, 'YXZ');
        this._worldQuat  = new THREE.Quaternion();
        this._parentQuat = new THREE.Quaternion();
      },
      tick: function () {
        if (!this.el.parentEl.parentEl.object3D.visible) return;
        var cam = this.el.sceneEl.camera;
        if (!cam) return;
        // Rebuild this label's world matrix branch so pose-filter + up-track changes are visible
        this.el.object3D.updateWorldMatrix(true, false);
        cam.getWorldPosition(this._camPos);
        this.el.object3D.getWorldPosition(this._obj);
        this._dir.subVectors(this._camPos, this._obj);
        // Only yaw — label stays perfectly upright, no roll possible
        this._euler.set(0, Math.atan2(this._dir.x, this._dir.z), 0);
        this._worldQuat.setFromEuler(this._euler);
        // Convert world rotation to local by removing parent's world rotation
        this.el.object3D.parent.getWorldQuaternion(this._parentQuat);
        this._parentQuat.invert();
        this.el.object3D.quaternion.multiplyQuaternions(this._parentQuat, this._worldQuat);
      }
    });
    // Keep dashes pointing toward the marker regardless of orientation
    AFRAME.registerComponent('dash-track', {
      schema: { dashH: { default: 0.1 }, pitch: { default: 0.2 } },
      after: ['pose-filter'],
      init: function () { this._kids = null; },
      tick: function () {
        var mo = this.el.parentEl.object3D;
        if (!mo.visible) return;
        if (!this._kids) this._kids = Array.from(this.el.children);
        var p = this.data.pitch, h = this.data.dashH;
        for (var i = 0; i < this._kids.length; i++) {
          this._kids[i].object3D.position.set(0, i * p + h / 2, 0);
        }
      }
    });
    // pose-filter: A-Frame 1.7.0 compatibility only — no smoothing.
    // In 1.5.0, arjs-anchor ran last and overwrote obj.position/quaternion every frame,
    // so pose-filter's lerp was invisible — arjs-anchor's smoothCount=30 did all the work.
    // In 1.7.0 pose-filter runs after arjs-anchor, so any extra smoothing we apply on top
    // fights arjs-anchor's smoother and causes oscillation. Solution: don't touch
    // position/quaternion at all — just handle visibility and re-detection.
    AFRAME.registerComponent('pose-filter', {
      schema: {},
      after: ['visible', 'arjs-anchor'],
      init: function () {
        this._ready  = false;
        this._isLost = false;
        var self = this;
        this._onFound = function () { self._isLost = false; self._ready = true; };
        this._onLost  = function () { self._isLost = true; };
        this.el.addEventListener('markerFound', this._onFound);
        this.el.addEventListener('markerLost',  this._onLost);
      },
      remove: function () {
        this.el.removeEventListener('markerFound', this._onFound);
        this.el.removeEventListener('markerLost',  this._onLost);
      },
      tick: function () {
        var obj = this.el.object3D;
        if (this._isLost) {
          // Belt-and-suspenders: if arjs-anchor detected the marker but markerFound
          // didn't fire due to wasVisible poisoning, exit lost state now.
          if (obj.visible) this._onFound();
          else return;
        }
        if (!this._ready) return;
        // Force visible — overrides A-Frame 1.7 visible component tick-order reset.
        // Do NOT touch position/quaternion — arjs-anchor's smoothCount=30 is sufficient.
        obj.visible = true;
      }
    });

      'SDE4': { x: -0.50, z:  1.50, ry:   0, w: 17.50, h: 12.50 },
    };
  </script>
</head>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: color_and_matrix; matrixCodeType: 4x4_BCH_13_5_5; maxDetectionRate: 60; sourceWidth: 1280; sourceHeight: 960; canvasWidth: 1280; canvasHeight: 960;"
    vr-mode-ui="enabled: false"
    renderer="colorManagement: true; logarithmicDepthBuffer: true;"
    device-orientation-permission-ui="enabled: false"
  >
    <script>
      (function () {
        var scene = document.currentScript.parentElement;

        var assets = document.createElement('a-assets');
        assets.setAttribute('timeout', '10000');
        scene.insertBefore(assets, scene.firstChild);

        // Word-wrap helper: draws text, returns line count
        function wrapText(cx, text, x, y, maxW, lh) {
          var words = text.split(' '), line = '', count = 0;
          for (var i = 0; i < words.length; i++) {
            var test = line + words[i] + ' ';
            if (cx.measureText(test).width > maxW && line !== '') {
              cx.fillText(line.trim(), x, y + count * lh);
              line = words[i] + ' '; count++;
            } else { line = test; }
          }
          if (line.trim()) { cx.fillText(line.trim(), x, y + count * lh); count++; }
          return count;
        }

        function justifyText(cx, text, x, y, maxW, lh) {
          var words = text.split(' '), line = [], lines = [];
          for (var i = 0; i < words.length; i++) {
            var test = line.concat([words[i]]).join(' ');
            if (cx.measureText(test).width > maxW && line.length) { lines.push(line.slice()); line = [words[i]]; }
            else line.push(words[i]);
          }
          if (line.length) lines.push(line);
          for (var j = 0; j < lines.length; j++) {
            var ln = lines[j];
            if (j === lines.length - 1 || ln.length === 1) {
              cx.fillText(ln.join(' '), x, y + j * lh);
            } else {
              var totalW = 0;
              for (var k = 0; k < ln.length; k++) totalW += cx.measureText(ln[k]).width;
              var gap = (maxW - totalW) / (ln.length - 1);
              var px = x;
              for (var k = 0; k < ln.length; k++) {
                cx.fillText(ln[k], px, y + j * lh);
                px += cx.measureText(ln[k]).width + gap;
              }
            }
          }
          return lines.length;
        }
        window._justifyText = justifyText;

        window.BUILDINGS.forEach(function (b, idx) {
          // ── Main label canvas ──────────────────────────────────────────────
          var cv = document.createElement('canvas');
          cv.width = 1024; cv.height = 512;
          var cx = cv.getContext('2d');
          cx.fillStyle = '#ffffff';
          cx.fillRect(0, 0, 1024, 512);
          cx.textAlign = 'center'; cx.textBaseline = 'middle';
          cx.fillStyle = '#000000';
          cx.font = 'bold 140px Arial, sans-serif';
          cx.fillText(b.name, 512, 180);
          cx.font = '110px Arial, sans-serif';
          cx.fillStyle = '#333333';
          cx.fillText('Tap for details', 512, 370);
          var img = document.createElement('img');
          img.id = 'lbl-' + idx;
          img.src = cv.toDataURL('image/png');
          assets.appendChild(img);

          // ── Info label canvas ──────────────────────────────────────────────
          var ic = document.createElement('canvas');
          ic.width = 1024; ic.height = 512;
          var ix = ic.getContext('2d');
          ix.fillStyle = '#ffffff';
          ix.fillRect(0, 0, 1024, 512);
          ix.textAlign = 'center'; ix.textBaseline = 'middle';
          ix.font = 'bold 100px Arial, sans-serif';
          ix.fillStyle = '#107b7f';
          ix.fillText('Building Info', 512, 195);
          ix.font = '80px Arial, sans-serif';
          ix.fillStyle = '#555555';
          ix.fillText('Tap for details', 512, 335);
          var iimg = document.createElement('img');
          iimg.id = 'ilbl-' + idx;
          iimg.src = ic.toDataURL('image/png');
          assets.appendChild(iimg);

          // ── Marker setup ───────────────────────────────────────────────────
          var marker = document.createElement('a-marker');
          marker.setAttribute('type', 'barcode');
          marker.setAttribute('value', String(idx));
          marker.setAttribute('emitevents', 'true');
          marker.setAttribute('smooth', 'true');
          marker.setAttribute('smoothCount', '30');
          marker.setAttribute('smoothTolerance', '0.15');
          marker.setAttribute('smoothThreshold', '1');
          marker.setAttribute('minConfidence', '0.01');
          marker.setAttribute('pose-filter', '');
          marker.id = 'marker-' + idx;

          // Dashes
          var dashContainer = document.createElement('a-entity');
          dashContainer.id = 'ar-dash-' + idx;
          var dashH = 0.1, pitch = 0.2, numDashes = Math.floor(1.05 / pitch);
          for (var di = 0; di < numDashes; di++) {
            var dash = document.createElement('a-cylinder');
            dash.setAttribute('radius', '0.025');
            dash.setAttribute('height', String(dashH));
            dash.setAttribute('color', '#ffffff');
            dash.setAttribute('opacity', '0.85');
            dash.setAttribute('position', '0 ' + (di * pitch + dashH / 2).toFixed(2) + ' 0');
            dashContainer.appendChild(dash);
          }
          marker.appendChild(dashContainer);

          // Up-track container
          var upContainer = document.createElement('a-entity');
          upContainer.id = 'ar-up-' + idx;
          upContainer.setAttribute('position', '0 1.1 0');

          // Billboard
          var label = document.createElement('a-entity');
          label.setAttribute('billboard', '');

          // Main label plane
          var bg = document.createElement('a-plane');
          bg.id = 'ar-bg-' + idx;
          bg.setAttribute('width', '2.2');
          bg.setAttribute('height', '1.1');
          bg.setAttribute('rotation', '0 0 0');
          bg.setAttribute('material', 'src: #lbl-' + idx + '; side: double; transparent: false; shader: flat');

          // Description group (hidden until tap)
          var descGroup = document.createElement('a-entity');
          descGroup.id = 'ar-desc-' + idx;
          descGroup.setAttribute('visible', 'false');
          descGroup.setAttribute('position', '0 1.5 0');

          // Description panel — positioned to the RIGHT of the main label
          var descPlane = document.createElement('a-plane');
          descPlane.id = 'ar-desc-plane-' + idx;
          descPlane.setAttribute('width', '7.0');
          descPlane.setAttribute('height', '4.4');
          descPlane.setAttribute('position', '5.0 0 0');
          descPlane.setAttribute('material', 'color: #0d1a1c; side: double; shader: flat');

          // Invisible play-button hitbox
          var playHitbox = document.createElement('a-plane');
          playHitbox.id = 'ar-play-' + idx;
          playHitbox.setAttribute('width', '1.5');
          playHitbox.setAttribute('height', '1.5');
          playHitbox.setAttribute('position', '5.0 -1.83 0.02');
          playHitbox.setAttribute('material', 'opacity: 0; transparent: true; shader: flat; side: double');

          // Info label plane (right of main label, same Y level)
          var infoLbl = document.createElement('a-plane');
          infoLbl.id = 'ar-ilbl-' + idx;
          infoLbl.setAttribute('width', '2.2');
          infoLbl.setAttribute('height', '1.1');
          infoLbl.setAttribute('position', '2.5 0 0');
          infoLbl.setAttribute('visible', 'false');
          infoLbl.setAttribute('material', 'src: #ilbl-' + idx + '; side: double; transparent: false; shader: flat');

          // Invisible X-button hitbox — top-right of desc panel (now on right side)
          var xHitbox = document.createElement('a-plane');
          xHitbox.id = 'ar-xbtn-' + idx;
          xHitbox.setAttribute('width', '0.9');
          xHitbox.setAttribute('height', '0.9');
          xHitbox.setAttribute('position', '8.17 1.87 0.02');
          xHitbox.setAttribute('material', 'opacity: 0; transparent: true; shader: flat; side: double');

          descGroup.appendChild(descPlane);
          descGroup.appendChild(playHitbox);
          descGroup.appendChild(xHitbox);
          label.appendChild(bg);
          label.appendChild(infoLbl);
          label.appendChild(descGroup);
          upContainer.appendChild(label);
          marker.appendChild(upContainer);

          // ── Daylight floor buttons (SDE4 only) ────────────────────────────
          var daylightFloors = window.DAYLIGHT_FLOORS[b.name];
          if (daylightFloors) {
            var flXOff = (b.name === 'E2A' || b.name === 'EA') ? 2 : 0;
            daylightFloors.forEach(function (fl, flIdx) {
              // Floor button canvas
              var fc = document.createElement('canvas');
              fc.width = 220; fc.height = 140;
              var fx = fc.getContext('2d');
              fx.fillStyle = '#ffffff';
              fx.fillRect(0, 0, 220, 140);
              fx.textAlign = 'center'; fx.textBaseline = 'middle';
              fx.fillStyle = '#0a0a0a';
              fx.font = 'bold 108px Arial, sans-serif';
              fx.fillText(fl.key, 110, 70);
              var fimg = document.createElement('img');
              fimg.id = 'flbl-' + idx + '-' + fl.key;
              fimg.src = fc.toDataURL('image/png');
              assets.appendChild(fimg);

              // Up-track container for this floor (hidden until chart opens)
              var flUpEl = document.createElement('a-entity');
              flUpEl.id = 'fl-up-' + idx + '-' + fl.key;
              flUpEl.setAttribute('up-track', 'y: ' + fl.yUp + '; lockXZ: true');
              flUpEl.setAttribute('visible', 'false');

              // World-anchored container for labels + lines
              var flBb = document.createElement('a-entity');
              var tapBb = document.createElement('a-entity');

              // Floor button plane
              var flBtn = document.createElement('a-plane');
              flBtn.id = 'fl-btn-' + idx + '-' + fl.key;
              flBtn.setAttribute('width', '0.47');
              flBtn.setAttribute('height', '0.30');
              flBtn.setAttribute('position', (-5.0 + flXOff) + ' 0 0');
              flBtn.setAttribute('material', 'src: #flbl-' + idx + '-' + fl.key + '; side: double; transparent: false; shader: flat');

              // "Tap here" hand-cursor icon (LEFT of floor label)
              if (!document.getElementById('tap-icon-shared')) {
                var tic = document.createElement('canvas');
                tic.width = 256; tic.height = 256;
                var tt = tic.getContext('2d');
                // Teal circle
                tt.fillStyle = '#107b7f';
                tt.beginPath(); tt.arc(128, 128, 124, 0, Math.PI * 2); tt.fill();
                // Subtle inner ring
                tt.strokeStyle = 'rgba(255,255,255,0.22)';
                tt.lineWidth = 5;
                tt.beginPath(); tt.arc(128, 128, 112, 0, Math.PI * 2); tt.stroke();
                // White pointer hand cursor
                tt.fillStyle = '#ffffff';
                // Index finger (rounded top)
                tt.beginPath(); tt.arc(118, 52, 16, Math.PI, 0); tt.fill();
                tt.fillRect(102, 52, 32, 74);
                // Fist body (other fingers curled)
                tt.beginPath();
                tt.moveTo(92, 120); tt.lineTo(182, 120);
                tt.arc(182, 138, 18, -Math.PI/2, Math.PI/2);
                tt.lineTo(92, 156);
                tt.arc(92, 138, 18, Math.PI/2, -Math.PI/2);
                tt.closePath(); tt.fill();
                tt.fillRect(92, 138, 108, 52);
                tt.beginPath(); tt.arc(146, 190, 54, 0, Math.PI); tt.fill();
                // Connect finger to fist
                tt.fillRect(102, 118, 32, 8);
                // Thumb (left side)
                tt.beginPath(); tt.arc(80, 134, 14, 0, Math.PI * 2); tt.fill();
                tt.fillRect(66, 126, 28, 46);
                tt.beginPath(); tt.arc(80, 172, 14, 0, Math.PI * 2); tt.fill();
                var tishared = document.createElement('img');
                tishared.id = 'tap-icon-shared';
                tishared.src = tic.toDataURL('image/png');
                assets.appendChild(tishared);
              }

              var flDotGroup = document.createElement('a-entity');
              flDotGroup.id = 'fl-dot-' + idx + '-' + fl.key;
              flDotGroup.setAttribute('position', '0 0 0');

              var tapIconEl = document.createElement('a-plane');
              tapIconEl.id = 'fl-tap-' + idx + '-' + fl.key;
              tapIconEl.setAttribute('width', '0.40');
              tapIconEl.setAttribute('height', '0.40');
              tapIconEl.setAttribute('position', (-5.58 + flXOff) + ' 0 0');
              tapIconEl.setAttribute('material', 'src: #tap-icon-shared; transparent: true; alphaTest: 0.05; shader: flat; side: double');
              tapIconEl.setAttribute('animation__pulse', 'property: scale; from: 1 1 1; to: 1.22 1.22 1; dir: alternate; dur: 900; loop: true; easing: easeInOutSine');

              // All lines straight and parallel — no fanning
              var nFloors = daylightFloors.length;
              var fanAngle = 0;
              var alpha = fanAngle * Math.PI / 180;
              var xS = -5.65 + flXOff + (flXOff > 0 ? 2 : 0), xE = -2.35 + flXOff, nFanDashes = 6;
              var yL = Math.tan(alpha) * (xE - xS);                // left-side y — unchanged
              var yR = -yL;                                         // right-side y mirrored → steeper slope
              var actualSlope = (yR - yL) / (xE - xS);
              var dashRotZ = Math.round(90 - Math.sign(fanAngle) * Math.atan(Math.abs(actualSlope)) * 180 / Math.PI);
              for (var hdi = 0; hdi < nFanDashes; hdi++) {
                var t = hdi / (nFanDashes - 1);
                var xd = xS + t * (xE - xS);
                var yd = yL + (yR - yL) * t;                       // left fixed, right steeper
                var hdash = document.createElement('a-cylinder');
                hdash.setAttribute('radius', '0.018');
                hdash.setAttribute('height', '0.15');
                hdash.setAttribute('color', '#ffffff');
                hdash.setAttribute('opacity', '0.75');
                hdash.setAttribute('rotation', '0 0 ' + dashRotZ);
                hdash.setAttribute('position', xd.toFixed(2) + ' ' + yd.toFixed(2) + ' 0');
                flDotGroup.appendChild(hdash);
              }

              // Daylight group (hidden until tapped)
              var flDg = document.createElement('a-entity');
              flDg.id = 'fl-dg-' + idx + '-' + fl.key;
              flDg.setAttribute('visible', 'false');

              // Daylight image — flat mat on marker surface
              var flImg = document.createElement('a-plane');
              flImg.id = 'fl-img-' + idx + '-' + fl.key;
              flImg.setAttribute('width', '5.5');
              flImg.setAttribute('height', '4.1');
              var flImgZ = (daylightFloors.length - 1 - flIdx) * 0.04;
              flImg.setAttribute('position', (-8.5 + flXOff) + ' 0 ' + flImgZ.toFixed(2));
              flImg.setAttribute('rotation', '-90 0 0');
              flImg.setAttribute('material', 'transparent: true; alphaTest: 0.05; side: double; shader: flat');
              (function(el, src) {
                var tmpImg = new Image();
                tmpImg.onload = function() {
                  var cv = document.createElement('canvas');
                  cv.width = tmpImg.width; cv.height = tmpImg.height;
                  var ctx = cv.getContext('2d');
                  ctx.drawImage(tmpImg, 0, 0);
                  var id = ctx.getImageData(0, 0, cv.width, cv.height);
                  var d = id.data;
                  for (var pi = 0; pi < d.length; pi += 4) {
                    if (d[pi] > 218 && d[pi+1] > 218 && d[pi+2] > 218) d[pi+3] = 0;
                  }
                  ctx.putImageData(id, 0, 0);
                  function tryApply() {
                    var mesh = el.getObject3D('mesh');
                    if (!mesh || !mesh.material) { setTimeout(tryApply, 100); return; }
                    var tex = new THREE.CanvasTexture(cv);
                    tex.colorSpace = THREE.SRGBColorSpace;
                    tex.needsUpdate = true;
                    mesh.material.map = tex;
                    mesh.material.transparent = true;
                    mesh.material.alphaTest = 0.05;
                    mesh.material.needsUpdate = true;
                  }
                  setTimeout(tryApply, 600);
                };
                tmpImg.src = src;
              })(flImg, fl.img);

              flDg.appendChild(flImg);
              tapBb.appendChild(tapIconEl);
              flBb.appendChild(flBtn);
              flBb.appendChild(flDotGroup);
              if (flIdx === 0) {
                var heatmapLbl = document.createElement('a-text');
                heatmapLbl.setAttribute('value', 'DAYLIGHT\nHEATMAP');
                heatmapLbl.setAttribute('position', (-5.58 + flXOff) + ' 1 0');
                heatmapLbl.setAttribute('align', 'center');
                heatmapLbl.setAttribute('color', '#000000');
                heatmapLbl.setAttribute('width', '5');
                heatmapLbl.setAttribute('side', 'double');
                flBb.appendChild(heatmapLbl);
              }
              flUpEl.appendChild(flBb);
              flUpEl.appendChild(tapBb);
              flUpEl.appendChild(flDg);
              marker.appendChild(flUpEl);
            });
          }

          // ── Solar mat (hidden until chart opens) ──────────────────────────
          var solarD = window.SOLAR_DATA && window.SOLAR_DATA[b.name];
          if (solarD) {
            var simg = document.createElement('img');
            simg.id = 'solar-img-' + idx;
            simg.src = '/solar/' + b.name + '.webp';
            assets.appendChild(simg);
            var solarMat = document.createElement('a-plane');
            solarMat.id = 'solar-mat-' + idx;
            solarMat.setAttribute('src', '#solar-img-' + idx);
            solarMat.setAttribute('rotation', '-90 ' + solarD.ry + ' 0');
            solarMat.setAttribute('position', solarD.x + ' 0.01 ' + solarD.z);
            solarMat.setAttribute('width',  solarD.w);
            solarMat.setAttribute('height', solarD.h);
            solarMat.setAttribute('material', 'transparent: true; alphaTest: 0.05; shader: flat; side: double');
            solarMat.setAttribute('visible', 'false');
            marker.appendChild(solarMat);
          }

          scene.appendChild(marker);
        });
      })();
    </script>

  <script>
    const chartPanel  = document.getElementById('chart-panel');
    const scanHint    = document.getElementById('scan-hint');
    const mapsPanel   = document.getElementById('maps-panel');
    const mapsImg     = document.getElementById('maps-panel-img');
    let chartInstance = null;
    let euiInstance   = null;
    let mapsHideTimer = null;
    let activeIdx         = null;
    let descOpenIdx       = null;
    const openDaylightFloors = new Set();
    let currentView       = 'pie';
    let currentMapsView   = 'map';
    let _speaking     = false;
    let _speechIdx    = -1;
    const visibleMarkers = new Set();

    const EUI_MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    // Apply AUTO_ADAPTIVE threshold after AR initializes for better detection in varying lighting
    document.querySelector('a-scene').addEventListener('arjs-video-loaded', function () {
      var arSystem = document.querySelector('a-scene').systems['arjs'];
      if (arSystem && arSystem.arController) {
        arSystem.arController.setThresholdMode(3); // AR_LABELING_THRESH_MODE_AUTO_ADAPTIVE
      }
    });

    function fmtMWh(kwh) {
      return kwh >= 1000000 ? (kwh / 1000000).toFixed(2) + ' GWh' : (kwh / 1000).toFixed(1) + ' MWh';
    }

    function toggleCollapse(which) {
      const panel   = document.getElementById(which + '-panel');
      const chevron = document.getElementById(which + '-chevron');
      panel.classList.toggle('collapsed');
      chevron.textContent = panel.classList.contains('collapsed') ? '›' : '‹';
    }

    function setView(v) {
      currentView = v;
      const isPie = v === 'pie';
      document.getElementById('btn-pie').classList.toggle('active', isPie);
      document.getElementById('btn-eui').classList.toggle('active', !isPie);
      document.getElementById('chart-row').style.display    = isPie ? 'flex' : 'none';
      document.getElementById('eui-container').style.display = isPie ? 'none' : 'block';

    function setPlayBtn(idx, playing) {
      var canvas = window._descCanvases && window._descCanvases[idx];

      if (!canvas || !plane) return;
      var ctx = canvas.getContext('2d');
      var bx = canvas.width / 2, by = canvas.height - 170, br = 140;
      ctx.fillStyle = '#0d1a1c';
      ctx.beginPath(); ctx.arc(bx, by, br + 12, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#107b7f';
      ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ffffff';
      if (playing) {
        ctx.fillRect(bx - 52, by - 58, 32, 116);
        ctx.fillRect(bx + 20, by - 58, 32, 116);
      } else {
        ctx.beginPath();
        ctx.moveTo(bx - 45, by - 62); ctx.lineTo(bx - 45, by + 62); ctx.lineTo(bx + 66, by);
        ctx.closePath(); ctx.fill();
      }
      var mesh = plane.getObject3D('mesh');
      if (mesh && mesh.material && mesh.material.map) {
        mesh.material.map.image = canvas;
        mesh.material.map.colorSpace = THREE.SRGBColorSpace;
        mesh.material.map.needsUpdate = true;
      }

    function generateDescCanvas(idx) {
      if (window._descCanvases && window._descCanvases[idx]) return;
      var b = window.BUILDINGS[idx];
      var jt = window._justifyText;
      var DW = 3200, DH = 2000;
      var dv = document.createElement('canvas');
      dv.width = DW; dv.height = DH;
      var dx = dv.getContext('2d');
      dx.fillStyle = '#0d1a1c'; dx.fillRect(0, 0, DW, DH);
      dx.strokeStyle = '#107b7f'; dx.lineWidth = 8;
      dx.strokeRect(4, 4, DW - 8, DH - 8);
      dx.fillStyle = '#ffffff'; dx.textAlign = 'left'; dx.textBaseline = 'top';
      dx.font = 'bold 129px Arial, sans-serif';
      var nl = jt(dx, b.full_name, 70, 58, DW - 140, 165);
      var divY = 58 + nl * 165 + 14;
      dx.strokeStyle = '#107b7f'; dx.lineWidth = 3;
      dx.beginPath(); dx.moveTo(70, divY); dx.lineTo(DW - 70, divY); dx.stroke();
      var desc = (window.BUILDING_DESCS && window.BUILDING_DESCS[b.name]) || b.full_name;
      dx.fillStyle = 'rgba(255,255,255,0.85)'; dx.font = '129px Arial, sans-serif';
      jt(dx, desc, 70, divY + 28, DW - 140, 165);
      var bx = DW / 2, by = DH - 170, br = 140;
      dx.fillStyle = '#107b7f';
      dx.beginPath(); dx.arc(bx, by, br, 0, Math.PI * 2); dx.fill();
      dx.fillStyle = '#ffffff';
      dx.beginPath();
      dx.moveTo(bx - 45, by - 62); dx.lineTo(bx - 45, by + 62); dx.lineTo(bx + 66, by);
      dx.closePath(); dx.fill();
      var xx = DW - 150, xy = 150, xr = 110;
      dx.fillStyle = 'rgba(255,255,255,0.18)';
      dx.beginPath(); dx.arc(xx, xy, xr, 0, Math.PI * 2); dx.fill();
      dx.strokeStyle = '#ffffff'; dx.lineWidth = 16; var xo = 58;
      dx.beginPath();
      dx.moveTo(xx - xo, xy - xo); dx.lineTo(xx + xo, xy + xo);
      dx.moveTo(xx + xo, xy - xo); dx.lineTo(xx - xo, xy + xo);
      dx.stroke();
      if (!window._descCanvases) window._descCanvases = [];
      window._descCanvases[idx] = dv;
      var plane = document.getElementById('ar-desc-plane-' + idx);
      if (!plane) return;
      function tryApply() {
        var mesh = plane.getObject3D('mesh');
        if (!mesh || !mesh.material) { setTimeout(tryApply, 50); return; }
        var tex = new THREE.CanvasTexture(dv);
        tex.colorSpace = THREE.SRGBColorSpace;
        tex.needsUpdate = true;
        mesh.material.map = tex;
        mesh.material.color.set(0xffffff);
        mesh.material.needsUpdate = true;
      }
      tryApply();
    }

    function pulseEl(el) {
      if (!el || !el.object3D) return;
      const t0 = performance.now(), dur = 350;
      (function frame(now) {
        const t = Math.min((now - t0) / dur, 1);
        const s = 1 + 0.25 * Math.sin(t * Math.PI);
        el.object3D.scale.set(s, s, s);
        if (t < 1) requestAnimationFrame(frame);
        else el.object3D.scale.set(1, 1, 1);
      })(t0);
    }

    // ── AR.js threshold + smoothing tuning ────────────────────────────────────
    const sceneEl  = document.querySelector('a-scene');
    sceneEl.addEventListener('loaded', function () {
      var tryTune = setInterval(function () {
        var ctx = sceneEl.systems && sceneEl.systems['arjs'];
        var ac  = ctx && ctx.ArToolkitContext && ctx.ArToolkitContext.arController;
        if (!ac) return;
        clearInterval(tryTune);
        try {
          // AUTO_ADAPTIVE (3) — local adaptive thresholding, finds small markers at
          // distance by binarising each region independently rather than using global
          // image statistics. Far superior to AUTO_MEDIAN for small/distant markers.
          ac.setThresholdMode(3);
          if (ac.setLabelingMode) ac.setLabelingMode(0);
          if (ac.setImageProcMode) ac.setImageProcMode(0);
        } catch(e) {}

        // Patch minUnvisibleDelay on each marker's ArSmoothedControls.
        // Default is 0.2 s — any brief detection gap immediately fires markerLost.
        // Raising to 2 s keeps the marker registered through short occlusions/blur.
        BUILDINGS.forEach(function (b, idx) {
          var markerEl = document.getElementById('marker-' + idx);
          if (!markerEl) return;
          var comps = markerEl.components || {};
          Object.keys(comps).forEach(function (key) {
            var comp = comps[key];
            // Try all known paths — AR.js builds differ on where smoothedControls lives
            var sc = comp.smoothedControls ||
                     (comp.markerControls  && comp.markerControls.smoothedControls) ||
                     (comp._markerControls && comp._markerControls.smoothedControls);
            if (sc && sc.parameters) sc.parameters.minUnvisibleDelay = 4.0;
          });
        });
      }, 200);
    });

    // ── Marker events + tap detection ──────────────────────────────────────────
    const _arVec   = new THREE.Vector3();
    let _lastTouch = 0;
    const _uiLayer = document.getElementById('ui-layer');

    const _hideTimers = {};

    BUILDINGS.forEach(function (b, idx) {
      const marker = document.getElementById('marker-' + idx);
      if (!marker) return;
      marker.addEventListener('markerFound', () => {
        visibleMarkers.add(idx);
        if (_hideTimers[idx]) { clearTimeout(_hideTimers[idx]); delete _hideTimers[idx]; }
        scanHint.style.opacity = '0';
      });
      marker.addEventListener('markerLost', () => {
        visibleMarkers.delete(idx);
        if (activeIdx === idx) {
          _hideTimers[idx] = setTimeout(() => {
            delete _hideTimers[idx];
            hideChart();
          }, 0);
        }
        if (visibleMarkers.size === 0) scanHint.style.opacity = '1';
      });
    });

    const _ray = new THREE.Raycaster();
    const _ndc = new THREE.Vector2();
    function rayHits(cx, cy, entity) {
      if (!entity || !entity.object3D) return false;
      const r = sceneEl.canvas.getBoundingClientRect();
      _ndc.set((cx - r.left) / r.width * 2 - 1, -((cy - r.top) / r.height) * 2 + 1);
      _ray.setFromCamera(_ndc, sceneEl.camera);
      return _ray.intersectObject(entity.object3D, true).length > 0;
    }

    function handleTap(cx, cy) {
      sceneEl.object3D.updateMatrixWorld(true);
      const r = sceneEl.canvas.getBoundingClientRect();

      // Check X button (closes desc only)
      if (descOpenIdx !== null) {
        const xbtn = document.getElementById('ar-xbtn-' + descOpenIdx);
        const dg   = document.getElementById('ar-desc-'  + descOpenIdx);
        if (xbtn && dg && dg.object3D.visible) {
          xbtn.object3D.getWorldPosition(_arVec);
          _arVec.project(sceneEl.camera);
          if (_arVec.z <= 1) {
            const sx = (_arVec.x + 1) / 2 * r.width + r.left;
            const sy = (-_arVec.y + 1) / 2 * r.height + r.top;
            if (Math.sqrt((cx - sx) ** 2 + (cy - sy) ** 2) < 80) {
              hideDescIndependent(); return;
            }
          }
        }
      }

      // Check play button (desc panel must be visible)
      const playFor = descOpenIdx !== null ? descOpenIdx : activeIdx;
      if (playFor !== null) {
        const dg = document.getElementById('ar-desc-' + playFor);
        if (dg && dg.object3D && dg.object3D.visible) {
          const play = document.getElementById('ar-play-' + playFor);
          if (play && play.object3D) {
            play.object3D.getWorldPosition(_arVec);
            _arVec.project(sceneEl.camera);
            if (_arVec.z <= 1) {
              const sx = (_arVec.x + 1) / 2 * r.width + r.left;
              const sy = (-_arVec.y + 1) / 2 * r.height + r.top;
              if (Math.sqrt((cx - sx) ** 2 + (cy - sy) ** 2) < 110) {
                speakDescription(playFor); return;
              }
            }
          }
        }
      }

      // Hit test main labels, info labels, and daylight floor buttons
      let bestIdx = -1, bestDist = 40;
      let bestInfoIdx = -1, bestInfoDist = 40;
      let bestFloorIdx = -1, bestFloorKey = null, bestFloorDist = 40;

      for (let idx = 0; idx < BUILDINGS.length; idx++) {
        const marker = document.getElementById('marker-' + idx);
        if (!marker || !marker.object3D.visible) continue;

        const bg = document.getElementById('ar-bg-' + idx);
        const upElBg = document.getElementById('ar-up-' + idx);
        if (bg && upElBg && upElBg.object3D.visible) {
          bg.object3D.getWorldPosition(_arVec);
          _arVec.project(sceneEl.camera);
          if (_arVec.z <= 1) {
            const sx = (_arVec.x + 1) / 2 * r.width + r.left;
            const sy = (-_arVec.y + 1) / 2 * r.height + r.top;
            const dist = Math.sqrt((cx - sx) ** 2 + (cy - sy) ** 2);
            if (dist < bestDist) { bestDist = dist; bestIdx = idx; }
          }
        }

        const ilbl = document.getElementById('ar-ilbl-' + idx);
        const upEl = document.getElementById('ar-up-' + idx);
        if (ilbl && ilbl.object3D.visible && upEl && upEl.object3D.visible) {
          ilbl.object3D.getWorldPosition(_arVec);
          _arVec.project(sceneEl.camera);
          if (_arVec.z <= 1) {
            const sx = (_arVec.x + 1) / 2 * r.width + r.left;
            const sy = (-_arVec.y + 1) / 2 * r.height + r.top;
            const dist = Math.sqrt((cx - sx) ** 2 + (cy - sy) ** 2);
            if (dist < bestInfoDist) { bestInfoDist = dist; bestInfoIdx = idx; }
          }
        }

        const dfloors = window.DAYLIGHT_FLOORS[BUILDINGS[idx].name];
        if (dfloors) {
          for (let fi = 0; fi < dfloors.length; fi++) {
            const fbtn = document.getElementById('fl-tap-' + idx + '-' + dfloors[fi].key);
            if (fbtn && fbtn.object3D.visible) {
              fbtn.object3D.getWorldPosition(_arVec);
              _arVec.project(sceneEl.camera);
              if (_arVec.z <= 1) {
                const sx = (_arVec.x + 1) / 2 * r.width + r.left;
                const sy = (-_arVec.y + 1) / 2 * r.height + r.top;
                const dist = Math.sqrt((cx - sx) ** 2 + (cy - sy) ** 2);
                if (dist < bestFloorDist) { bestFloorDist = dist; bestFloorIdx = idx; bestFloorKey = dfloors[fi].key; }
              }
            }
          }
        }
      }

      const minOther = Math.min(bestDist, bestInfoDist);

      if (bestFloorKey !== null && bestFloorDist < minOther) {
        pulseEl(document.getElementById('fl-btn-' + bestFloorIdx + '-' + bestFloorKey));
        toggleDaylightFloor(bestFloorIdx, bestFloorKey);
      } else if (bestInfoIdx !== -1 && bestInfoDist < bestDist) {
        pulseEl(document.getElementById('ar-ilbl-' + bestInfoIdx));
        if (descOpenIdx === bestInfoIdx) {
          hideDescIndependent();
        } else {
          if (descOpenIdx !== null) hideDescIndependent();
          showDescIndependent(bestInfoIdx);
        }
      } else if (bestIdx !== -1) {
        pulseTap(bestIdx);
        if (activeIdx === bestIdx) {
          hideChart();
        } else {
          if (activeIdx !== null) hideChart();
          showChart(bestIdx);
        }
      }
    }

    document.addEventListener('touchend', e => {
      _lastTouch = Date.now();
      if (_uiLayer.contains(e.target)) return;
      const t = e.changedTouches[0];
      handleTap(t.clientX, t.clientY);
    });
    document.addEventListener('click', e => {
      if (Date.now() - _lastTouch < 500) return;
      if (_uiLayer.contains(e.target)) return;
      handleTap(e.clientX, e.clientY);
    });

    window.addEventListener('orientationchange', function () {
      setTimeout(function () { window.location.reload(); }, 150);
    });

    // Release camera tracks before page unloads so refresh gets a clean stream
    function _stopCamera() {
      document.querySelectorAll('video').forEach(function (v) {
        if (v.srcObject) v.srcObject.getTracks().forEach(function (t) { t.stop(); });
      });
    }
    window.addEventListener('pagehide', _stopCamera);
    window.addEventListener('beforeunload', _stopCamera);

    // If iOS restores this page from bfcache, AR.js/Three.js state is stale — force a fresh load
    window.addEventListener('pageshow', function (e) {
      if (e.persisted) window.location.reload();
    });

    // Poll every 2s — show retry if camera has no valid frame after 3 checks (~6s)
    (function () {
      var checks = 0;
      var timer = setInterval(function () {
        var v = document.querySelector('video');
        var ok = v && v.videoWidth > 0 && !v.paused && v.readyState >= 3;
        if (ok) {
          clearInterval(timer);
          // Try to lock focus in continuous mode — prevents camera hunting during AR
          // Works on Android Chrome; silently ignored on iOS where focus is not programmable
          try {
            var tracks = v.srcObject && v.srcObject.getVideoTracks();
            if (tracks && tracks.length) {
              var caps = tracks[0].getCapabilities ? tracks[0].getCapabilities() : {};
              if ((caps.focusMode || []).includes('continuous')) {
                tracks[0].applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
              }
            }
          } catch(e) {}
          // Force A-Frame to re-sync renderer size with the now-settled viewport
          setTimeout(function () { window.dispatchEvent(new Event('resize')); }, 300);
          return;
        }
        if (++checks >= 3) {
          clearInterval(timer);
          var el = document.getElementById('camera-retry');
          if (el) el.style.display = 'flex';
        }
      }, 2000);
    })();

    (function () {
      const btn = document.getElementById('landscape-scroll-btn');
      if (!window.visualViewport) return;
      function updateHint() {
        const isLandscape = window.innerWidth > window.innerHeight;
        if (!isLandscape) return;
        const fullH = Math.min(window.screen.width, window.screen.height);
        const collapsed = window.visualViewport.height >= fullH - 20;
        btn.style.opacity = collapsed ? '0' : '1';
        btn.style.pointerEvents = collapsed ? 'none' : 'auto';
      }
      window.visualViewport.addEventListener('resize', updateHint);
      window.addEventListener('orientationchange', function () { setTimeout(updateHint, 300); });
      updateHint();
    })();

  </script>
</body>
</html>
