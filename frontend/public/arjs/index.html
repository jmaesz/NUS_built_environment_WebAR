  <script>
    // Always keep label on the world-up side of the marker
    AFRAME.registerComponent('up-track', {
      schema: { y: { default: 1.8 } },
      init: function () { this._wp = new THREE.Vector3(); },
      tick: function () {
        var mo = this.el.parentEl.object3D;
        if (!mo.visible) return;
        mo.updateWorldMatrix(true, false);
        mo.getWorldPosition(this._wp);
        this._wp.y += this.data.y;
        mo.worldToLocal(this._wp);
        this.el.object3D.position.copy(this._wp);
      }
    });
    // Yaw-only billboard — rotates around world Y only, zero roll, no random tilt
    AFRAME.registerComponent('billboard', {
      init: function () {
        this._dir        = new THREE.Vector3();
        this._camPos     = new THREE.Vector3();
        this._obj        = new THREE.Vector3();
        this._euler      = new THREE.Euler(0, 0, 0, 'YXZ');
        this._worldQuat  = new THREE.Quaternion();
        this._parentQuat = new THREE.Quaternion();
      },
      tick: function () {
        if (!this.el.parentEl.parentEl.object3D.visible) return;
        var cam = this.el.sceneEl.camera;
        if (!cam) return;
        // Rebuild this label's world matrix branch so pose-filter + up-track changes are visible
        this.el.object3D.updateWorldMatrix(true, false);
        cam.getWorldPosition(this._camPos);
        this.el.object3D.getWorldPosition(this._obj);
        this._dir.subVectors(this._camPos, this._obj);
        // Only yaw — label stays perfectly upright, no roll possible
        this._euler.set(0, Math.atan2(this._dir.x, this._dir.z), 0);
        this._worldQuat.setFromEuler(this._euler);
        // Convert world rotation to local by removing parent's world rotation
        this.el.object3D.parent.getWorldQuaternion(this._parentQuat);
        this._parentQuat.invert();
        this.el.object3D.quaternion.multiplyQuaternions(this._parentQuat, this._worldQuat);
      }
    });
    // Keep dashes pointing toward the marker regardless of orientation
    AFRAME.registerComponent('dash-track', {
      schema: { dashH: { default: 0.1 }, pitch: { default: 0.2 } },
      init: function () { this._wp = new THREE.Vector3(); this._kids = null; },
      tick: function () {
        var mo = this.el.parentEl.object3D;
        if (!mo.visible) return;
        mo.updateWorldMatrix(true, false);
        if (!this._kids) this._kids = Array.from(this.el.children);
        var p = this.data.pitch, h = this.data.dashH;
        for (var i = 0; i < this._kids.length; i++) {
          mo.getWorldPosition(this._wp);
          this._wp.y += i * p + h / 2;
          mo.worldToLocal(this._wp);
          this._kids[i].object3D.position.copy(this._wp);
        }
      }
    });
    // Pose hold: let AR.js smoothing handle stability; only add sticky hold when marker lost
    AFRAME.registerComponent('pose-filter', {
      schema: {},
      init: function () {
        this._pos       = new THREE.Vector3();
        this._quat      = new THREE.Quaternion();
        this._screenPos = new THREE.Vector3();
        this._ready     = false;
      },
      tick: function () {
        var obj = this.el.object3D;
        if (!obj.visible) {
          if (this._ready) {
            var cam = this.el.sceneEl.camera;
            if (cam) {
              this._screenPos.copy(this._pos).project(cam);
              if (this._screenPos.z > 1) { this._ready = false; return; }
            }
            obj.visible = true;
            obj.position.copy(this._pos);
            obj.quaternion.copy(this._quat);
          }
          return;
        }
        // Marker detected: store AR.js's already-smoothed pose, no extra filtering
        this._pos.copy(obj.position);
        this._quat.copy(obj.quaternion);
        this._ready = true;
      }
    });
  </script>

      'CELC':  `NUS's dedicated academic unit for English language and communication skills, serving students across all faculties. Located at 10 Architecture Drive within the SDE precinct, the building benefits from surrounding greenery and tree canopy that moderates the urban heat island effect around the site.`,

      'E6':    `An engineering block associated with the Department of Civil and Environmental Engineering, providing large-format structural, hydraulic, and environmental testing laboratories. Research on flood-resilient infrastructure and sustainable drainage systems conducted here supports Singapore's climate adaptation planning.`,
      'E8':    `Located at 1 Engineering Drive 3, E8 functions as Engineering Workshop 2, supporting fabrication, prototyping, and machining activities. Workshop buildings like E8 are being studied as part of NUS's campus sustainability programme to identify opportunities for waste heat recovery from machining operations.`,
      'EA':    `The flagship administrative and events building of NUS's College of Design and Engineering, housing the Dean's Office, student programme offices, the Innovation and Design Hub, and the Engineering Auditorium lecture theatre. A rooftop garden and planted terraces on the upper levels contribute to biodiversity and passive cooling of the building envelope.`,
      'EW1':   `A dedicated workshop block in the SDE precinct area, supporting practical fabrication and prototyping activities for College of Design and Engineering students. Its proximity to the SDE green precinct exposes it to the landscape buffer that moderates heat and noise from workshop operations.`,
      'EW1A':  `An annex workshop block adjacent to EW1, providing supplementary fabrication and storage space for the College of Design and Engineering. As the smallest building by total energy in this dataset, it is a candidate for electrification and solar panel installation under NUS's campus decarbonisation roadmap.`,
      'SDE1':  `A net-zero energy retrofit of a 1970s building completed in 2023, housing the Department of Architecture. Features light shelves, solar radiation screens, a hybrid cooling system, and a lush courtyard jungle garden. Achieved an EUI of 41 kWh/m2/yr in 2022 and holds the BCA Green Mark Platinum award.`,
      'SDE2':  `One of the original SDE campus buildings at 2 Architecture Drive, housing departments including Real Estate and other Built Environment disciplines. Surrounded by the mature landscaping of the Architecture Drive corridor, which provides significant shading to the building's east and west facades throughout the day.`,
      'SDE3':  `The primary architecture studio building, renovated in 2023 with an exposed structural frame retained to minimise embodied carbon, alongside new maker spaces, flexible studios, and a hybrid cooling system. Achieved an EUI of 43 kWh/m2/yr and won the 2024 Society of Facade Engineers Project of the Year International Sustainability Award.`,
      'SDE4':  `Southeast Asia's first net-zero energy building, opened in 2019 and designed by Serie Architects and Multiply Architects. Features a large rooftop PV array generating ~500 kWh/day, chilled ceilings, natural ventilation, a smart BMS, and exposed building services as a living learning tool. Holds the BCA Green Mark 2021 Platinum Positive Energy Award.`,

    <script>
      (function () {
        var scene = document.currentScript.parentElement;

        var assets = document.createElement('a-assets');
        assets.setAttribute('timeout', '10000');
        scene.insertBefore(assets, scene.firstChild);

        // Word-wrap helper: draws text, returns line count
        function wrapText(cx, text, x, y, maxW, lh) {
          var words = text.split(' '), line = '', count = 0;
          for (var i = 0; i < words.length; i++) {
            var test = line + words[i] + ' ';
            if (cx.measureText(test).width > maxW && line !== '') {
              cx.fillText(line.trim(), x, y + count * lh);
              line = words[i] + ' '; count++;
            } else { line = test; }
          }
          if (line.trim()) { cx.fillText(line.trim(), x, y + count * lh); count++; }
          return count;
        }

        function justifyText(cx, text, x, y, maxW, lh) {
          var words = text.split(' '), line = [], lines = [];
          for (var i = 0; i < words.length; i++) {
            var test = line.concat([words[i]]).join(' ');
            if (cx.measureText(test).width > maxW && line.length) { lines.push(line.slice()); line = [words[i]]; }
            else line.push(words[i]);
          }
          if (line.length) lines.push(line);
          for (var j = 0; j < lines.length; j++) {
            var ln = lines[j];
            if (j === lines.length - 1 || ln.length === 1) {
              cx.fillText(ln.join(' '), x, y + j * lh);
            } else {
              var totalW = 0;
              for (var k = 0; k < ln.length; k++) totalW += cx.measureText(ln[k]).width;
              var gap = (maxW - totalW) / (ln.length - 1);
              var px = x;
              for (var k = 0; k < ln.length; k++) {
                cx.fillText(ln[k], px, y + j * lh);
                px += cx.measureText(ln[k]).width + gap;
              }
            }
          }
          return lines.length;
        }

          if (!window._descCanvases) window._descCanvases = [];

          dashContainer.id = 'ar-dash-' + idx;
          dashContainer.setAttribute('dash-track', '');
          var dashH = 0.1, pitch = 0.2, numDashes = Math.floor(1.3 / pitch);

          // Invisible play-button hitbox — mapped to where the circle sits on the canvas
          // Canvas play centre: (1490/1600, 890/1000) → offset from plane centre → world pos
          var playHitbox = document.createElement('a-plane');

          descGroup.appendChild(descPlane);

  <script>
    const chartPanel  = document.getElementById('chart-panel');

    let activeIdx     = null;
    let descOpenIdx   = null;
    let currentView   = 'pie';
    let _speaking     = false;
    let _speechIdx    = -1;
    const visibleMarkers = new Set();

    const EUI_MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function fmtMWh(kwh) {

    }

    function toggleCollapse(which) {

          ]
        },
        options: {

            },

    // ── Audio playback ─────────────────────────────────────────────────────────
    var _audio = null;

    function setPlayBtn(idx, playing) {
      var canvas = window._descCanvases && window._descCanvases[idx];
      var plane = document.getElementById('ar-desc-plane-' + idx);
      if (!canvas || !plane) return;
      var ctx = canvas.getContext('2d');
      var bx = 170, by = canvas.height - 170, br = 140;
      ctx.fillStyle = '#0d1a1c';
      ctx.beginPath(); ctx.arc(bx, by, br + 12, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#107b7f';
      ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ffffff';
      if (playing) {
        ctx.fillRect(bx - 52, by - 58, 32, 116);
        ctx.fillRect(bx + 20, by - 58, 32, 116);
      } else {
        ctx.beginPath();
        ctx.moveTo(bx - 45, by - 62); ctx.lineTo(bx - 45, by + 62); ctx.lineTo(bx + 66, by);
        ctx.closePath(); ctx.fill();
      }
      var mesh = plane.getObject3D('mesh');
      if (mesh && mesh.material && mesh.material.map) {
        mesh.material.map.image = canvas;
        mesh.material.map.needsUpdate = true;
      }
    }

    function speakDescription(idx) {
      if (_audio && !_audio.paused) {
        if (_speechIdx === idx) {
          _audio.pause(); _audio.currentTime = 0;
          setPlayBtn(idx, false); _speaking = false; _speechIdx = -1; return;
        }
        _audio.pause(); _audio.currentTime = 0;
        setPlayBtn(_speechIdx, false);
      }
      var name = BUILDINGS[idx].name;
      _audio = new Audio('/audio/' + name + '.mp3');
      _audio.onended = function () { setPlayBtn(idx, false); _speaking = false; _speechIdx = -1; };
      _audio.onerror = function () { setPlayBtn(idx, false); _speaking = false; _speechIdx = -1; };
      setPlayBtn(idx, true);
      _speaking = true; _speechIdx = idx;
      _audio.play();
    }

    // ── Description panel show/hide ────────────────────────────────────────────
    function showDescPanel(idx) {
      var g = document.getElementById('ar-desc-' + idx);
      if (g && g.object3D) g.object3D.visible = true;
    }
    function hideDescPanel(idx) {
      var g = document.getElementById('ar-desc-' + idx);
      if (g && g.object3D) g.object3D.visible = false;
    }

    function showDescIndependent(idx) {
      showDescPanel(idx);
      setInfoHint(idx, true);
      descOpenIdx = idx;
    }

    function hideDescIndependent() {
      if (descOpenIdx === null) return;
      const prev = descOpenIdx;
      descOpenIdx = null;
      hideDescPanel(prev);
      setInfoHint(prev, false);
      if (_speaking && _speechIdx === prev && _audio) {
        _audio.pause(); _audio.currentTime = 0;
        setPlayBtn(prev, false); _speaking = false; _speechIdx = -1;
      }
    }

    function setLabelHint(idx, isOpen) {
      const bg = document.getElementById('ar-bg-' + idx);
      if (!bg || !bg.object3D) return;
      const b = BUILDINGS[idx];
      const cv = document.createElement('canvas');
      cv.width = 1024; cv.height = 512;
      const cx = cv.getContext('2d');
      cx.fillStyle = '#ffffff';
      cx.fillRect(0, 0, 1024, 512);
      cx.textAlign = 'center'; cx.textBaseline = 'middle';
      cx.fillStyle = '#000000';
      cx.font = 'bold 140px Arial, sans-serif';
      cx.fillText(b.name, 512, 180);
      cx.font = '110px Arial, sans-serif';
      cx.fillStyle = isOpen ? '#e53935' : '#333333';
      cx.fillText(isOpen ? 'Tap to close' : 'Tap for details', 512, 370);
      const tex = new THREE.CanvasTexture(cv);
      bg.object3D.traverse(function (child) {
        if (!child.isMesh || !child.material) return;
        if (child.material.map) child.material.map.dispose();
        child.material.map = tex;
        child.material.needsUpdate = true;
      });
    }

    function setInfoHint(idx, isOpen) {
      const ilbl = document.getElementById('ar-ilbl-' + idx);
      if (!ilbl || !ilbl.object3D) return;
      const b = BUILDINGS[idx];
      const ic = document.createElement('canvas');
      ic.width = 1024; ic.height = 512;
      const ix = ic.getContext('2d');
      ix.fillStyle = '#ffffff';
      ix.fillRect(0, 0, 1024, 512);
      ix.textAlign = 'center'; ix.textBaseline = 'middle';
      ix.fillStyle = '#000000';
      ix.font = 'bold 130px Arial, sans-serif';
      ix.fillText(b.name, 512, 165);
      ix.strokeStyle = '#107b7f'; ix.lineWidth = 4;
      ix.beginPath(); ix.moveTo(80, 250); ix.lineTo(944, 250); ix.stroke();
      ix.font = '88px Arial, sans-serif';
      ix.fillStyle = '#107b7f';
      ix.fillText('Building Info', 512, 330);
      ix.font = '80px Arial, sans-serif';
      ix.fillStyle = isOpen ? '#e53935' : '#555555';
      ix.fillText(isOpen ? 'Tap to close' : 'Tap for details', 512, 440);
      const tex = new THREE.CanvasTexture(ic);
      ilbl.object3D.traverse(function (child) {
        if (!child.isMesh || !child.material) return;
        if (child.material.map) child.material.map.dispose();
        child.material.map = tex;
        child.material.needsUpdate = true;
      });
    }

    function pulseEl(el) {
      if (!el || !el.object3D) return;
      const t0 = performance.now(), dur = 350;
      (function frame(now) {
        const t = Math.min((now - t0) / dur, 1);
        const s = 1 + 0.25 * Math.sin(t * Math.PI);
        el.object3D.scale.set(s, s, s);
        if (t < 1) requestAnimationFrame(frame);
        else el.object3D.scale.set(1, 1, 1);
      })(t0);
    }

    function pulseTap(idx) {
      pulseEl(document.getElementById('ar-bg-' + idx));
    }

    function setOtherLabelsVisible(skipIdx, visible) {
      BUILDINGS.forEach(function (_, i) {
        if (i === skipIdx) return;
        const up   = document.getElementById('ar-up-'   + i);
        const dash = document.getElementById('ar-dash-' + i);
        const ilbl = document.getElementById('ar-ilbl-' + i);
        if (up)   up.object3D.visible   = visible;
        if (dash) dash.object3D.visible = visible;
        if (!visible) {
          hideDescPanel(i);
          if (ilbl) ilbl.object3D.visible = false;
          if (i === descOpenIdx) {
            descOpenIdx = null;
            if (_speaking && _speechIdx === i && _audio) {
              _audio.pause(); _audio.currentTime = 0;
              setPlayBtn(i, false); _speaking = false; _speechIdx = -1;
            }
          }
        }
      });
    }

    function showChart(idx) {
      const b = BUILDINGS[idx];
      activeIdx = idx;
      setLabelHint(idx, true);
      setOtherLabelsVisible(idx, false);
      const ilbl = document.getElementById('ar-ilbl-' + idx);
      if (ilbl && ilbl.object3D) ilbl.object3D.visible = true;

      const total = b.equipment_kWh + b.lighting_kWh + b.cooling_kWh;
      document.getElementById('chart-building-name').textContent = b.name;
      document.getElementById('total-value').textContent         = fmtMWh(total);
      document.getElementById('lv-cooling').textContent          = fmtMWh(b.cooling_kWh);
      document.getElementById('lv-equipment').textContent        = fmtMWh(b.equipment_kWh);
      document.getElementById('lv-lighting').textContent         = fmtMWh(b.lighting_kWh);

      if (currentView === 'pie') {
        const ctx = document.getElementById('myChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
          type: 'doughnut',
          data: { datasets: [{ data: [b.cooling_kWh, b.equipment_kWh, b.lighting_kWh],
            backgroundColor: ['#107b7f', '#b3d5d6', '#6badb0'], borderWidth: 0 }] },

        });
      } else {
        renderEUIChart(idx);

      chartPanel.classList.remove('collapsed');

      document.getElementById('maps-panel-top').textContent      = b.name;
      document.getElementById('maps-panel-addr-lbl').textContent = b.full_name;

      else        { mapsImg.style.display = 'none'; }

    function hideChart() {
      if (activeIdx !== null) {
        setLabelHint(activeIdx, false);
        if (descOpenIdx === activeIdx) hideDescIndependent();
        const ilbl = document.getElementById('ar-ilbl-' + activeIdx);
        if (ilbl && ilbl.object3D) ilbl.object3D.visible = false;
      }
      if (_speaking && _audio) { _audio.pause(); _audio.currentTime = 0; setPlayBtn(_speechIdx, false); _speaking = false; _speechIdx = -1; }
      setOtherLabelsVisible(-1, true);
      activeIdx = null;
      chartPanel.classList.remove('visible');
      scanHint.style.opacity = '1';
      if (euiInstance) { euiInstance.destroy(); euiInstance = null; }
      mapsPanel.classList.remove('visible');
      mapsHideTimer = setTimeout(() => { mapsPanel.style.display = 'none'; mapsHideTimer = null; }, 300);
    }

    // ── Marker events + tap detection ──────────────────────────────────────────
    const sceneEl  = document.querySelector('a-scene');
    const _arVec   = new THREE.Vector3();
    let _lastTouch = 0;
    const _uiLayer = document.getElementById('ui-layer');

    const _hideTimers = {};

    BUILDINGS.forEach(function (b, idx) {
      const marker = document.getElementById('marker-' + idx);
      if (!marker) return;
      marker.addEventListener('markerFound', () => {
        visibleMarkers.add(idx);
        if (_hideTimers[idx]) { clearTimeout(_hideTimers[idx]); delete _hideTimers[idx]; }
        scanHint.style.opacity = '0';
      });
      marker.addEventListener('markerLost', () => {
        visibleMarkers.delete(idx);
        if (activeIdx === idx) {
          _hideTimers[idx] = setTimeout(() => {
            delete _hideTimers[idx];
            hideChart();
          }, 2000);
        }
        if (visibleMarkers.size === 0) scanHint.style.opacity = '1';
      });
    });

    const _ray = new THREE.Raycaster();
    const _ndc = new THREE.Vector2();
    function rayHits(cx, cy, entity) {
      if (!entity || !entity.object3D) return false;
      const r = sceneEl.canvas.getBoundingClientRect();
      _ndc.set((cx - r.left) / r.width * 2 - 1, -((cy - r.top) / r.height) * 2 + 1);
      _ray.setFromCamera(_ndc, sceneEl.camera);
      return _ray.intersectObject(entity.object3D, true).length > 0;
    }

    function handleTap(cx, cy) {
      sceneEl.object3D.updateMatrixWorld(true);
      const r = sceneEl.canvas.getBoundingClientRect();

      // Check play button (desc panel must be visible)
      const playFor = descOpenIdx !== null ? descOpenIdx : activeIdx;
      if (playFor !== null) {
        const dg = document.getElementById('ar-desc-' + playFor);
        if (dg && dg.object3D && dg.object3D.visible) {
          const play = document.getElementById('ar-play-' + playFor);
          if (play && play.object3D) {
            play.object3D.getWorldPosition(_arVec);
            _arVec.project(sceneEl.camera);
            if (_arVec.z <= 1) {
              const sx = (_arVec.x + 1) / 2 * r.width + r.left;
              const sy = (-_arVec.y + 1) / 2 * r.height + r.top;
              if (Math.sqrt((cx - sx) ** 2 + (cy - sy) ** 2) < 110) {
                speakDescription(playFor); return;
              }
            }
          }
        }
      }

      // Hit test main labels and info labels
      let bestIdx = -1, bestDist = 40;
      let bestInfoIdx = -1, bestInfoDist = 40;

      for (let idx = 0; idx < BUILDINGS.length; idx++) {
        const marker = document.getElementById('marker-' + idx);
        if (!marker || !marker.object3D.visible) continue;

        const bg = document.getElementById('ar-bg-' + idx);
        if (bg) {
          bg.object3D.getWorldPosition(_arVec);
          _arVec.project(sceneEl.camera);
          if (_arVec.z <= 1) {
            const sx = (_arVec.x + 1) / 2 * r.width + r.left;
            const sy = (-_arVec.y + 1) / 2 * r.height + r.top;
            const dist = Math.sqrt((cx - sx) ** 2 + (cy - sy) ** 2);
            if (dist < bestDist) { bestDist = dist; bestIdx = idx; }
          }
        }

        const ilbl = document.getElementById('ar-ilbl-' + idx);
        if (ilbl && ilbl.object3D.visible) {
          ilbl.object3D.getWorldPosition(_arVec);
          _arVec.project(sceneEl.camera);
          if (_arVec.z <= 1) {
            const sx = (_arVec.x + 1) / 2 * r.width + r.left;
            const sy = (-_arVec.y + 1) / 2 * r.height + r.top;
            const dist = Math.sqrt((cx - sx) ** 2 + (cy - sy) ** 2);
            if (dist < bestInfoDist) { bestInfoDist = dist; bestInfoIdx = idx; }
          }
        }
      }

      if (bestIdx !== -1 && bestDist <= bestInfoDist) {
        // Main label tapped — toggle chart
        pulseTap(bestIdx);
        if (activeIdx === bestIdx) {
          hideChart();
        } else {
          if (activeIdx !== null) hideChart();
          showChart(bestIdx);
        }
      } else if (bestInfoIdx !== -1) {
        // Info label tapped — toggle desc
        pulseEl(document.getElementById('ar-ilbl-' + bestInfoIdx));
        if (descOpenIdx === bestInfoIdx) {
          hideDescIndependent();
        } else {
          if (descOpenIdx !== null) hideDescIndependent();
          showDescIndependent(bestInfoIdx);
        }
      } else if (activeIdx !== null || descOpenIdx !== null) {
        // Tap elsewhere — close both
        if (activeIdx !== null) hideChart();
        if (descOpenIdx !== null) hideDescIndependent();
      }
    }

    document.addEventListener('touchend', e => {
      _lastTouch = Date.now();
      if (_uiLayer.contains(e.target)) return;
      const t = e.changedTouches[0];
      handleTap(t.clientX, t.clientY);
    });
    document.addEventListener('click', e => {
      if (Date.now() - _lastTouch < 500) return;
      if (_uiLayer.contains(e.target)) return;
      handleTap(e.clientX, e.clientY);
    });

    window.addEventListener('orientationchange', function () {
      setTimeout(function () { window.location.reload(); }, 400);
    });

    // Release camera tracks before page unloads so refresh gets a clean stream
    function _stopCamera() {
      document.querySelectorAll('video').forEach(function (v) {
        if (v.srcObject) v.srcObject.getTracks().forEach(function (t) { t.stop(); });
      });
    }
    window.addEventListener('pagehide', _stopCamera);
    window.addEventListener('beforeunload', _stopCamera);

    // If iOS restores this page from bfcache, AR.js/Three.js state is stale — force a fresh load
    window.addEventListener('pageshow', function (e) {
      if (e.persisted) window.location.reload();
    });

    // Poll every 2s — show retry if camera has no valid frame after 3 checks (~6s)
    (function () {
      var checks = 0;
      var timer = setInterval(function () {
        var v = document.querySelector('video');
        var ok = v && v.videoWidth > 0 && !v.paused && v.readyState >= 3;
        if (ok) { clearInterval(timer); return; }
        if (++checks >= 3) {
          clearInterval(timer);
          var el = document.getElementById('camera-retry');
          if (el) el.style.display = 'flex';
        }
      }, 2000);
    })();

    (function () {
      const btn = document.getElementById('landscape-scroll-btn');
      if (!window.visualViewport) return;
      function updateHint() {
        const isLandscape = window.innerWidth > window.innerHeight;
        if (!isLandscape) return;
        const fullH = Math.min(window.screen.width, window.screen.height);
        const collapsed = window.visualViewport.height >= fullH - 20;
        btn.style.opacity = collapsed ? '0' : '1';
        btn.style.pointerEvents = collapsed ? 'none' : 'auto';
      }
      window.visualViewport.addEventListener('resize', updateHint);
      window.addEventListener('orientationchange', function () { setTimeout(updateHint, 300); });
      updateHint();
    })();

  </script>
</body>
</html>
