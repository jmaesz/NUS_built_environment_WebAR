<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Video</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    video {
      width: 100%; height: 100%; object-fit: contain;
      display: block;
    }
    #back-btn {
      position: fixed; top: 16px; left: 16px; z-index: 100;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: none; border-radius: 8px; padding: 10px 18px;
      color: #fff; font-size: 14px; font-weight: 700; cursor: pointer;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      letter-spacing: 0.04em; -webkit-tap-highlight-color: transparent;
    }
    #building-name {
      position: fixed; top: 16px; right: 16px; z-index: 100;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      border-radius: 8px; padding: 10px 14px;
      color: #fff; font-size: 13px; font-weight: 800;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <button id="back-btn" onclick="history.back()">&#8592; Back</button>
  <div id="building-name"></div>
  <video id="vid" controls playsinline autoplay></video>
  <script>
    var params = new URLSearchParams(window.location.search);
    var src  = params.get('src');
    var name = params.get('name');
    if (name) document.getElementById('building-name').textContent = name;
    if (src)  document.getElementById('vid').src = src;
    document.getElementById('vid').addEventListener('ended', function() { history.back(); });
  </script>
</body>
</html>
