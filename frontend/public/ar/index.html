<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>SDE4 AR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100dvh; overflow: hidden; font-family: -apple-system, sans-serif; }

    #back-btn {
      position: fixed; top: 16px; left: 16px; z-index: 999;
      background: rgba(0,0,0,0.55); color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 9px 14px; font-size: 11px; letter-spacing: 0.1em;
      cursor: pointer; border-radius: 4px; text-decoration: none;
    }

    #scan-hint {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      z-index: 999; background: rgba(0,0,0,0.55); color: #fff;
      padding: 11px 18px; font-size: 11px; letter-spacing: 0.1em;
      border-radius: 4px; pointer-events: none; transition: opacity 0.4s; white-space: nowrap;
    }

    /* ── Chart panel ── */
    #chart-panel {
      position: fixed; top: 12px; right: 12px; z-index: 999;
      width: 200px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 10px; padding: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      opacity: 0; transform: translateX(16px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      pointer-events: none;
    }
    #chart-panel.visible { opacity: 1; transform: translateX(0); pointer-events: auto; }
    #chart-building-name { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #111; margin-bottom: 2px; }
    #chart-subtitle { font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; color: #555; margin-bottom: 10px; }
    #chart-container { position: relative; width: 100%; height: 130px; margin-bottom: 10px; }
    .legend { display: flex; flex-direction: column; gap: 6px; }
    .legend-item { display: flex; align-items: center; gap: 7px; }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { font-size: 10px; color: #333; flex: 1; }
    .legend-value { font-size: 10px; font-weight: 600; color: #111; }
    .legend-pct { font-size: 9px; color: #555; margin-left: 2px; }
    .divider { height: 1px; background: rgba(0,0,0,0.12); margin: 10px 0; }
    #total-row { display: flex; justify-content: space-between; align-items: center; }
    #total-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; color: #555; }
    #total-value { font-size: 11px; font-weight: 700; color: #111; }

    /* ── Detail slide-up panel ── */
    #detail-panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(12, 12, 16, 0.94);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px 20px 0 0;
      padding: 12px 24px 48px;
      transform: translateY(100%);
      transition: transform 0.45s cubic-bezier(0.34, 1.2, 0.64, 1);
    }
    #detail-panel.visible { transform: translateY(0); }
    #detail-handle {
      width: 36px; height: 4px; background: rgba(255,255,255,0.2);
      border-radius: 2px; margin: 0 auto 20px;
    }
    #detail-header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
    }
    #detail-color-bar {
      width: 4px; height: 40px; border-radius: 2px; flex-shrink: 0;
    }
    #detail-title {
      font-size: 18px; font-weight: 800; letter-spacing: 0.06em;
      text-transform: uppercase; color: #fff; flex: 1;
    }
    #detail-value {
      font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.6);
      margin-top: 2px;
    }
    #detail-close {
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    #detail-desc {
      font-size: 13px; line-height: 1.75; color: rgba(255,255,255,0.72);
      margin-bottom: 20px;
    }
    #detail-bar-bg {
      height: 4px; background: rgba(255,255,255,0.08);
      border-radius: 2px; overflow: hidden; margin-bottom: 8px;
    }
    #detail-bar-fill {
      height: 100%; border-radius: 2px;
      transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #detail-pct {
      font-size: 10px; color: rgba(255,255,255,0.4);
      letter-spacing: 0.06em; text-transform: uppercase;
    }
  </style>
</head>

  <script>
    const DETAILS = {
      equipment: {
        label: 'Equipment', value: '32 kWh/m²/yr', pct: 37, color: '#F5A623',
        desc: 'Computers, monitors, lab equipment and studio devices. Smart power management and occupancy-based scheduling reduce standby consumption across studios and offices.'
      },
      cooling: {
        label: 'Cooling', value: '37 kWh/m²/yr', pct: 43, color: '#4A90D9',
        desc: 'Hybrid cooling system combining chilled ceilings and natural ventilation reduces HVAC load by ~30% vs a conventional building. Over 50% of spaces are naturally ventilated.'
      },
      lighting: {
        label: 'Lighting', value: '17 kWh/m²/yr', pct: 20, color: '#7ED321',
        desc: 'Full LED with daylight-linked dimming sensors. South-facing shading fins and deep overhangs maximise natural daylight, cutting artificial lighting hours significantly.'
      }
    };

    const BUILDING = {
      energy: { total: 86, components: [
        { label: 'Cooling',   value: 37, color: '#4A90D9' },
        { label: 'Equipment', value: 32, color: '#F5A623' },
        { label: 'Lighting',  value: 17, color: '#7ED321' },
      ]}
    };

    const chartPanel  = document.getElementById('chart-panel');
    const detailPanel = document.getElementById('detail-panel');
    const scanHint    = document.getElementById('scan-hint');
    let chartInstance = null;
    let foundTargets  = new Set();

    function showDetail(type) {
      const d = DETAILS[type];
      if (!d) return;
      document.getElementById('detail-title').textContent     = d.label;
      document.getElementById('detail-value').textContent     = d.value;
      document.getElementById('detail-desc').textContent      = d.desc;
      document.getElementById('detail-color-bar').style.background = d.color;
      document.getElementById('detail-bar-fill').style.background  = d.color;
      document.getElementById('detail-bar-fill').style.width = '0%';
      document.getElementById('detail-pct').textContent = `${d.pct}% of total energy use`;
      detailPanel.classList.add('visible');
      requestAnimationFrame(() => {
        document.getElementById('detail-bar-fill').style.width = d.pct + '%';
      });
    }

    function closeDetail() {
      detailPanel.classList.remove('visible');
    }

    // Close detail when tapping outside it
    detailPanel.addEventListener('click', e => {
      if (e.target === detailPanel) closeDetail();
    });

    function showChart() {
      if (!chartInstance) {
        const { components, total } = BUILDING.energy;
        document.getElementById('total-value').textContent = total + ' kWh/m²/yr';
        const legend = document.getElementById('legend');
        legend.innerHTML = '';
        components.forEach(c => {
          legend.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${c.color}"></div><span class="legend-label">${c.label}</span><span class="legend-value">${c.value}<span class="legend-pct"> kWh</span></span></div>`;
        });
        const ctx = document.getElementById('energy-chart').getContext('2d');
        chartInstance = new Chart(ctx, {
          type: 'doughnut',
          data: { labels: components.map(c => c.label), datasets: [{ data: components.map(c => c.value), backgroundColor: components.map(c => c.color), borderWidth: 2, borderColor: 'rgba(255,255,255,0.3)' }] },
          options: { cutout: '60%', plugins: { legend: { display: false } }, animation: { duration: 600 } }
        });
      }
      chartPanel.classList.add('visible');
      scanHint.style.opacity = '0';
    }

    function hideChart() {
      if (foundTargets.size === 0) {
        chartPanel.classList.remove('visible');
        closeDetail();
        scanHint.style.opacity = '1';
      }
    }

    document.querySelector('a-scene').addEventListener('loaded', () => {
      // Wire target found/lost
      for (let i = 0; i < 6; i++) {
        const el = document.getElementById(`target-${i}`);
        el.addEventListener('targetFound', () => { foundTargets.add(i); showChart(); });
        el.addEventListener('targetLost',  () => { foundTargets.delete(i); hideChart(); });
      }

      // Wire clickable labels via A-Frame click events
      document.querySelectorAll('a-plane.clickable').forEach(el => {
        el.addEventListener('click', () => showDetail(el.dataset.type));
      });
    });
  </script>
