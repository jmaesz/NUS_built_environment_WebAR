<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>SDE4 Thermal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100dvh; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }

    #camera-video {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover;
    }

    #thermal-canvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: none; pointer-events: none;
    }

    #back-btn {
      position: fixed; top: 16px; left: 16px; z-index: 1000;
      background: rgba(0,0,0,0.55); color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 9px 14px; font-size: 11px; letter-spacing: 0.1em;
      cursor: pointer; border-radius: 4px; text-decoration: none;
    }

    #thermal-btn {
      position: fixed; top: 16px; left: 90px; z-index: 1000;
      background: rgba(0,0,0,0.55); color: #ff7043;
      border: 1px solid rgba(255,112,67,0.4);
      padding: 9px 14px; font-size: 11px; letter-spacing: 0.1em;
      cursor: pointer; border-radius: 4px; font-family: -apple-system, sans-serif;
    }
    #thermal-btn.active { background: rgba(220,60,20,0.85); color: #fff; border-color: #ff7043; }

    #thermal-legend {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      z-index: 1000; display: none; flex-direction: column; align-items: center; gap: 4px;
      background: rgba(0,0,0,0.55); padding: 8px 14px; border-radius: 6px;
    }
    #thermal-legend.visible { display: flex; }
    #thermal-legend-bar {
      width: 140px; height: 10px; border-radius: 3px;
      background: linear-gradient(to right, #00008b, #00bfff, #00ff00, #ffff00, #ff4500, #8b0000);
    }
    #thermal-legend-labels { display: flex; justify-content: space-between; width: 140px; }
    #thermal-legend-labels span { font-size: 9px; color: #ddd; letter-spacing: 0.05em; }

    #hint {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      z-index: 1000; background: rgba(0,0,0,0.55); color: #fff;
      padding: 11px 18px; font-size: 11px; letter-spacing: 0.1em;
      border-radius: 4px; pointer-events: none; white-space: nowrap;
    }
  </style>
</head>
<body>
  <video id="camera-video" autoplay playsinline muted></video>
  <canvas id="thermal-canvas"></canvas>

  <a href="/" id="back-btn">← BACK</a>
  <button id="thermal-btn" onclick="toggleThermal()">THERMAL</button>
  <div id="thermal-legend">
    <div id="thermal-legend-bar"></div>
    <div id="thermal-legend-labels"><span>COLD</span><span>HOT</span></div>
  </div>
  <div id="hint">POINT CAMERA AT SDE4 MODEL</div>

  <script>
    // ── Camera ───────────────────────────────────────────────────────────
    const video = document.getElementById('camera-video');
    navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } }, audio: false })
      .then(stream => { video.srcObject = stream; })
      .catch(err => console.error('Camera error:', err));

    // ── Thermal ──────────────────────────────────────────────────────────
    const BUILDING_COLORS = [
      { h: 180 }, // SDE4 — teal rgb(26,189,189)
    ];

    function matchBuilding(h, s, v) {
      const brightTeal = s >= 0.35 && v >= 0.35;
      const shadowTeal = s >= 0.55 && v >= 0.15;
      if (!brightTeal && !shadowTeal) return false;
      for (const b of BUILDING_COLORS) {
        const dh = Math.min(Math.abs(h - b.h), 360 - Math.abs(h - b.h));
        if (dh <= 24) return true;
      }
      return false;
    }

    function rgbToHsv(r, g, b) {
      const rr = r/255, gg = g/255, bb = b/255;
      const max = Math.max(rr,gg,bb), min = Math.min(rr,gg,bb), d = max-min;
      const s = max === 0 ? 0 : d/max;
      let h = 0;
      if (d !== 0) {
        if (max === rr)      h = ((gg-bb)/d % 6 + 6) % 6;
        else if (max === gg) h = (bb-rr)/d + 2;
        else                 h = (rr-gg)/d + 4;
        h *= 60;
      }
      return [h, s, max];
    }

    function jetColor(t) {
      const c = v => Math.round(255 * Math.max(0, Math.min(1, v)));
      return [c(1.5-Math.abs(4*t-3)), c(1.5-Math.abs(4*t-2)), c(1.5-Math.abs(4*t-1))];
    }

    const THERMAL_W = 640, THERMAL_H = 480;
    const T_X0 = Math.round(THERMAL_W * 0.10), T_X1 = Math.round(THERMAL_W * 0.90);
    const T_Y0 = Math.round(THERMAL_H * 0.05), T_Y1 = Math.round(THERMAL_H * 0.75);

    let thermalActive = false, thermalAnimId = null;
    let thermalCanvas = null, thermalCtx = null;
    let lockedMinY = -1, lockedMaxY = -1;

    function setupThermalCanvas() {
      if (thermalCanvas) return true;
      if (video.readyState < 1) return false;
      thermalCanvas = document.getElementById('thermal-canvas');
      thermalCanvas.width = THERMAL_W;
      thermalCanvas.height = THERMAL_H;
      thermalCtx = thermalCanvas.getContext('2d', { willReadFrequently: true });
      return true;
    }

    function thermalLoop() {
      if (!thermalActive || !thermalCanvas) return;
      if (video.readyState >= 2) {
        thermalCtx.drawImage(video, 0, 0, THERMAL_W, THERMAL_H);
        const img = thermalCtx.getImageData(0, 0, THERMAL_W, THERMAL_H);
        const d = img.data;

        // Pass 1 — lock minY/maxY on first valid frame
        if (lockedMinY < 0) {
          let minY = THERMAL_H, maxY = 0;
          for (let i = 0; i < d.length; i += 4) {
            const px = (i>>2) % THERMAL_W, py = Math.floor((i>>2) / THERMAL_W);
            if (px < T_X0 || px >= T_X1 || py < T_Y0 || py >= T_Y1) continue;
            const [h,s,v] = rgbToHsv(d[i], d[i+1], d[i+2]);
            if (matchBuilding(h,s,v)) { if (py < minY) minY = py; if (py > maxY) maxY = py; }
          }
          if (minY <= maxY) { lockedMinY = minY; lockedMaxY = maxY; }
        }

        const useMinY = lockedMinY < 0 ? 0 : lockedMinY;
        const useMaxY = lockedMaxY < 0 ? THERMAL_H : lockedMaxY;
        const yRange = Math.max(useMaxY - useMinY, 1);

        // Pass 2 — apply thermal colour using locked gradient
        for (let i = 0; i < d.length; i += 4) {
          const px = (i>>2) % THERMAL_W, py = Math.floor((i>>2) / THERMAL_W);
          d[i+3] = 0;
          if (px < T_X0 || px >= T_X1 || py < T_Y0 || py >= T_Y1) continue;
          const [h,s,v] = rgbToHsv(d[i], d[i+1], d[i+2]);
          if (matchBuilding(h,s,v)) {
            const lum = (d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114) / 255;
            const yNorm = (py - useMinY) / yRange;
            const posTemp = 0.90 - yNorm * 0.82;
            const temp = Math.max(0, Math.min(1, posTemp + (lum-0.5)*0.20));
            const [tr,tg,tb] = jetColor(temp);
            d[i]=tr; d[i+1]=tg; d[i+2]=tb; d[i+3]=255;
          }
        }
        thermalCtx.putImageData(img, 0, 0);
      }
      thermalAnimId = requestAnimationFrame(thermalLoop);
    }

    function enableThermal() {
      if (!setupThermalCanvas()) { console.warn('Camera not ready'); return; }
      thermalActive = true;
      thermalCanvas.style.display = 'block';
      document.getElementById('thermal-btn').classList.add('active');
      document.getElementById('thermal-legend').classList.add('visible');
      thermalAnimId = requestAnimationFrame(thermalLoop);
    }

    function disableThermal() {
      thermalActive = false;
      lockedMinY = -1; lockedMaxY = -1;
      if (thermalCanvas) thermalCanvas.style.display = 'none';
      document.getElementById('thermal-btn').classList.remove('active');
      document.getElementById('thermal-legend').classList.remove('visible');
      if (thermalAnimId) { cancelAnimationFrame(thermalAnimId); thermalAnimId = null; }
    }

    function toggleThermal() {
      if (thermalActive) disableThermal(); else enableThermal();
    }
  </script>
</body>
</html>
