<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Campus AR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100dvh; overflow: hidden; font-family: sans-serif; }

    #back-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 999;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 10px 16px;
      font-size: 12px;
      letter-spacing: 0.1em;
      cursor: pointer;
      border-radius: 2px;
      text-decoration: none;
    }

    #scan-hint {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 12px 20px;
      font-size: 12px;
      letter-spacing: 0.08em;
      border-radius: 2px;
      text-align: center;
      pointer-events: none;
      transition: opacity 0.4s;
      white-space: nowrap;
    }

    #info-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 999;
      background: rgba(10,10,10,0.88);
      color: #f5f4f0;
      padding: 20px 24px 40px;
      transform: translateY(100%);
      transition: transform 0.4s ease;
      border-top: 1px solid rgba(255,255,255,0.15);
    }

    #info-panel.visible { transform: translateY(0); }

    #info-name {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    #info-desc {
      font-size: 12px;
      line-height: 1.75;
      color: #ccc;
    }
  </style>
</head>
<body>
  <a href="/" id="back-btn">← BACK</a>
  <div id="scan-hint">POINT CAMERA AT A BUILDING</div>
  <div id="info-panel">
    <div id="info-name"></div>
    <div id="info-desc"></div>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: /ar/targets.mind; autoStart: true; uiLoading: yes; uiError: yes; uiScanning: yes;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <a-asset-item id="campus-model" src="/scene.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Target 0: SDE4 -->
    <a-entity id="target-sde4" mindar-image-target="targetIndex: 0">
      <a-entity
        gltf-model="#campus-model"
        scale="0.005 0.005 0.005"
        position="0 0 0"
        rotation="0 0 0"
        id="model-sde4"
      ></a-entity>
    </a-entity>
  </a-scene>

  <script>
    const buildings = {
      'target-sde4': {
        name: 'SDE4',
        nodeName: 'SDE4',
        desc: "Singapore's first new-build net-zero energy building; features 1,200+ rooftop solar panels, a hybrid cooling system, and over 50% naturally ventilated space. Generates more energy than it consumes."
      }
    };

    const infoPanel = document.getElementById('info-panel');
    const infoName  = document.getElementById('info-name');
    const infoDesc  = document.getElementById('info-desc');
    const scanHint  = document.getElementById('scan-hint');

    function showInfo(building) {
      infoName.textContent = building.name;
      infoDesc.textContent = building.desc;
      infoPanel.classList.add('visible');
      scanHint.style.opacity = '0';
    }

    function hideInfo() {
      infoPanel.classList.remove('visible');
      scanHint.style.opacity = '1';
    }

    // Once model loads, hide all nodes except the relevant one per target
    function filterModel(modelEl, targetNodeName) {
      const mesh = modelEl.getObject3D('mesh');
      if (!mesh) return;
      mesh.traverse(obj => {
        obj.visible = (obj.name === targetNodeName || obj.name === '');
      });
    }

    Object.entries(buildings).forEach(([targetId, building]) => {
      const targetEl = document.getElementById(targetId);
      const modelEl  = document.getElementById('model-' + targetId.replace('target-', ''));

      targetEl.addEventListener('targetFound', () => {
        showInfo(building);
        filterModel(modelEl, building.nodeName);
      });

      targetEl.addEventListener('targetLost', () => hideInfo());

      modelEl.addEventListener('model-loaded', () => {
        filterModel(modelEl, building.nodeName);
      });
    });
  </script>
</body>
</html>
