<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Campus AR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100dvh; overflow: hidden; font-family: -apple-system, sans-serif; }

    #back-btn {
      position: fixed; top: 16px; left: 16px; z-index: 999;
      background: rgba(0,0,0,0.55); color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 9px 14px; font-size: 11px; letter-spacing: 0.1em;
      cursor: pointer; border-radius: 4px; text-decoration: none;
    }

    #scan-hint {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      z-index: 999; background: rgba(0,0,0,0.55); color: #fff;
      padding: 11px 18px; font-size: 11px; letter-spacing: 0.1em;
      border-radius: 4px; pointer-events: none; transition: opacity 0.4s; white-space: nowrap;
    }

    #ar-canvas {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh;
      pointer-events: none; z-index: 10;
    }

    /* ── Chart panel ── */
    #chart-panel {
      position: fixed; top: 12px; right: 12px; z-index: 999;
      width: 200px; background: rgba(255,255,255,0.93);
      border-radius: 10px; padding: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      opacity: 0; transform: translateX(16px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      pointer-events: none;
    }
    #chart-panel.visible { opacity: 1; transform: translateX(0); pointer-events: auto; }
    #chart-building-name { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #111; margin-bottom: 2px; }
    #chart-subtitle { font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; color: #888; margin-bottom: 10px; }
    #chart-container { position: relative; width: 100%; height: 130px; margin-bottom: 10px; }
    .legend { display: flex; flex-direction: column; gap: 6px; }
    .legend-item { display: flex; align-items: center; gap: 7px; }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { font-size: 10px; color: #444; flex: 1; }
    .legend-value { font-size: 10px; font-weight: 600; color: #111; }
    .legend-pct { font-size: 9px; color: #888; margin-left: 2px; }
    .divider { height: 1px; background: #eee; margin: 10px 0; }
    #total-row { display: flex; justify-content: space-between; align-items: center; }
    #total-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; color: #888; }
    #total-value { font-size: 11px; font-weight: 700; color: #111; }

    /* ── Bottom panel ── */
    #bottom-panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 999;
      background: rgba(10,10,10,0.92); border-top: 1px solid rgba(255,255,255,0.12);
      transform: translateY(100%); transition: transform 0.4s ease;
    }
    #bottom-panel.visible { transform: translateY(0); }
    #bottom-collapsed { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
    #bottom-bname { font-size: 14px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #fff; }
    #bottom-tagline { font-size: 10px; color: #aaa; margin-top: 2px; letter-spacing: 0.04em; }
    #details-btn {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; padding: 8px 14px; font-size: 10px; letter-spacing: 0.1em;
      text-transform: uppercase; border-radius: 4px; cursor: pointer;
      white-space: nowrap; flex-shrink: 0; margin-left: 12px; transition: background 0.2s;
    }
    #details-btn:active { background: rgba(255,255,255,0.2); }
    #bottom-expanded { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
    #bottom-expanded.open { max-height: 400px; }
    #bottom-expanded-inner { padding: 0 20px 24px; display: flex; flex-direction: column; gap: 14px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 14px; }
    .detail-item { display: flex; gap: 12px; align-items: flex-start; }
    .detail-color-bar { width: 3px; border-radius: 2px; flex-shrink: 0; align-self: stretch; min-height: 40px; }
    .detail-content { flex: 1; }
    .detail-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
    .detail-name { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #fff; }
    .detail-val { font-size: 11px; font-weight: 600; color: #fff; }
    .detail-desc { font-size: 10px; line-height: 1.6; color: #999; }
    .detail-bar-bg { height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 6px; overflow: hidden; }
    .detail-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
  </style>
</head>
<body>
  <a href="/" id="back-btn">← BACK</a>
  <div id="scan-hint">POINT CAMERA AT A BUILDING</div>

  <canvas id="ar-canvas"></canvas>

  <div id="chart-panel">
    <div id="chart-building-name"></div>
    <div id="chart-subtitle">Energy Use Intensity</div>
    <div id="chart-container"><canvas id="energy-chart"></canvas></div>
    <div class="legend" id="legend"></div>
    <div class="divider"></div>
    <div id="total-row">
      <span id="total-label">Total EUI</span>
      <span id="total-value"></span>
    </div>
  </div>

  <div id="bottom-panel">
    <div id="bottom-collapsed">
      <div>
        <div id="bottom-bname"></div>
        <div id="bottom-tagline"></div>
      </div>
      <button id="details-btn" onclick="toggleDetails()">SEE DETAILS ↑</button>
    </div>
    <div id="bottom-expanded">
      <div id="bottom-expanded-inner"></div>
    </div>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: /ar/targets.mind; autoStart: true; uiLoading: yes; uiError: yes; uiScanning: yes; filterMinCF: 0.001; filterBeta: 0.01;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity id="target-sde4" mindar-image-target="targetIndex: 0"></a-entity>
  </a-scene>

  <script>
    // ── Building data ──────────────────────────────────────────────────
    // Corners are in the target entity's LOCAL space (A-Frame units).
    // SDE4: GLB size 85.2 × 60.4 × 25.1m, scale 0.01, rotation -90 270 0
    //   GLB+X→A-Frame+Z, GLB+Y→A-Frame+X, GLB+Z→A-Frame+Y
    //   Front face (east/+X) at Z=0, back face at Z=-0.852
    //   Half-Y = 0.302 (left/right), half-Z = 0.1257 (up/down)
    const BUILDINGS = {
      sde4: {
        name: 'SDE4',
        tagline: 'Net-zero energy · NUS School of Design & Environment',
        color: { fill: 'rgba(0,210,90,0.30)', stroke: '#00ff6a', lineWidth: 2.5 },
        corners: [
          [ 0.302,  0.1257,  0],      [-0.302,  0.1257,  0],
          [-0.302, -0.1257,  0],      [ 0.302, -0.1257,  0],
          [ 0.302,  0.1257, -0.852],  [-0.302,  0.1257, -0.852],
          [-0.302, -0.1257, -0.852],  [ 0.302, -0.1257, -0.852],
        ],
        energy: {
          total: 86,
          components: [
            { label: 'Cooling',   value: 37, color: '#4A90D9', desc: 'Hybrid cooling system combining chilled ceilings and natural ventilation reduces HVAC load by ~30% vs a conventional building. Over 50% of spaces are naturally ventilated.' },
            { label: 'Equipment', value: 32, color: '#F5A623', desc: 'Computers, monitors, lab equipment and studio devices. Smart power management and occupancy-based scheduling reduce standby consumption across studios and offices.' },
            { label: 'Lighting',  value: 17, color: '#7ED321', desc: 'Full LED with daylight-linked dimming sensors. South-facing shading fins and deep overhangs maximise natural daylight, cutting artificial lighting hours significantly.' },
          ]
        }
      }
    };

    // ── 2-D convex hull (Andrew's monotone chain) ──────────────────────
    function convexHull(pts) {
      if (pts.length < 3) return pts;
      pts = pts.slice().sort((a, b) => a.x !== b.x ? a.x - b.x : a.y - b.y);
      const cross = (O, A, B) => (A.x - O.x) * (B.y - O.y) - (A.y - O.y) * (B.x - O.x);
      const lower = [], upper = [];
      for (const p of pts) {
        while (lower.length >= 2 && cross(lower[lower.length-2], lower[lower.length-1], p) <= 0) lower.pop();
        lower.push(p);
      }
      for (let i = pts.length - 1; i >= 0; i--) {
        const p = pts[i];
        while (upper.length >= 2 && cross(upper[upper.length-2], upper[upper.length-1], p) <= 0) upper.pop();
        upper.push(p);
      }
      upper.pop(); lower.pop();
      return lower.concat(upper);
    }

    // ── Canvas & projection ────────────────────────────────────────────
    const arCanvas = document.getElementById('ar-canvas');
    const ctx2d = arCanvas.getContext('2d');

    function resizeCanvas() {
      arCanvas.width  = window.innerWidth;
      arCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    let activeTarget = null;   // { targetObj, building }

    function projectAndDraw() {
      ctx2d.clearRect(0, 0, arCanvas.width, arCanvas.height);
      if (!activeTarget) return;

      const { targetObj, building } = activeTarget;
      const scene  = document.querySelector('a-scene');
      const camera = scene.camera;
      const W = arCanvas.width, H = arCanvas.height;

      const screenPts = [];
      for (const [lx, ly, lz] of building.corners) {
        const wp = new THREE.Vector3(lx, ly, lz);
        targetObj.localToWorld(wp);
        const ndc = wp.project(camera);
        if (ndc.z > 1) continue;               // behind camera — skip
        screenPts.push({ x: (ndc.x + 1) / 2 * W, y: (-ndc.y + 1) / 2 * H });
      }

      if (screenPts.length < 3) return;
      const hull = convexHull(screenPts);
      if (hull.length < 3) return;

      const { fill, stroke, lineWidth } = building.color;
      ctx2d.beginPath();
      ctx2d.moveTo(hull[0].x, hull[0].y);
      for (let i = 1; i < hull.length; i++) ctx2d.lineTo(hull[i].x, hull[i].y);
      ctx2d.closePath();
      ctx2d.fillStyle   = fill;
      ctx2d.fill();
      ctx2d.strokeStyle = stroke;
      ctx2d.lineWidth   = lineWidth;
      ctx2d.stroke();
    }

    function loop() { projectAndDraw(); requestAnimationFrame(loop); }

    // ── UI helpers ─────────────────────────────────────────────────────
    const chartPanel = document.getElementById('chart-panel');
    const bottomPanel = document.getElementById('bottom-panel');
    const scanHint    = document.getElementById('scan-hint');
    const expandedEl  = document.getElementById('bottom-expanded');
    let chartInstance = null, detailsOpen = false;

    function toggleDetails() {
      detailsOpen = !detailsOpen;
      expandedEl.classList.toggle('open', detailsOpen);
      document.getElementById('details-btn').textContent = detailsOpen ? 'HIDE ↓' : 'SEE DETAILS ↑';
    }

    function renderChart(b) {
      document.getElementById('chart-building-name').textContent = b.name;
      const { components, total } = b.energy;
      document.getElementById('total-value').textContent = total + ' kWh/m²/yr';
      const legend = document.getElementById('legend');
      legend.innerHTML = '';
      components.forEach(c => {
        legend.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${c.color}"></div><span class="legend-label">${c.label}</span><span class="legend-value">${c.value}<span class="legend-pct"> kWh</span></span></div>`;
      });
      if (chartInstance) chartInstance.destroy();
      const ctx = document.getElementById('energy-chart').getContext('2d');
      chartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: { labels: components.map(c => c.label), datasets: [{ data: components.map(c => c.value), backgroundColor: components.map(c => c.color), borderWidth: 2, borderColor: '#fff' }] },
        options: { cutout: '60%', plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.raw} kWh/m²/yr` } } }, animation: { duration: 600 } }
      });
    }

    function renderBottom(b) {
      document.getElementById('bottom-bname').textContent = b.name;
      document.getElementById('bottom-tagline').textContent = b.tagline;
      const inner = document.getElementById('bottom-expanded-inner');
      const { components, total } = b.energy;
      inner.innerHTML = '';
      components.forEach(c => {
        const pct = Math.round((c.value / total) * 100);
        inner.innerHTML += `<div class="detail-item"><div class="detail-color-bar" style="background:${c.color}"></div><div class="detail-content"><div class="detail-header"><span class="detail-name">${c.label}</span><span class="detail-val">${c.value} kWh/m²/yr</span></div><div class="detail-desc">${c.desc}</div><div class="detail-bar-bg"><div class="detail-bar-fill" style="width:${pct}%; background:${c.color}"></div></div></div></div>`;
      });
    }

    function showBuilding(b) {
      renderChart(b); renderBottom(b);
      chartPanel.classList.add('visible');
      bottomPanel.classList.add('visible');
      scanHint.style.opacity = '0';
    }

    function hideBuilding() {
      chartPanel.classList.remove('visible');
      bottomPanel.classList.remove('visible');
      scanHint.style.opacity = '1';
      detailsOpen = false;
      expandedEl.classList.remove('open');
      document.getElementById('details-btn').textContent = 'SEE DETAILS ↑';
    }

    // ── MindAR wiring ──────────────────────────────────────────────────
    document.querySelector('a-scene').addEventListener('loaded', () => {
      const targetEl = document.getElementById('target-sde4');

      targetEl.addEventListener('targetFound', () => {
        activeTarget = { targetObj: targetEl.object3D, building: BUILDINGS.sde4 };
        showBuilding(BUILDINGS.sde4);
      });

      targetEl.addEventListener('targetLost', () => {
        activeTarget = null;
        ctx2d.clearRect(0, 0, arCanvas.width, arCanvas.height);
        hideBuilding();
      });

      requestAnimationFrame(loop);
    });
  </script>
</body>
</html>
