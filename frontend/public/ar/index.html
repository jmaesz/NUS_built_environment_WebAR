<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100dvh; overflow: hidden; font-family: -apple-system, sans-serif; }

    #back-btn {
      position: fixed; top: 16px; left: 16px; z-index: 999;
      background: rgba(0,0,0,0.55); color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 9px 14px; font-size: 11px; letter-spacing: 0.1em;
      cursor: pointer; border-radius: 4px; text-decoration: none;
    }

    #scan-hint {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      z-index: 999; background: rgba(0,0,0,0.55); color: #fff;
      padding: 11px 18px; font-size: 11px; letter-spacing: 0.1em;
      border-radius: 4px; pointer-events: none; transition: opacity 0.4s; white-space: nowrap;
    }

    /* translucent frosted chart panel */
    #chart-panel {
      position: fixed; top: 12px; right: 12px; z-index: 999;
      width: 200px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 10px; padding: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      opacity: 0; transform: translateX(16px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      pointer-events: none;
    }
    #chart-panel.visible { opacity: 1; transform: translateX(0); pointer-events: auto; }
    #chart-building-name { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #111; margin-bottom: 2px; }
    #chart-subtitle { font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; color: #555; margin-bottom: 10px; }
    #chart-container { position: relative; width: 100%; height: 130px; margin-bottom: 10px; }
    .legend { display: flex; flex-direction: column; gap: 6px; }
    .legend-item { display: flex; align-items: center; gap: 7px; }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { font-size: 10px; color: #333; flex: 1; }
    .legend-value { font-size: 10px; font-weight: 600; color: #111; }
    .legend-pct { font-size: 9px; color: #555; margin-left: 2px; }
    .divider { height: 1px; background: rgba(0,0,0,0.12); margin: 10px 0; }
    #total-row { display: flex; justify-content: space-between; align-items: center; }
    #total-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; color: #555; }
    #total-value { font-size: 11px; font-weight: 700; color: #111; }
  </style>
</head>

  <script>
    const BUILDING = {
      name: 'SDE4',
      energy: {
        total: 86,
        components: [
          { label: 'Cooling',   value: 37, color: '#4A90D9' },
          { label: 'Equipment', value: 32, color: '#F5A623' },
          { label: 'Lighting',  value: 17, color: '#7ED321' },
        ]
      }
    };

    const chartPanel = document.getElementById('chart-panel');
    const scanHint  = document.getElementById('scan-hint');
    let chartInstance = null;
    let foundTargets = new Set();

    function showChart() {
      if (!chartInstance) {
        const { components, total } = BUILDING.energy;
        document.getElementById('total-value').textContent = total + ' kWh/m²/yr';
        const legend = document.getElementById('legend');
        legend.innerHTML = '';
        components.forEach(c => {
          legend.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${c.color}"></div><span class="legend-label">${c.label}</span><span class="legend-value">${c.value}<span class="legend-pct"> kWh</span></span></div>`;
        });
        const ctx = document.getElementById('energy-chart').getContext('2d');
        chartInstance = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: components.map(c => c.label),
            datasets: [{ data: components.map(c => c.value), backgroundColor: components.map(c => c.color), borderWidth: 2, borderColor: 'rgba(255,255,255,0.4)' }]
          },
          options: { cutout: '60%', plugins: { legend: { display: false } }, animation: { duration: 600 } }
        });
      }
      chartPanel.classList.add('visible');
      scanHint.style.opacity = '0';
    }

    function hideChart() {
      if (foundTargets.size === 0) {
        chartPanel.classList.remove('visible');
        scanHint.style.opacity = '1';
      }
    }

    document.querySelector('a-scene').addEventListener('loaded', () => {
      for (let i = 0; i < 6; i++) {
        const el = document.getElementById(`target-${i}`);
        el.addEventListener('targetFound', () => { foundTargets.add(i); showChart(); });
        el.addEventListener('targetLost',  () => { foundTargets.delete(i); hideChart(); });
      }
    });
