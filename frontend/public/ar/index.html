<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Campus AR</title>

  <!-- A-Frame must load before xrextras so AFRAME is defined when xrextras registers components -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <!-- xrextras: A-Frame components for 8th Wall (named-image-target, loading UI, etc.) -->
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras/dist/xrextras.js"></script>
  <!-- 8th Wall open source engine binary — no app key needed. slam chunk required for image targets -->
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async data-preload-chunks="slam"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100dvh; overflow: hidden; font-family: -apple-system, sans-serif; }

    #back-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 999;
      background: rgba(0,0,0,0.55);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 9px 14px;
      font-size: 11px;
      letter-spacing: 0.1em;
      cursor: pointer;
      border-radius: 4px;
      text-decoration: none;
    }

    #scan-hint {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      background: rgba(0,0,0,0.55);
      color: #fff;
      padding: 11px 18px;
      font-size: 11px;
      letter-spacing: 0.1em;
      border-radius: 4px;
      pointer-events: none;
      transition: opacity 0.4s;
      white-space: nowrap;
    }

    #chart-panel {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 999;
      width: 200px;
      background: rgba(255,255,255,0.93);
      border-radius: 10px;
      padding: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      opacity: 0;
      transform: translateX(16px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      pointer-events: none;
    }
    #chart-panel.visible {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }
    #chart-building-name {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #111;
      margin-bottom: 2px;
    }
    #chart-subtitle {
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 10px;
    }
    #chart-container {
      position: relative;
      width: 100%;
      height: 130px;
      margin-bottom: 10px;
    }
    .legend { display: flex; flex-direction: column; gap: 6px; }
    .legend-item { display: flex; align-items: center; gap: 7px; }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { font-size: 10px; color: #444; flex: 1; }
    .legend-value { font-size: 10px; font-weight: 600; color: #111; }
    .legend-pct { font-size: 9px; color: #888; margin-left: 2px; }
    .divider { height: 1px; background: #eee; margin: 10px 0; }
    #total-row { display: flex; justify-content: space-between; align-items: center; }
    #total-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; color: #888; }
    #total-value { font-size: 11px; font-weight: 700; color: #111; }

    #bottom-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 999;
      background: rgba(10,10,10,0.92);
      border-top: 1px solid rgba(255,255,255,0.12);
      transform: translateY(100%);
      transition: transform 0.4s ease;
    }
    #bottom-panel.visible { transform: translateY(0); }

    #bottom-collapsed {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #bottom-bname {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #fff;
    }
    #bottom-tagline {
      font-size: 10px;
      color: #aaa;
      margin-top: 2px;
      letter-spacing: 0.04em;
    }
    #details-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 8px 14px;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      margin-left: 12px;
      transition: background 0.2s;
    }
    #details-btn:active { background: rgba(255,255,255,0.2); }

    #bottom-expanded {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
    }
    #bottom-expanded.open { max-height: 400px; }

    #bottom-expanded-inner {
      padding: 0 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 14px;
    }

    .detail-item { display: flex; gap: 12px; align-items: flex-start; }
    .detail-color-bar { width: 3px; border-radius: 2px; flex-shrink: 0; align-self: stretch; min-height: 40px; }
    .detail-content { flex: 1; }
    .detail-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
    .detail-name { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #fff; }
    .detail-val { font-size: 11px; font-weight: 600; color: #fff; }
    .detail-desc { font-size: 10px; line-height: 1.6; color: #999; }
    .detail-bar-bg { height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 6px; overflow: hidden; }
    .detail-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
  </style>
</head>
<body>
  <a href="/" id="back-btn">← BACK</a>
  <div id="scan-hint">POINT CAMERA AT A BUILDING</div>

  <div id="chart-panel">
    <div id="chart-building-name"></div>
    <div id="chart-subtitle">Energy Use Intensity</div>
    <div id="chart-container">
      <canvas id="energy-chart"></canvas>
    </div>
    <div class="legend" id="legend"></div>
    <div class="divider"></div>
    <div id="total-row">
      <span id="total-label">Total EUI</span>
      <span id="total-value"></span>
    </div>
  </div>

  <div id="bottom-panel">
    <div id="bottom-collapsed">
      <div>
        <div id="bottom-bname"></div>
        <div id="bottom-tagline"></div>
      </div>
      <button id="details-btn" onclick="toggleDetails()">SEE DETAILS ↑</button>
    </div>
    <div id="bottom-expanded">
      <div id="bottom-expanded-inner"></div>
    </div>
  </div>

  <script>
    // Configure 8th Wall image targets once the engine is ready
    const configure8thWall = async () => {
      const targetData = await fetch('/ar/image-targets/sde4.json').then(r => r.json())
      XR8.XrController.configure({ imageTargetData: [targetData] })
    }
    window.XR8 ? configure8thWall() : window.addEventListener('xrloaded', configure8thWall)

    // Highlight component: applies green material to all meshes in the GLB
    AFRAME.registerComponent('highlight-building', {
      schema: {
        active:     { type: 'boolean', default: false },
        r: { type: 'number', default: 0.2 },
        g: { type: 'number', default: 0.9 },
        b: { type: 'number', default: 0.5 },
      },
      init() {
        this._cached   = false;
        this._meshes   = [];
        this._origMats = new Map();
        this._hlMat    = null;
        this._lastActive = null;
        this.el.addEventListener('model-loaded', () => this._buildCache());
      },
      _buildCache() {
        const root = this.el.getObject3D('mesh');
        if (!root) return false;
        this._meshes = [];
        this._origMats = new Map();
        root.traverse(obj => {
          if (!obj.isMesh) return;
          this._origMats.set(obj, obj.material);
          this._meshes.push(obj);
        });
        const c = new THREE.Color(this.data.r, this.data.g, this.data.b);
        this._hlMat = new THREE.MeshBasicMaterial({ color: c, side: THREE.DoubleSide, transparent: true, opacity: 0.65, depthTest: false });
        this._cached = true;
        return true;
      },
      tick() {
        const active = this.data.active;
        if (active === this._lastActive) return;
        if (!this._cached && !this._buildCache()) return;
        this._lastActive = active;
        this._meshes.forEach(obj => {
          obj.renderOrder = active ? 999 : 0;
          obj.material    = active ? this._hlMat : this._origMats.get(obj);
        });
      },
      remove() {
        this._meshes.forEach(obj => {
          obj.renderOrder = 0;
          if (this._origMats.has(obj)) obj.material = this._origMats.get(obj);
        });
      }
    });
  </script>

  <a-scene
    xrconfig="disableWorldTracking: true"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <a-asset-item id="sde4-model" src="/models/sde4.glb"></a-asset-item>
    </a-assets>
    <a-light type="ambient" color="#ffffff" intensity="1.2"></a-light>
    <a-light type="directional" color="#ffffff" intensity="0.8" position="1 2 1"></a-light>

    <xrextras-named-image-target name="sde4" id="target-sde4">
      <a-entity
        gltf-model="#sde4-model"
        scale="0.01 0.01 0.01"
        position="0 0 0"
        rotation="-90 0 0"
        id="model-sde4"
        highlight-building="r: 0.2; g: 0.9; b: 0.5"
      ></a-entity>
    </xrextras-named-image-target>
  </a-scene>

  <script>
    const buildings = {
      'sde4': {
        name: 'SDE4',
        tagline: "Net-zero energy · NUS School of Design & Environment",
        energy: {
          total: 86,
          components: [
            { label: 'Cooling',   value: 37, color: '#4A90D9', desc: 'Hybrid cooling system combining chilled ceilings and natural ventilation reduces HVAC load by ~30% vs a conventional building. Over 50% of spaces are naturally ventilated.' },
            { label: 'Equipment', value: 32, color: '#F5A623', desc: 'Computers, monitors, lab equipment and studio devices. Smart power management and occupancy-based scheduling reduce standby consumption across studios and offices.' },
            { label: 'Lighting',  value: 17, color: '#7ED321', desc: 'Full LED with daylight-linked dimming sensors. South-facing shading fins and deep overhangs maximise natural daylight, cutting artificial lighting hours significantly.' },
          ]
        }
      }
    };

    const chartPanel  = document.getElementById('chart-panel');
    const bottomPanel = document.getElementById('bottom-panel');
    const scanHint    = document.getElementById('scan-hint');
    const expandedEl  = document.getElementById('bottom-expanded');
    let chartInstance = null;
    let detailsOpen   = false;

    function toggleDetails() {
      detailsOpen = !detailsOpen;
      expandedEl.classList.toggle('open', detailsOpen);
      document.getElementById('details-btn').textContent = detailsOpen ? 'HIDE ↓' : 'SEE DETAILS ↑';
    }

    function renderChart(building) {
      document.getElementById('chart-building-name').textContent = building.name;
      const { components, total } = building.energy;
      document.getElementById('total-value').textContent = total + ' kWh/m²/yr';
      const legend = document.getElementById('legend');
      legend.innerHTML = '';
      components.forEach(c => {
        legend.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${c.color}"></div><span class="legend-label">${c.label}</span><span class="legend-value">${c.value}<span class="legend-pct"> kWh</span></span></div>`;
      });
      if (chartInstance) chartInstance.destroy();
      const ctx = document.getElementById('energy-chart').getContext('2d');
      chartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: components.map(c => c.label),
          datasets: [{ data: components.map(c => c.value), backgroundColor: components.map(c => c.color), borderWidth: 2, borderColor: '#fff' }]
        },
        options: {
          cutout: '60%',
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.raw} kWh/m²/yr` } } },
          animation: { duration: 600 }
        }
      });
    }

    function renderBottom(building) {
      document.getElementById('bottom-bname').textContent = building.name;
      document.getElementById('bottom-tagline').textContent = building.tagline;
      const inner = document.getElementById('bottom-expanded-inner');
      const { components, total } = building.energy;
      inner.innerHTML = '';
      components.forEach(c => {
        const pct = Math.round((c.value / total) * 100);
        inner.innerHTML += `<div class="detail-item"><div class="detail-color-bar" style="background:${c.color}"></div><div class="detail-content"><div class="detail-header"><span class="detail-name">${c.label}</span><span class="detail-val">${c.value} kWh/m²/yr</span></div><div class="detail-desc">${c.desc}</div><div class="detail-bar-bg"><div class="detail-bar-fill" style="width:${pct}%; background:${c.color}"></div></div></div></div>`;
      });
    }

    function showPanels(building) {
      renderChart(building);
      renderBottom(building);
      chartPanel.classList.add('visible');
      bottomPanel.classList.add('visible');
      scanHint.style.opacity = '0';
    }

    function hidePanels() {
      chartPanel.classList.remove('visible');
      bottomPanel.classList.remove('visible');
      scanHint.style.opacity = '1';
      detailsOpen = false;
      expandedEl.classList.remove('open');
      document.getElementById('details-btn').textContent = 'SEE DETAILS ↑';
    }

    // Wire up image target events once the scene is loaded
    document.querySelector('a-scene').addEventListener('loaded', () => {
      const targetEl = document.getElementById('target-sde4');
      const modelEl  = document.getElementById('model-sde4');
      const building = buildings['sde4'];

      targetEl.addEventListener('xrextrasfound', () => {
        showPanels(building);
        modelEl.setAttribute('highlight-building', 'active', true);
      });
      targetEl.addEventListener('xrextraslost', () => {
        hidePanels();
        modelEl.setAttribute('highlight-building', 'active', false);
      });
    });
  </script>
</body>
</html>
