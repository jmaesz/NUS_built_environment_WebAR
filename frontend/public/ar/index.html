<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>SDE4 AR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100dvh; overflow: hidden; font-family: -apple-system, sans-serif; }

    #back-btn {
      position: fixed; top: 16px; left: 16px; z-index: 1000;
      background: rgba(0,0,0,0.55); color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 9px 14px; font-size: 11px; letter-spacing: 0.1em;
      cursor: pointer; border-radius: 4px; text-decoration: none;
    }
    #scan-hint {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      z-index: 1000; background: rgba(0,0,0,0.55); color: #fff;
      padding: 11px 18px; font-size: 11px; letter-spacing: 0.1em;
      border-radius: 4px; pointer-events: none; transition: opacity 0.4s; white-space: nowrap;
    }

    /* ── Chart panel ── */
    #chart-panel {
      position: fixed; top: 12px; right: 12px; z-index: 999;
      width: 220px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.35); border-radius: 10px; padding: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      opacity: 0; transform: translateX(16px);
      transition: opacity 0.35s ease, transform 0.35s ease; pointer-events: none;
    }
    #chart-panel.visible { opacity: 1; transform: translateX(0); pointer-events: auto; }
    #chart-building-name { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #111; margin-bottom: 2px; }
    #chart-subtitle { font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; color: #555; margin-bottom: 10px; }
    #chart-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    #chart-container { position: relative; width: 95px; height: 95px; flex-shrink: 0; }
    .legend { display: flex; flex-direction: column; gap: 7px; flex: 1; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { font-size: 9px; color: #333; flex: 1; }
    .legend-value { font-size: 9px; font-weight: 600; color: #111; }
    .divider { height: 1px; background: rgba(0,0,0,0.12); margin: 8px 0; }
    #total-row { display: flex; justify-content: space-between; align-items: center; }
    #total-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; color: #555; }
    #total-value { font-size: 11px; font-weight: 700; color: #111; }

    /* ── AR labels (HTML overlay, always clickable) ── */
    .ar-label {
      position: fixed; z-index: 998;
      transform: translate(-50%, -50%);
      display: none; align-items: center; gap: 8px;
      background: rgba(12, 12, 28, 0.93);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 8px; padding: 10px 13px 10px 10px;
      min-width: 110px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.45);
      cursor: pointer; pointer-events: auto;
      user-select: none; -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    .ar-label:active { opacity: 0.7; }
    .ar-label-bar { width: 3px; border-radius: 2px; height: 28px; flex-shrink: 0; }
    .ar-label-title {
      font-size: 12px; font-weight: 800; color: white;
      letter-spacing: 0.07em; text-transform: uppercase;
    }
    .ar-label-sub { font-size: 9px; color: rgba(255,255,255,0.42); margin-top: 2px; letter-spacing: 0.03em; }

    /* iPad and larger — bigger labels */
    @media (min-width: 768px) {
      .ar-label {
        gap: 10px; border-radius: 10px;
        padding: 14px 18px 14px 14px; min-width: 160px;
      }
      .ar-label-bar { width: 4px; height: 38px; }
      .ar-label-title { font-size: 15px; }
      .ar-label-sub { font-size: 10px; margin-top: 3px; }
    }

    /* ── Detail slide-up panel ── */
    #detail-panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 1001;
      background: rgba(10, 10, 18, 0.95);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px 20px 0 0;
      padding: 12px 24px 52px;
      transform: translateY(100%);
      transition: transform 0.45s cubic-bezier(0.34, 1.15, 0.64, 1);
    }
    #detail-panel.visible { transform: translateY(0); }
    #detail-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.18); border-radius: 2px; margin: 0 auto 22px; }
    #detail-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
    #detail-color-bar { width: 4px; height: 44px; border-radius: 2px; flex-shrink: 0; }
    #detail-title { font-size: 20px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; color: #fff; flex: 1; }
    #detail-value { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.55); margin-top: 3px; }
    #detail-close {
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.14);
      color: #fff; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    #detail-desc { font-size: 14px; line-height: 1.8; color: rgba(255,255,255,0.68); margin-bottom: 22px; }
    #detail-bar-bg { height: 5px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
    #detail-bar-fill { height: 100%; border-radius: 3px; transition: width 0.75s cubic-bezier(0.4,0,0.2,1); width: 0%; }
    #detail-pct { font-size: 10px; color: rgba(255,255,255,0.38); letter-spacing: 0.06em; text-transform: uppercase; }

    #maps-panel {
      position: fixed; bottom: 16px; right: 16px; z-index: 1000;
      width: 180px; border-radius: 12px; overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.25);
      display: none; opacity: 0; transform: translateY(8px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      -webkit-tap-highlight-color: transparent; text-decoration: none;
    }
    #maps-panel.visible { opacity: 1; transform: translateY(0); }
    #maps-panel-img-wrap { position: relative; }
    #maps-panel-img-wrap img { display: block; width: 100%; height: auto; }
    #maps-panel-top {
      position: absolute; top: 8px; left: 8px;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);
      border-radius: 6px; padding: 4px 8px;
      font-size: 12px; font-weight: 800; color: #fff; letter-spacing: 0.06em;
    }
    #maps-panel-bottom {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.72));
      padding: 18px 10px 10px;
    }
    #maps-panel-addr-lbl { font-size: 9px; color: rgba(255,255,255,0.75); line-height: 1.4; margin-bottom: 5px; }
    #maps-panel-cta {
      display: flex; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 700; color: #4fc3f7; letter-spacing: 0.04em;
    }
  </style>
</head>

          Open in Google Maps
        </div>
      </div>

  <!-- SVG overlay for annotation lines (anchor dot → top of label card) -->

    <div id="detail-bar-bg"><div id="detail-bar-fill"></div></div>

  </a-scene>

  <script>
    const DETAILS = {
      equipment: {
        label: 'Equipment', value: '32 kWh/m²/yr', pct: 37, color: '#F5A623',
        desc: 'Computers, monitors, lab equipment and studio devices. Smart power management and occupancy-based scheduling reduce standby consumption across studios and offices.'
      },
      cooling: {
        label: 'Cooling', value: '37 kWh/m²/yr', pct: 43, color: '#4A90D9',
        desc: 'Hybrid cooling system combining chilled ceilings and natural ventilation reduces HVAC load by ~30% vs a conventional building. Over 50% of spaces are naturally ventilated.'
      },
      lighting: {
        label: 'Lighting', value: '17 kWh/m²/yr', pct: 20, color: '#7ED321',
        desc: 'Full LED with daylight-linked dimming sensors. South-facing shading fins and deep overhangs maximise natural daylight, cutting artificial lighting hours significantly.'
      }
    };

    const BUILDING_ENERGY = { total: 86, components: [
      { label: 'Cooling', value: 37, color: '#4A90D9' },
      { label: 'Equipment', value: 32, color: '#F5A623' },
      { label: 'Lighting', value: 17, color: '#7ED321' },
    ]};

    const chartPanel  = document.getElementById('chart-panel');
    const detailPanel = document.getElementById('detail-panel');
    const scanHint    = document.getElementById('scan-hint');
    const mapsPanel   = document.getElementById('maps-panel');
    let chartInstance = null;
    let foundTargets  = new Set();
    let mapsHideTimer = null;

    // ── Detail panel ────────────────────────────────────────────────────
    function showDetail(type) {
      const d = DETAILS[type];
      if (!d) return;
      document.getElementById('detail-title').textContent = d.label;
      document.getElementById('detail-value').textContent = d.value;
      document.getElementById('detail-desc').textContent  = d.desc;
      document.getElementById('detail-color-bar').style.background  = d.color;
      document.getElementById('detail-bar-fill').style.background   = d.color;
      document.getElementById('detail-bar-fill').style.width        = '0%';
      document.getElementById('detail-pct').textContent = `${d.pct}% of total energy use`;
      detailPanel.classList.add('visible');
      requestAnimationFrame(() => {
        document.getElementById('detail-bar-fill').style.width = d.pct + '%';
      });
    }

    function closeDetail() { detailPanel.classList.remove('visible'); }

    // ── Chart ────────────────────────────────────────────────────────────
    function showChart() {
      if (!chartInstance) {
        const { components, total } = BUILDING_ENERGY;
        document.getElementById('total-value').textContent = total + ' kWh/m²/yr';
        const legend = document.getElementById('legend');
        legend.innerHTML = '';
        components.forEach(c => {
          legend.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${c.color}"></div><span class="legend-label">${c.label}</span><span class="legend-value">${c.value} kWh</span></div>`;
        });
        const ctx = document.getElementById('energy-chart').getContext('2d');
        chartInstance = new Chart(ctx, {
          type: 'doughnut',
          data: { labels: components.map(c=>c.label), datasets: [{ data: components.map(c=>c.value), backgroundColor: components.map(c=>c.color), borderWidth: 2, borderColor: 'rgba(255,255,255,0.3)' }] },
          options: { cutout: '60%', plugins: { legend: { display: false } }, animation: { duration: 600 } }
        });
      }
      chartPanel.classList.add('visible');
      scanHint.style.opacity = '0';
      if (mapsHideTimer) { clearTimeout(mapsHideTimer); mapsHideTimer = null; }
      mapsPanel.style.display = 'block';
      requestAnimationFrame(() => mapsPanel.classList.add('visible'));
    }

    function hideUI() {
      if (foundTargets.size > 0) return;
      chartPanel.classList.remove('visible');
      closeDetail();
      scanHint.style.opacity = '1';
      mapsPanel.classList.remove('visible');
      mapsHideTimer = setTimeout(() => { mapsPanel.style.display = 'none'; mapsHideTimer = null; }, 300);
      ['equipment','cooling','lighting'].forEach(t => {
        document.getElementById('ar-label-' + t).style.display = 'none';
        const l = document.getElementById('line-' + t);
        if (l) l.setAttribute('visibility', 'hidden');
      });
    }

    // ── HTML label overlay — projects 3D marker world pos → screen px ───
    const sceneEl = document.querySelector('a-scene');
    const _tmpVec  = new THREE.Vector3();
    const _tmpVec2 = new THREE.Vector3();

    // Local-space anchor positions (where the dot sits on the building surface)
    const ANCHOR_LOCAL = {
      equipment: [-0.22, -0.06, 0.013],
      cooling:   [ 0.05, -0.09, 0.013],
      lighting:  [ 0.26,  0.02, 0.013],
    };

    function updateOverlays() {
      if (foundTargets.size === 0) return;

      const camera = sceneEl.camera;
      if (!camera) return;

      const tIdx = [...foundTargets][0];
      const W = window.innerWidth, H = window.innerHeight;
      const PAD = 10;
      const targetEl = document.getElementById(`target-${tIdx}`);

      [['equipment','eq'],['cooling','co'],['lighting','li']].forEach(([type, sh]) => {
        const marker  = document.getElementById(`m-${sh}-${tIdx}`);
        const label   = document.getElementById(`ar-label-${type}`);
        const svgLine = document.getElementById(`line-${type}`);
        if (!marker || !label) return;

        // Project the label marker → desired screen position
        marker.object3D.getWorldPosition(_tmpVec);
        _tmpVec.project(camera);

        if (_tmpVec.z > 1) {
          label.style.display = 'none';
          if (svgLine) svgLine.setAttribute('visibility', 'hidden');
          return;
        }

        const sx = (_tmpVec.x + 1) / 2 * W;
        const sy = (-_tmpVec.y + 1) / 2 * H;

        // Show label so offsetWidth/Height are measurable
        label.style.display = 'flex';
        const hw = label.offsetWidth  / 2;
        const hh = label.offsetHeight / 2;

        // Clamp so label never clips any edge
        const cx = Math.max(hw + PAD, Math.min(W - hw - PAD, sx));
        const cy = Math.max(hh + PAD, Math.min(H - hh - PAD, sy));
        label.style.left = cx + 'px';
        label.style.top  = cy + 'px';

        // Draw SVG line: from building anchor dot → top-center of label
        if (svgLine && targetEl) {
          const [lx, ly, lz] = ANCHOR_LOCAL[type];
          _tmpVec2.set(lx, ly, lz);
          _tmpVec2.applyMatrix4(targetEl.object3D.matrixWorld);
          _tmpVec2.project(camera);
          const ax = (_tmpVec2.x + 1) / 2 * W;
          const ay = (-_tmpVec2.y + 1) / 2 * H;
          const rect = label.getBoundingClientRect();
          svgLine.setAttribute('x1', ax.toFixed(1));
          svgLine.setAttribute('y1', ay.toFixed(1));
          svgLine.setAttribute('x2', (rect.left + rect.width / 2).toFixed(1));
          svgLine.setAttribute('y2', rect.top.toFixed(1));
          svgLine.setAttribute('visibility', 'visible');
        }
      });
    }

    // Run overlay update at ~30 fps
    setInterval(updateOverlays, 33);

    // ── Audio narration ──────────────────────────────────────────────────
    const AUDIO_TEXT = `SDE 4, the School of Design and Environment 4, is NUS's first net-zero energy building. ` +
      `Completed in 2019, the building was designed by Serie Architects and Multiply Architects. ` +
      `It features a highly insulated building envelope, extensive rooftop solar panels that generate around 500 kilowatt-hours per day, ` +
      `and a smart building management system that monitors and optimises energy use in real time. ` +
      `SDE 4 accommodates over 1,200 students and staff, and serves as a living laboratory for sustainable design research.`;

    function pickFemaleVoice() {
      const voices = window.speechSynthesis.getVoices();
      return voices.find(v => /samantha|victoria|karen|moira|tessa|fiona|zira|google uk english female|google us english/i.test(v.name))
          || voices.find(v => v.lang.startsWith('en') && /female/i.test(v.name))
          || voices.find(v => v.lang.startsWith('en'))
          || voices[0] || null;
    }

    let speakerEl = null;

    function toggleAudio() {
      if (window.speechSynthesis.speaking) {
        window.speechSynthesis.cancel(); return;
      }
      const utter = new SpeechSynthesisUtterance(AUDIO_TEXT);
      utter.rate = 0.95;
      const trySpeak = () => {
        const v = pickFemaleVoice();
        if (v) utter.voice = v;
        window.speechSynthesis.speak(utter);
      };
      if (window.speechSynthesis.getVoices().length) { trySpeak(); }
      else { window.speechSynthesis.onvoiceschanged = trySpeak; }
    }

    function makeSpeakerFor(targetEl) {
      // Container — left of building, same Y as pin
      speakerEl = document.createElement('a-entity');
      speakerEl.setAttribute('position', '-0.52 0.325 0.02');

      const model = document.createElement('a-gltf-model');
      model.setAttribute('src', '/ar/volume.glb');
      model.setAttribute('scale', '0.083 0.083 0.083');
      speakerEl.appendChild(model);

      // Label below
      const label = document.createElement('a-text');
      label.setAttribute('value', "listen to building's detail");
      label.setAttribute('align', 'center');
      label.setAttribute('color', '#ffffff');
      label.setAttribute('position', '0 -0.08 0.001');
      label.setAttribute('width', '0.5');
      speakerEl.appendChild(label);

      targetEl.appendChild(speakerEl);

      // Direct Three.js raycasting on tap — bypasses A-Frame cursor issues in MindAR
      const speakerMeshes = [];
      model.addEventListener('model-loaded', () => {
        speakerEl.object3D.traverse(n => { if (n.isMesh) speakerMeshes.push(n); });
      });
      sceneEl.canvas.addEventListener('click', evt => {
        if (!speakerMeshes.length) return;
        const rect = sceneEl.canvas.getBoundingClientRect();
        const mouse = new THREE.Vector2(
          ((evt.clientX - rect.left) / rect.width) * 2 - 1,
          -((evt.clientY - rect.top) / rect.height) * 2 + 1
        );
        const ray = new THREE.Raycaster();
        ray.setFromCamera(mouse, sceneEl.camera);
        if (ray.intersectObjects(speakerMeshes, true).length > 0) toggleAudio();
      });
    }

    // ── MindAR wiring ────────────────────────────────────────────────────
    sceneEl.addEventListener('loaded', () => {
      // Strip any remaining red boxes / anchor dots
      document.querySelectorAll('[id^="target-"] a-box, [id^="target-"] a-sphere').forEach(el => el.remove());

      // ── Location pin: built once, added to all front-facing targets ──
      // From a front target (vertical wall), Y = up.
      // Building height ≈ 0.65 MindAR units → pin sits at Y=0.65 above center.
      // Z=0.05 floats it slightly in front of the wall so it's visible.
      const PIN_Y = 0.325;  // half building height
      const FRONT_TARGETS = new Set([0, 4, 5]); // FRONT, FRONT-LEFT, FRONT-RIGHT


      function makePinFor(targetEl) {
        const pin = document.createElement('a-gltf-model');
        pin.setAttribute('src', '/ar/map_pin.glb');
        pin.setAttribute('scale', '0.167 0.167 0.167');
        pin.setAttribute('position', `0 ${PIN_Y} 0`);
        pin.setAttribute('animation', 'property: position; from: 0 ' + PIN_Y + ' 0; to: 0 ' + (PIN_Y + 0.06) + ' 0; dir: alternate; dur: 1600; loop: true; easing: easeInOutSine');
        targetEl.appendChild(pin);
      }

      for (let i = 0; i < 6; i++) {
        const el = document.getElementById(`target-${i}`);
        if (!el) continue;
        if (FRONT_TARGETS.has(i)) { makePinFor(el); }
        if (i === 0) { makeSpeakerFor(el); }
        el.addEventListener('targetFound', () => { foundTargets.add(i); showChart(); });
        el.addEventListener('targetLost',  () => { foundTargets.delete(i); hideUI(); });
      }
    });
