<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Campus AR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100dvh; overflow: hidden; font-family: -apple-system, sans-serif; }
    a-scene, a-scene canvas, .a-canvas { position: fixed !important; top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important; object-fit: cover !important; }

    #back-btn {
      position: fixed; top: 16px; left: 16px; z-index: 1000;
      background: rgba(0,0,0,0.55); color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 9px 14px; font-size: 11px; letter-spacing: 0.1em;
      cursor: pointer; border-radius: 4px; text-decoration: none;
      display: block; width: 100px; text-align: center;
    }
    #scan-hint {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      z-index: 1000; background: rgba(0,0,0,0.55); color: #fff;
      padding: 11px 18px; font-size: 11px; letter-spacing: 0.1em;
      border-radius: 4px; pointer-events: none; transition: opacity 0.4s; white-space: nowrap;
    }

    /* ── Chart panel ── */
    #chart-panel {
      position: fixed; top: 16px; right: 12px; z-index: 999;
      width: 255px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.35); border-radius: 10px; padding: 0;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12); overflow: hidden;
      display: flex; flex-direction: row;
      opacity: 0; transform: translateX(16px);
      transition: opacity 0.35s ease, transform 0.35s ease, width 0.25s ease; pointer-events: none;
    }
    #chart-panel.visible { opacity: 1; transform: translateX(0); pointer-events: auto; }
    #chart-panel.collapsed { width: 22px; }
    .panel-tab {
      width: 22px; flex-shrink: 0; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.28); border-right: 1px solid rgba(255,255,255,0.3);
      font-size: 15px; color: rgba(255,255,255,0.85); user-select: none;
      transition: background 0.15s;
    }
    .panel-tab:hover { background: rgba(0,0,0,0.42); }
    #chart-content { flex: 1; padding: 14px; overflow: hidden; min-width: 0; }
    #chart-panel.collapsed #chart-content { visibility: hidden; }
    #chart-panel.collapsed #chart-tab { border-right: none; }
    #chart-building-name { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #111; margin-bottom: 2px; }
    #chart-subtitle { font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; color: #555; margin-bottom: 10px; }
    #chart-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    #chart-container { position: relative; width: 95px; height: 95px; flex-shrink: 0; }
    .legend { display: flex; flex-direction: column; gap: 7px; flex: 1; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { font-size: 9px; color: #333; flex: 1; }
    .legend-value { font-size: 9px; font-weight: 600; color: #111; }
    .divider { height: 1px; background: rgba(0,0,0,0.12); margin: 8px 0; }
    #total-row { display: flex; justify-content: space-between; align-items: center; }
    #total-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; color: #555; }
    #total-value { font-size: 11px; font-weight: 700; color: #111; }

    #maps-panel {
      position: fixed; bottom: 20px; right: 16px; z-index: 1000;
      width: 180px; border-radius: 12px; overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.25);
      display: none; opacity: 0; transform: translateY(8px);
      transition: opacity 0.3s ease, transform 0.3s ease, width 0.25s ease;
      -webkit-tap-highlight-color: transparent; text-decoration: none;
      flex-direction: row;
    }
    #maps-panel.visible { opacity: 1; transform: translateY(0); display: flex; }
    #maps-panel.collapsed { width: 22px; }
    #maps-content { flex: 1; overflow: hidden; min-width: 0; }
    #maps-panel.collapsed #maps-content { visibility: hidden; }
    #maps-panel.collapsed #maps-tab { border-right: none; }
    #maps-panel-img-wrap { position: relative; height: 110px; background: #1a1a2e; }
    #maps-panel-img-wrap img { display: block; width: 100%; height: 100%; object-fit: cover; }
    #maps-panel-top {
      position: absolute; top: 8px; left: 8px;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);
      border-radius: 6px; padding: 4px 8px;
      font-size: 12px; font-weight: 800; color: #fff; letter-spacing: 0.06em;
    }
    #maps-panel-bottom {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.72));
      padding: 18px 10px 10px;
    }
    #maps-panel-addr-lbl { font-size: 9px; color: rgba(255,255,255,0.75); line-height: 1.4; margin-bottom: 5px; }
    #maps-panel-cta {
      display: flex; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 700; color: #4fc3f7; letter-spacing: 0.04em;
    }

    #thermal-btn { display: none; }
    #orient-btn {
      position: fixed; top: 100px; left: 16px; z-index: 1000;
      width: 100px; text-align: center;
      background: rgba(0,0,0,0.55); color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 9px 14px; font-size: 11px; letter-spacing: 0.1em;
      cursor: pointer; border-radius: 4px; font-family: -apple-system, sans-serif;
      display: none;
    }
    #orient-btn.active { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.6); }
    @media (max-width: 768px) { #orient-btn { display: block; } }

    #ui-layer {
      position: fixed; inset: 0; z-index: 999; pointer-events: none;
      transition: transform 0.35s ease;
    }
    #ui-layer > * { pointer-events: auto; }
    #back-btn, #thermal-btn, #orient-btn, #scan-hint, #chart-panel, #maps-panel {
      position: absolute;
    }
    body.landscape #ui-layer {
      transform: rotate(90deg);
      width: 100vh; height: 100vw;
      top: calc((100vh - 100vw) / 2);
      left: calc((100vw - 100vh) / 2);
      right: auto; bottom: auto;
    }
    body.landscape #chart-panel { right: 100px; top: 5px; }
    body.landscape #maps-panel  { right: 100px; bottom: 40px; }
  </style>
</head>
<body>
  <div id="ui-layer">
    <a href="/" id="back-btn" onclick="window.location.href='/'; return false;">← BACK</a>
    <button id="thermal-btn" onclick="toggleThermal()">HIGHLIGHT</button>
    <button id="orient-btn" onclick="toggleOrient()">⇄ LANDSCAPE</button>

    <a id="maps-panel" href="#" target="_blank" rel="noopener">
      <div class="panel-tab" id="maps-tab" onclick="event.stopPropagation(); event.preventDefault(); toggleCollapse('maps')"><span id="maps-chevron">‹</span></div>
      <div id="maps-content">
        <div id="maps-panel-img-wrap">
          <img id="maps-panel-img" src="" alt="Building" style="display:none">
          <div id="maps-panel-top">—</div>
          <div id="maps-panel-bottom">
            <div id="maps-panel-addr-lbl">NUS Campus</div>
            <div id="maps-panel-cta">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="#4fc3f7"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
              Open in Google Maps
            </div>
          </div>
        </div>
      </div>
    </a>

    <div id="scan-hint">POINT CAMERA AT A BUILDING MARKER</div>

    <div id="chart-panel">
      <div class="panel-tab" id="chart-tab" onclick="toggleCollapse('chart')"><span id="chart-chevron">‹</span></div>
      <div id="chart-content">
        <div id="chart-building-name">—</div>
        <div id="chart-subtitle">Annual Energy Use</div>
        <div id="chart-row">
          <div id="chart-container"><canvas id="energy-chart"></canvas></div>
          <div class="legend" id="legend"></div>
        </div>
        <div class="divider"></div>
        <div id="total-row">
          <span id="total-label">Annual Total</span>
          <span id="total-value"></span>
        </div>
      </div>
    </div>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: /ar/targets-all.mind; maxTrack: 1; autoStart: true; uiLoading: yes; uiError: yes; uiScanning: yes; missTolerance: 10; filterMinCF: 0.0001; filterBeta: 0.01;"
    color-space="sRGB" renderer="colorManagement: true"
    vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false"
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-light type="ambient" color="#ffffff" intensity="1.5"></a-light>
    <a-light type="directional" color="#ffffff" intensity="1.0" position="1 2 1"></a-light>

    <!-- 20 building targets — index matches energy_data.json order -->
    <a-entity id="target-0"  mindar-image-target="targetIndex: 0"></a-entity>
    <a-entity id="target-1"  mindar-image-target="targetIndex: 1"></a-entity>
    <a-entity id="target-2"  mindar-image-target="targetIndex: 2"></a-entity>
    <a-entity id="target-3"  mindar-image-target="targetIndex: 3"></a-entity>
    <a-entity id="target-4"  mindar-image-target="targetIndex: 4"></a-entity>
    <a-entity id="target-5"  mindar-image-target="targetIndex: 5"></a-entity>
    <a-entity id="target-6"  mindar-image-target="targetIndex: 6"></a-entity>
    <a-entity id="target-7"  mindar-image-target="targetIndex: 7"></a-entity>
    <a-entity id="target-8"  mindar-image-target="targetIndex: 8"></a-entity>
    <a-entity id="target-9"  mindar-image-target="targetIndex: 9"></a-entity>
    <a-entity id="target-10" mindar-image-target="targetIndex: 10"></a-entity>
    <a-entity id="target-11" mindar-image-target="targetIndex: 11"></a-entity>
    <a-entity id="target-12" mindar-image-target="targetIndex: 12"></a-entity>
    <a-entity id="target-13" mindar-image-target="targetIndex: 13"></a-entity>
    <a-entity id="target-14" mindar-image-target="targetIndex: 14"></a-entity>
    <a-entity id="target-15" mindar-image-target="targetIndex: 15"></a-entity>
    <a-entity id="target-16" mindar-image-target="targetIndex: 16"></a-entity>
    <a-entity id="target-17" mindar-image-target="targetIndex: 17"></a-entity>
    <a-entity id="target-18" mindar-image-target="targetIndex: 18"></a-entity>
    <a-entity id="target-19" mindar-image-target="targetIndex: 19"></a-entity>
  </a-scene>

    // ─── AR tap dispatch ──────────────────────────────────────────────────────
    const sceneEl = document.querySelector('a-scene');
    const _arVec  = new THREE.Vector3();
    const arTaps  = [];

    function arScreenPos(entity) {
      entity.object3D.getWorldPosition(_arVec);
      _arVec.project(sceneEl.camera);
      const r = sceneEl.canvas.getBoundingClientRect();
      return { x: (_arVec.x + 1) / 2 * r.width + r.left,
               y: (-_arVec.y + 1) / 2 * r.height + r.top };
    }

    function dispatchArTap(cx, cy) {
      for (const t of arTaps) {
        if (t.targetIdx !== activeTarget) continue;
        if (!t.entity || !t.entity.object3D) continue;
        const sp = arScreenPos(t.entity);
        const dx = cx - sp.x, dy = cy - sp.y;
        if (Math.sqrt(dx * dx + dy * dy) < t.radius) { t.fn(); return; }
      }
    }

    let _lastTouch = 0;
    document.addEventListener('touchend', e => {
      _lastTouch = Date.now();
      const t = e.changedTouches[0];
      dispatchArTap(t.clientX, t.clientY);
    });
    document.addEventListener('click', e => {
      if (Date.now() - _lastTouch < 500) return;
      dispatchArTap(e.clientX, e.clientY);
    });

    // ── Highlight ─────────────────────────────────────────────────────────────
    function matchBuilding(h, s, v) {
      const brightTeal = s >= 0.35 && v >= 0.35;
      const shadowTeal = s >= 0.55 && v >= 0.15;
      if (!brightTeal && !shadowTeal) return null;
      const dh = Math.min(Math.abs(h - 180), 360 - Math.abs(h - 180));
      return dh <= 24 ? true : null;
    }

    function rgbToHsv(r, g, b) {
      const rr = r / 255, gg = g / 255, bb = b / 255;
      const max = Math.max(rr, gg, bb), min = Math.min(rr, gg, bb), d = max - min;
      const s = max === 0 ? 0 : d / max;
      let h = 0;
      if (d !== 0) {
        if (max === rr)      h = ((gg - bb) / d % 6 + 6) % 6;
        else if (max === gg) h = (bb - rr) / d + 2;
        else                 h = (rr - gg) / d + 4;
        h *= 60;
      }
      return [h, s, max];
    }

    function jetColor(t) {
      const b = 0.45 + t * 0.55;
      return [Math.round(0 * b), Math.round(224 * b), Math.round(160 * b)];
    }

    let THERMAL_W = 640, THERMAL_H = 480;
    let T_X0, T_X1, T_Y0, T_Y1;
    let thermalActive = false, thermalVideo = null, thermalAnimId = null;
    let thermalCanvas = null, thermalCtx = null, arCanvas = null;

    function thermalLoop() {
      if (!thermalActive || !thermalVideo || !thermalCanvas) return;
      if (thermalVideo.readyState >= 2) {
        const vw = thermalVideo.videoWidth || THERMAL_W, vh = thermalVideo.videoHeight || THERMAL_H;
        const cvScale = Math.max(THERMAL_W / vw, THERMAL_H / vh);
        const csw = THERMAL_W / cvScale, csh = THERMAL_H / cvScale;
        thermalCtx.drawImage(thermalVideo, (vw - csw) / 2, (vh - csh) / 2, csw, csh, 0, 0, THERMAL_W, THERMAL_H);
        const img = thermalCtx.getImageData(0, 0, THERMAL_W, THERMAL_H);
        const d = img.data;
        let minY = THERMAL_H, maxY = 0;
        for (let i = 0; i < d.length; i += 4) {
          const px = (i >> 2) % THERMAL_W, py = Math.floor((i >> 2) / THERMAL_W);
          if (px < T_X0 || px >= T_X1 || py < T_Y0 || py >= T_Y1) continue;
          const [h, s, v] = rgbToHsv(d[i], d[i+1], d[i+2]);
          if (matchBuilding(h, s, v)) { if (py < minY) minY = py; if (py > maxY) maxY = py; }
        }
        const buildingH = minY <= maxY ? maxY - minY : 0;
        const useMinY = Math.max(0, minY - Math.round(buildingH * 0.18));
        const useMaxY = minY <= maxY ? maxY : THERMAL_H;
        const yRange  = Math.max(useMaxY - useMinY, 1);
        for (let i = 0; i < d.length; i += 4) {
          const px = (i >> 2) % THERMAL_W, py = Math.floor((i >> 2) / THERMAL_W);
          d[i+3] = 0;
          if (px < T_X0 || px >= T_X1 || py < T_Y0 || py >= T_Y1) continue;
          const [h, s, v] = rgbToHsv(d[i], d[i+1], d[i+2]);
          if (matchBuilding(h, s, v)) {
            const lum = (d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114) / 255;
            const [tr, tg, tb] = jetColor(Math.max(0, Math.min(1, lum)));
            d[i] = tr; d[i+1] = tg; d[i+2] = tb; d[i+3] = 255;
          }
        }
        thermalCtx.putImageData(img, 0, 0);
      }
      thermalAnimId = requestAnimationFrame(thermalLoop);
    }

    function setupThermalCanvas() {
      if (thermalCanvas) return true;
      thermalVideo = document.querySelector('video');
      if (!thermalVideo || !arCanvas) return false;
      THERMAL_W = window.innerWidth; THERMAL_H = window.innerHeight;
      T_X0 = Math.round(THERMAL_W * 0.05); T_X1 = Math.round(THERMAL_W * 0.95);
      T_Y0 = Math.round(THERMAL_H * 0.02); T_Y1 = Math.round(THERMAL_H * 0.78);
      thermalCanvas = document.createElement('canvas');
      thermalCanvas.width = THERMAL_W; thermalCanvas.height = THERMAL_H;
      thermalCanvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;display:none;pointer-events:none;';
      arCanvas.parentNode.insertBefore(thermalCanvas, arCanvas);
      thermalCtx = thermalCanvas.getContext('2d', { willReadFrequently: true });
      return true;
    }

    function enableThermal()  {
      if (!setupThermalCanvas()) return;
      thermalActive = true; thermalCanvas.style.display = 'block';
      document.getElementById('thermal-btn').classList.add('active');
      thermalAnimId = requestAnimationFrame(thermalLoop);
    }
    function disableThermal() {
      thermalActive = false;
      if (thermalCanvas) thermalCanvas.style.display = 'none';
      document.getElementById('thermal-btn').classList.remove('active');
      if (thermalAnimId) { cancelAnimationFrame(thermalAnimId); thermalAnimId = null; }
    }
    function toggleThermal() { if (thermalActive) disableThermal(); else enableThermal(); }

    let isLandscape = false;
    function toggleCollapse(which) {
      const panel = document.getElementById(which === 'chart' ? 'chart-panel' : 'maps-panel');
      const chevron = document.getElementById(which + '-chevron');

    // ─── Audio ────────────────────────────────────────────────────────────────
    function pickFemaleVoice() {
      const voices = window.speechSynthesis.getVoices();
      return voices.find(v => /samantha|victoria|karen|moira|tessa|fiona|zira|google uk english female|google us english/i.test(v.name))
          || voices.find(v => v.lang.startsWith('en') && /female/i.test(v.name))
          || voices.find(v => v.lang.startsWith('en'))
          || voices[0] || null;
    }

    const captionEls = [], captionTxts = [];
    let typewriterTimer = null;

    function hideCaption(idx) {
      if (captionEls[idx]) captionEls[idx].setAttribute('visible', 'false');
      if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer = null; }
    }

    function makeCaption(targetEl, idx) {
      const text = BUILDINGS[idx].description;
      const WRAP = 36, LINE_H = 0.038, PAD = 0.04;
      function countLines(t) {
        let lines = 1, col = 0;
        for (const w of t.split(' ')) {
          if (col > 0 && col + 1 + w.length > WRAP) { lines++; col = w.length; }
          else { col += (col ? 1 : 0) + w.length; }
        }
        return lines;
      }
      const boxH = +((countLines(text) * LINE_H + PAD * 2) * (4 / 6)).toFixed(3);
      const el = document.createElement('a-entity');
      el.setAttribute('position', '-0.88 0.325 0.02');
      el.setAttribute('visible', 'false');
      const bg = document.createElement('a-plane');
      bg.setAttribute('width', '0.52'); bg.setAttribute('height', String(boxH));
      bg.setAttribute('material', 'color: #000000; opacity: 0.9; shader: flat; side: double');
      el.appendChild(bg);
      const txt = document.createElement('a-text');
      txt.setAttribute('value', ''); txt.setAttribute('width', '0.46');
      txt.setAttribute('color', '#ffffff'); txt.setAttribute('align', 'center');
      txt.setAttribute('baseline', 'top');
      txt.setAttribute('position', `0 ${+(boxH / 2 - PAD).toFixed(3)} 0.002`);
      txt.setAttribute('wrap-count', String(WRAP));
      el.appendChild(txt);
      targetEl.appendChild(el);
      captionEls[idx] = el; captionTxts[idx] = txt;
    }

    function toggleAudio(idx) {
      const text = BUILDINGS[idx].description;
      if (window.speechSynthesis.speaking) {
        window.speechSynthesis.cancel();
        hideCaption(idx);
        return;
      }
      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = 0.95;
      const trySpeak = () => {
        const v = pickFemaleVoice(); if (v) utter.voice = v;
        const words = text.split(' ');
        let wordIdx = 0, usedBoundary = false;
        const done = () => hideCaption(idx);
        utter.onend = done; utter.onerror = done;
        utter.onboundary = evt => {
          if (evt.name !== 'word') return;
          usedBoundary = true;
          if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer = null; }
          if (captionTxts[idx]) captionTxts[idx].setAttribute('value', text.substring(0, evt.charIndex + (evt.charLength || 1)));
        };
        if (captionEls[idx]) captionEls[idx].setAttribute('visible', 'true');
        if (captionTxts[idx]) captionTxts[idx].setAttribute('value', '');
        typewriterTimer = setInterval(() => {
          if (usedBoundary || wordIdx >= words.length) { clearInterval(typewriterTimer); typewriterTimer = null; return; }
          if (captionTxts[idx]) captionTxts[idx].setAttribute('value', words.slice(0, ++wordIdx).join(' '));
        }, 390);
        window.speechSynthesis.speak(utter);
      };
      if (window.speechSynthesis.getVoices().length) trySpeak();
      else window.speechSynthesis.onvoiceschanged = trySpeak;
    }

    function makeSpeakerFor(targetEl, idx) {
      const speakerEl = document.createElement('a-entity');
      speakerEl.setAttribute('position', '-0.52 0.325 0.02');
      const model = document.createElement('a-gltf-model');
      model.setAttribute('src', '/ar/volume.glb'); model.setAttribute('scale', '0.083 0.083 0.083');
      speakerEl.appendChild(model);
      const label = document.createElement('a-text');
      label.setAttribute('value', "listen to building's detail"); label.setAttribute('align', 'center');
      label.setAttribute('color', '#000000'); label.setAttribute('position', '0 -0.08 0.001');
      label.setAttribute('width', '0.5');
      speakerEl.appendChild(label);
      targetEl.appendChild(speakerEl);
      arTaps.push({ entity: speakerEl, radius: 70, targetIdx: idx, fn: () => toggleAudio(idx) });
    }

    // ─── AR label cards + detail panel ───────────────────────────────────────
    const arDetailEls = [], arDetailTitleEls = [], arDetailValueEls = [];
    const arDetailDescEls = [], arDetailBarEls = [], arDetailPctEls = [], arDetailAccentEls = [];

    const CARD_DEFS = [
      { key: 'equipment', pos: '-0.55 -0.25 0.03', color: '#F5A623' },
      { key: 'cooling',   pos:  '0.00 -0.25 0.03', color: '#4A90D9' },
      { key: 'lighting',  pos:  '0.55 -0.25 0.03', color: '#7ED321' },
    ];

    function makeArLabels(targetEl, idx) {
      const b = BUILDINGS[idx];
      const total = b.equipment_kWh + b.lighting_kWh + b.cooling_kWh;
      CARD_DEFS.forEach(({ key, pos, color }) => {
        const kwh = b[key + '_kWh'];
        const card = document.createElement('a-entity');
        card.setAttribute('position', pos);
        const bg = document.createElement('a-plane');
        bg.setAttribute('width', '0.26'); bg.setAttribute('height', '0.12');
        bg.setAttribute('material', 'color:#111111; opacity:0.88; shader:flat; side:double');
        card.appendChild(bg);
        const bar = document.createElement('a-box');
        bar.setAttribute('width', '0.007'); bar.setAttribute('height', '0.106'); bar.setAttribute('depth', '0.002');
        bar.setAttribute('position', '-0.119 0 0.001');
        bar.setAttribute('material', `color:${color}; shader:flat`);
        card.appendChild(bar);
        const title = document.createElement('a-text');
        title.setAttribute('value', key.toUpperCase()); title.setAttribute('color', '#ffffff');
        title.setAttribute('width', '0.21'); title.setAttribute('align', 'center');
        title.setAttribute('position', '0 0.033 0.002'); title.setAttribute('wrap-count', '22');
        card.appendChild(title);
        const val = document.createElement('a-text');
        val.setAttribute('value', fmtMWh(kwh)); val.setAttribute('color', color);
        val.setAttribute('width', '0.19'); val.setAttribute('align', 'center');
        val.setAttribute('position', '0 0.003 0.002'); val.setAttribute('wrap-count', '22');
        card.appendChild(val);
        const sub = document.createElement('a-text');
        sub.setAttribute('value', 'Tap for details'); sub.setAttribute('color', '#aaaaaa');
        sub.setAttribute('width', '0.17'); sub.setAttribute('align', 'center');
        sub.setAttribute('position', '0 -0.028 0.002'); sub.setAttribute('wrap-count', '22');
        card.appendChild(sub);
        targetEl.appendChild(card);
        arTaps.push({ entity: card, radius: 65, targetIdx: idx, fn: () => showArDetail(key, idx) });
      });
    }

    function makeArDetail(targetEl, idx) {
      const detailEl = document.createElement('a-entity');
      detailEl.setAttribute('position', '0 -0.55 0.06');
      detailEl.setAttribute('visible', 'false');
      const bg = document.createElement('a-plane');
      bg.setAttribute('width', '0.65'); bg.setAttribute('height', '0.38');
      bg.setAttribute('material', 'color:#0a0a12; opacity:0.95; shader:flat; side:double');
      detailEl.appendChild(bg);
      const accentEl = document.createElement('a-box');
      accentEl.setAttribute('width', '0.007'); accentEl.setAttribute('height', '0.36'); accentEl.setAttribute('depth', '0.002');
      accentEl.setAttribute('position', '-0.312 0 0.001');
      accentEl.setAttribute('material', 'color:#ffffff; shader:flat');
      detailEl.appendChild(accentEl);
      const titleEl = document.createElement('a-text');
      titleEl.setAttribute('color', '#ffffff'); titleEl.setAttribute('width', '0.54');
      titleEl.setAttribute('align', 'center'); titleEl.setAttribute('position', '0 0.155 0.002');
      titleEl.setAttribute('wrap-count', '28');
      detailEl.appendChild(titleEl);
      const valueEl = document.createElement('a-text');
      valueEl.setAttribute('color', '#aaaaaa'); valueEl.setAttribute('width', '0.44');
      valueEl.setAttribute('align', 'center'); valueEl.setAttribute('position', '0 0.112 0.002');
      valueEl.setAttribute('wrap-count', '28');
      detailEl.appendChild(valueEl);
      const descEl = document.createElement('a-text');
      descEl.setAttribute('color', '#cccccc'); descEl.setAttribute('width', '0.58');
      descEl.setAttribute('align', 'center'); descEl.setAttribute('baseline', 'top');
      descEl.setAttribute('position', '0 0.072 0.002'); descEl.setAttribute('wrap-count', '44');
      detailEl.appendChild(descEl);
      const barBg = document.createElement('a-box');
      barBg.setAttribute('width', '0.58'); barBg.setAttribute('height', '0.012'); barBg.setAttribute('depth', '0.001');
      barBg.setAttribute('position', '0.005 -0.135 0.002');
      barBg.setAttribute('material', 'color:#333333; shader:flat');
      detailEl.appendChild(barBg);
      const barEl = document.createElement('a-box');
      barEl.setAttribute('height', '0.012'); barEl.setAttribute('depth', '0.002');
      barEl.setAttribute('material', 'color:#ffffff; shader:flat');
      detailEl.appendChild(barEl);
      const pctEl = document.createElement('a-text');
      pctEl.setAttribute('color', '#888888'); pctEl.setAttribute('width', '0.5');
      pctEl.setAttribute('align', 'center'); pctEl.setAttribute('position', '0 -0.155 0.002');
      pctEl.setAttribute('wrap-count', '36');
      detailEl.appendChild(pctEl);
      const closeBtn = document.createElement('a-entity');
      closeBtn.setAttribute('position', '0.292 0.162 0.003');
      const closeBg = document.createElement('a-circle');
      closeBg.setAttribute('radius', '0.024'); closeBg.setAttribute('material', 'color:#333333; shader:flat');
      closeBtn.appendChild(closeBg);
      const closeTxt = document.createElement('a-text');
      closeTxt.setAttribute('value', 'X'); closeTxt.setAttribute('color', '#ffffff');
      closeTxt.setAttribute('align', 'center'); closeTxt.setAttribute('baseline', 'center');
      closeTxt.setAttribute('position', '0 0 0.001'); closeTxt.setAttribute('width', '0.12');
      closeBtn.appendChild(closeTxt);
      detailEl.appendChild(closeBtn);
      targetEl.appendChild(detailEl);
      arDetailEls[idx] = detailEl; arDetailTitleEls[idx] = titleEl; arDetailValueEls[idx] = valueEl;
      arDetailDescEls[idx] = descEl; arDetailBarEls[idx] = barEl;
      arDetailPctEls[idx] = pctEl; arDetailAccentEls[idx] = accentEl;
      arTaps.push({ entity: closeBtn, radius: 55, targetIdx: idx, fn: () => closeArDetail(idx) });
    }

    function showArDetail(key, idx) {
      if (!arDetailEls[idx]) return;
      const b = BUILDINGS[idx];
      const total = b.equipment_kWh + b.lighting_kWh + b.cooling_kWh;
      const kwh = b[key + '_kWh'];
      const pct = Math.round(kwh / total * 100);
      const colors = { equipment: '#F5A623', cooling: '#4A90D9', lighting: '#7ED321' };
      const descs  = { equipment: b.equipment_description, cooling: b.cooling_description, lighting: b.lighting_description };
      const color = colors[key], desc = descs[key];
      arDetailTitleEls[idx].setAttribute('value', key.toUpperCase());
      arDetailValueEls[idx].setAttribute('value', fmtMWh(kwh));
      arDetailDescEls[idx].setAttribute('value', desc);
      arDetailPctEls[idx].setAttribute('value', `${pct}% of total energy use`);
      arDetailAccentEls[idx].setAttribute('material', `color:${color}; shader:flat`);
      const barW = (pct / 100) * 0.58;
      arDetailBarEls[idx].setAttribute('width', String(barW.toFixed(3)));
      arDetailBarEls[idx].setAttribute('height', '0.012'); arDetailBarEls[idx].setAttribute('depth', '0.002');
      arDetailBarEls[idx].setAttribute('position', `${(-0.295 + barW / 2).toFixed(3)} -0.135 0.002`);
      arDetailBarEls[idx].setAttribute('material', `color:${color}; shader:flat`);
      arDetailEls[idx].setAttribute('visible', 'true');
    }

    function closeArDetail(idx) {
      if (arDetailEls[idx]) arDetailEls[idx].setAttribute('visible', 'false');
    }

    // ─── Scan-box gate ────────────────────────────────────────────────────────
    // Only activate AR when all 4 marker corners are inside the scanning square.
    const _pendingTargets = new Set();
    const _gateCorner = new THREE.Vector3();

    function scanBoxBounds() {
      // Try to use MindAR's actual scanning overlay element for exact bounds
      const el = document.querySelector('.mindar-ui-scanning') ||
                 document.querySelector('[class*="scanning"]');
      if (el) {
        const r = el.getBoundingClientRect();
        if (r.width > 10) return { x0: r.left, y0: r.top, x1: r.right, y1: r.bottom };
      }
      // Fallback: center square at ~70% of min viewport dimension
      const w = window.innerWidth, h = window.innerHeight;
      const side = Math.min(w, h) * 0.70;
      return { x0: (w - side) / 2, y0: (h - side) / 2, x1: (w + side) / 2, y1: (h + side) / 2 };
    }

    function allCornersInScanBox(targetEl) {
      if (!targetEl.object3D) return false;
      const { x0, y0, x1, y1 } = scanBoxBounds();
      const r = sceneEl.canvas.getBoundingClientRect();
      const localCorners = [[-0.5,-0.5,0],[0.5,-0.5,0],[0.5,0.5,0],[-0.5,0.5,0]];
      for (const [lx, ly, lz] of localCorners) {
        _gateCorner.set(lx, ly, lz).applyMatrix4(targetEl.object3D.matrixWorld).project(sceneEl.camera);
        const sx = (_gateCorner.x + 1) / 2 * r.width + r.left;
        const sy = (-_gateCorner.y + 1) / 2 * r.height + r.top;
        if (sx < x0 || sx > x1 || sy < y0 || sy > y1) return false;
      }
      return true;
    }

    // ─── MindAR wiring ────────────────────────────────────────────────────────
    sceneEl.addEventListener('loaded', () => {
      arCanvas = sceneEl.canvas;
      const PIN_Z = 0.05; // pin sits on marker surface, z = toward camera

      // Gate polling loop — activates pending targets once fully inside scan box
      (function scanGateTick() {
        requestAnimationFrame(scanGateTick);
        if (_pendingTargets.size === 0) return;
        for (const idx of _pendingTargets) {
          const el = document.getElementById(`target-${idx}`);
          if (!el) continue;
          if (allCornersInScanBox(el)) {
            _pendingTargets.delete(idx);
            foundTargets.add(idx);
            activeTarget = idx;
            showChart(idx);
          }
        }
      })();

      BUILDINGS.forEach((building, idx) => {
        const el = document.getElementById(`target-${idx}`);
        if (!el) return;

        const wrap = document.createElement('a-entity');
        wrap.setAttribute('id', `ar-wrap-${idx}`);
        el.appendChild(wrap);

        const pin = document.createElement('a-gltf-model');
        pin.setAttribute('src', '/ar/map_pin.glb');
        pin.setAttribute('scale', '0.25 0.25 0.25');
        pin.setAttribute('position', `0 0 ${PIN_Z}`);
        pin.setAttribute('rotation', '90 0 0');
        pin.setAttribute('animation', `property: position; from: 0 0 ${PIN_Z}; to: 0 0 ${PIN_Z + 0.06}; dir: alternate; dur: 1600; loop: true; easing: easeInOutSine`);
        wrap.appendChild(pin);

        makeSpeakerFor(wrap, idx);
        makeCaption(wrap, idx);
        makeArLabels(wrap, idx);
        makeArDetail(wrap, idx);

        el.addEventListener('targetFound', () => {
          _pendingTargets.add(idx); // wait for all corners inside scan box
        });
        el.addEventListener('targetLost', () => {
          _pendingTargets.delete(idx);
          foundTargets.delete(idx);
          window.speechSynthesis.cancel();
          hideCaption(idx);
          closeArDetail(idx);
          activeTarget = -1;
          hideUI();
          wrap.object3D.scale.setScalar(1);
        });

        const _cp = new THREE.Vector3(), _tp = new THREE.Vector3();
        let _curScale = 1;
        (function scaleTick() {
          requestAnimationFrame(scaleTick);
          if (activeTarget !== idx || !el.object3D || !wrap.object3D) return;
          sceneEl.camera.getWorldPosition(_cp);
          el.object3D.getWorldPosition(_tp);
          const dist = _cp.distanceTo(_tp);
          if (dist < 0.01) return;
          const target = Math.max(1.0, Math.min(4, dist * 1.67));
          _curScale += (target - _curScale) * 0.08;
          wrap.setAttribute('scale', `${_curScale} ${_curScale} ${_curScale}`);
        })();
      });
    });
  </script>
</body>
</html>
