<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Campus AR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100dvh; overflow: hidden; font-family: -apple-system, sans-serif; }

    #back-btn {
      position: fixed; top: 16px; left: 16px; z-index: 999;
      background: rgba(0,0,0,0.55); color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 9px 14px; font-size: 11px; letter-spacing: 0.1em;
      cursor: pointer; border-radius: 4px; text-decoration: none;
    }

    #scan-hint {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      z-index: 999; background: rgba(0,0,0,0.55); color: #fff;
      padding: 11px 18px; font-size: 11px; letter-spacing: 0.1em;
      border-radius: 4px; pointer-events: none; transition: opacity 0.4s; white-space: nowrap;
    }

    /* ── Chart panel ── */
    #chart-panel {
      position: fixed; top: 12px; right: 12px; z-index: 999;
      width: 200px; background: rgba(255,255,255,0.93);
      border-radius: 10px; padding: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      opacity: 0; transform: translateX(16px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      pointer-events: none;
    }
    #chart-panel.visible { opacity: 1; transform: translateX(0); pointer-events: auto; }
    #chart-building-name { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #111; margin-bottom: 2px; }
    #chart-subtitle { font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; color: #888; margin-bottom: 10px; }
    #chart-container { position: relative; width: 100%; height: 130px; margin-bottom: 10px; }
    .legend { display: flex; flex-direction: column; gap: 6px; }
    .legend-item { display: flex; align-items: center; gap: 7px; }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { font-size: 10px; color: #444; flex: 1; }
    .legend-value { font-size: 10px; font-weight: 600; color: #111; }
    .legend-pct { font-size: 9px; color: #888; margin-left: 2px; }
    .divider { height: 1px; background: #eee; margin: 10px 0; }
    #total-row { display: flex; justify-content: space-between; align-items: center; }
    #total-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; color: #888; }
    #total-value { font-size: 11px; font-weight: 700; color: #111; }

    /* ── Bottom panel ── */
    #bottom-panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 999;
      background: rgba(10,10,10,0.92); border-top: 1px solid rgba(255,255,255,0.12);
      transform: translateY(100%); transition: transform 0.4s ease;
    }
    #bottom-panel.visible { transform: translateY(0); }
    #bottom-collapsed { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
    #bottom-bname { font-size: 14px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #fff; }
    #bottom-tagline { font-size: 10px; color: #aaa; margin-top: 2px; letter-spacing: 0.04em; }
    #details-btn {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; padding: 8px 14px; font-size: 10px; letter-spacing: 0.1em;
      text-transform: uppercase; border-radius: 4px; cursor: pointer;
      white-space: nowrap; flex-shrink: 0; margin-left: 12px; transition: background 0.2s;
    }
    #details-btn:active { background: rgba(255,255,255,0.2); }
    #bottom-expanded { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
    #bottom-expanded.open { max-height: 400px; }
    #bottom-expanded-inner { padding: 0 20px 24px; display: flex; flex-direction: column; gap: 14px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 14px; }
    .detail-item { display: flex; gap: 12px; align-items: flex-start; }
    .detail-color-bar { width: 3px; border-radius: 2px; flex-shrink: 0; align-self: stretch; min-height: 40px; }
    .detail-content { flex: 1; }
    .detail-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
    .detail-name { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #fff; }
    .detail-val { font-size: 11px; font-weight: 600; color: #fff; }
    .detail-desc { font-size: 10px; line-height: 1.6; color: #999; }
    .detail-bar-bg { height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 6px; overflow: hidden; }
    .detail-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }

    /* ── Calibration ── */
    #cal-toggle {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      z-index: 1001; background: rgba(0,0,0,0.6); color: #fff;
      border: 1px solid rgba(255,255,255,0.25); padding: 8px 16px;
      font-size: 10px; letter-spacing: 0.12em; border-radius: 4px; cursor: pointer;
      white-space: nowrap;
    }
    #cal-toggle.active { background: rgba(220,100,0,0.8); border-color: #f80; }

    #cal-panel {
      display: none; position: fixed; left: 10px; top: 56px;
      z-index: 1001; background: rgba(0,0,0,0.88);
      border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
      padding: 12px; width: 230px; color: #fff; font-family: monospace; font-size: 11px;
    }
    #cal-panel.open { display: block; }

    .cv { color: #4df; }
    .cal-display { line-height: 2; margin-bottom: 10px; }
    .cal-row { display: flex; align-items: center; gap: 4px; margin-bottom: 5px; }
    .cal-lbl { width: 38px; color: #aaa; font-size: 10px; flex-shrink: 0; }
    .cb {
      flex: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; padding: 5px 0; font-size: 10px; border-radius: 3px; cursor: pointer; text-align: center;
    }
    .cb:active { background: rgba(255,255,255,0.3); }
    .cal-sens { display: flex; align-items: center; gap: 6px; margin: 8px 0 4px; font-size: 10px; color: #aaa; }
    .cal-sens button {
      flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: #aaa; padding: 4px; font-size: 9px; border-radius: 3px; cursor: pointer;
    }
    .cal-sens button.on { background: rgba(255,180,0,0.3); border-color: #fa0; color: #fa0; }
    #cal-copy {
      width: 100%; margin-top: 8px; background: rgba(0,150,80,0.3);
      border: 1px solid rgba(0,255,140,0.35); color: #0f6; padding: 8px;
      font-size: 10px; letter-spacing: 0.1em; border-radius: 4px; cursor: pointer;
    }
    #cal-reset {
      width: 100%; margin-top: 5px; background: rgba(100,0,0,0.3);
      border: 1px solid rgba(255,80,80,0.3); color: #f88; padding: 6px;
      font-size: 10px; letter-spacing: 0.1em; border-radius: 4px; cursor: pointer;
    }
    #cal-help { font-size: 9px; color: #555; margin-top: 8px; line-height: 1.7; }

    #cal-overlay {
      display: none; position: fixed; inset: 0; z-index: 1000;
      touch-action: none;
    }
    #cal-overlay.active { display: block; }
    #cal-panel { z-index: 1001; }
    #cal-toggle { z-index: 1002; }

    /* ── Rotate handle ── */
    #rotate-btn {
      display: none; position: fixed; right: 14px; top: 50%; transform: translateY(-50%);
      z-index: 998; width: 56px; height: 56px; border-radius: 50%;
      background: rgba(0,0,0,0.65); border: 1.5px solid rgba(255,255,255,0.35);
      flex-direction: column; align-items: center; justify-content: center;
      color: #fff; cursor: pointer; user-select: none; -webkit-user-select: none;
    }
    #rotate-btn.visible { display: flex; }
    #rotate-btn.dragging { background: rgba(255,180,0,0.45); border-color: #fa0; }
    #rotate-btn .ricon { font-size: 22px; line-height: 1; }
    #rotate-btn .rlabel { font-size: 8px; letter-spacing: 0.08em; margin-top: 2px; opacity: 0.7; }
    #rotate-overlay {
      display: none; position: fixed; inset: 0; z-index: 999; touch-action: none;
    }
    #rotate-overlay.active { display: block; }
  </style>
</head>
<body>
  <a href="/" id="back-btn">← BACK</a>
  <button id="cal-toggle" onclick="toggleCal()">⚙ CALIBRATE</button>
  <div id="cal-overlay"></div>
  <div id="rotate-btn"><div class="ricon">↻</div><div class="rlabel">ROTATE</div></div>
  <div id="rotate-overlay"></div>
  <div id="scan-hint">POINT CAMERA AT A BUILDING</div>

  <div id="cal-panel">
    <div class="cal-display">
      POS&nbsp; <span class="cv" id="cv-px">0.000</span>&nbsp;
               <span class="cv" id="cv-py">0.000</span>&nbsp;
               <span class="cv" id="cv-pz">0.000</span><br>
      ROT&nbsp; <span class="cv" id="cv-rx">-90.0</span>&nbsp;
               <span class="cv" id="cv-ry">0.0</span>&nbsp;
               <span class="cv" id="cv-rz">0.0</span><br>
      SCL&nbsp; <span class="cv" id="cv-sc">0.0100</span>
    </div>
    <div class="cal-row">
      <span class="cal-lbl">ROT X</span>
      <button class="cb" onclick="adjRot('x',-90)">-90</button>
      <button class="cb" onclick="adjRot('x',-15)">-15</button>
      <button class="cb" onclick="adjRot('x',-5)">-5</button>
      <button class="cb" onclick="adjRot('x',5)">+5</button>
      <button class="cb" onclick="adjRot('x',15)">+15</button>
      <button class="cb" onclick="adjRot('x',90)">+90</button>
    </div>
    <div class="cal-row">
      <span class="cal-lbl">ROT Y</span>
      <button class="cb" onclick="adjRot('y',-90)">-90</button>
      <button class="cb" onclick="adjRot('y',-15)">-15</button>
      <button class="cb" onclick="adjRot('y',-5)">-5</button>
      <button class="cb" onclick="adjRot('y',5)">+5</button>
      <button class="cb" onclick="adjRot('y',15)">+15</button>
      <button class="cb" onclick="adjRot('y',90)">+90</button>
    </div>
    <div class="cal-row">
      <span class="cal-lbl">ROT Z</span>
      <button class="cb" onclick="adjRot('z',-90)">-90</button>
      <button class="cb" onclick="adjRot('z',-15)">-15</button>
      <button class="cb" onclick="adjRot('z',-5)">-5</button>
      <button class="cb" onclick="adjRot('z',5)">+5</button>
      <button class="cb" onclick="adjRot('z',15)">+15</button>
      <button class="cb" onclick="adjRot('z',90)">+90</button>
    </div>
    <div class="cal-sens">
      SENS
      <button id="sens-slow" onclick="setSens(0.001)">SLOW</button>
      <button id="sens-med"  onclick="setSens(0.003)" class="on">MED</button>
      <button id="sens-fast" onclick="setSens(0.007)">FAST</button>
    </div>
    <div class="cal-row">
      <span class="cal-lbl">SCALE</span>
      <button class="cb" onclick="adjScale(0.5)">½×</button>
      <button class="cb" onclick="adjScale(0.8)">-20%</button>
      <button class="cb" onclick="adjScale(1.2)">+20%</button>
      <button class="cb" onclick="adjScale(2)">2×</button>
    </div>
    <button id="cal-copy"  onclick="copyVals()">COPY VALUES</button>
    <button id="cal-reset" onclick="resetCal()">RESET</button>
    <div id="cal-help">
      1 finger → move X / Y<br>
      2 finger slide → move Z (depth)<br>
      2 finger pinch → scale<br>
      2 finger twist → rotate Y
    </div>
  </div>

  <div id="chart-panel">
    <div id="chart-building-name"></div>
    <div id="chart-subtitle">Energy Use Intensity</div>
    <div id="chart-container"><canvas id="energy-chart"></canvas></div>
    <div class="legend" id="legend"></div>
    <div class="divider"></div>
    <div id="total-row">
      <span id="total-label">Total EUI</span>
      <span id="total-value"></span>
    </div>
  </div>

  <div id="bottom-panel">
    <div id="bottom-collapsed">
      <div>
        <div id="bottom-bname"></div>
        <div id="bottom-tagline"></div>
      </div>
      <button id="details-btn" onclick="toggleDetails()">SEE DETAILS ↑</button>
    </div>
    <div id="bottom-expanded">
      <div id="bottom-expanded-inner"></div>
    </div>
  </div>

  <script>
    AFRAME.registerComponent('highlight-building', {
      schema: { active: { type: 'boolean', default: false }, r: { type: 'number', default: 0.13 }, g: { type: 'number', default: 0.77 }, b: { type: 'number', default: 0.37 }, opacity: { type: 'number', default: 0.75 } },
      init() {
        this._meshes = []; this._origMats = new Map(); this._hlMat = null; this._cached = false;
        this.el.addEventListener('model-loaded', () => this._setup());
        if (this.el.getObject3D('mesh')) this._setup();
      },
      _setup() {
        const root = this.el.getObject3D('mesh');
        if (!root) return;
        this._meshes = []; this._origMats.clear();
        root.traverse(o => { if (!o.isMesh) return; this._origMats.set(o, o.material); this._meshes.push(o); });
        this._hlMat = new THREE.MeshBasicMaterial({ color: new THREE.Color(this.data.r, this.data.g, this.data.b), transparent: true, opacity: this.data.opacity, side: THREE.DoubleSide, depthTest: false });
        this._cached = true;
        if (this.data.active) this._show();
      },
      update() { if (!this._cached) return; this.data.active ? this._show() : this._hide(); },
      _show() { this._meshes.forEach(o => { o.renderOrder = 999; o.material = this._hlMat; }); },
      _hide() { this._meshes.forEach(o => { o.renderOrder = 0; o.material = this._origMats.get(o); }); },
      remove() { this._hide(); }
    });
  </script>

  <a-scene
    mindar-image="imageTargetSrc: /ar/targets.mind; autoStart: true; uiLoading: yes; uiError: yes; uiScanning: yes; filterMinCF: 0.0001; filterBeta: 0.0005;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <a-asset-item id="sde4-model" src="/models/sde4.glb"></a-asset-item>
    </a-assets>
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity id="target-sde4" mindar-image-target="targetIndex: 0">
      <a-entity
        id="model-sde4"
        gltf-model="#sde4-model"
        scale="0.01 0.01 0.01"
        position="0 0 0"
        rotation="-90 0 0"
        highlight-building="active: false; r: 0.13; g: 0.77; b: 0.37; opacity: 0.55"
      ></a-entity>
    </a-entity>
  </a-scene>

  <script>
    // ── Building data ──────────────────────────────────────────────────
    const BUILDINGS = {
      sde4: {
        name: 'SDE4',
        tagline: 'Net-zero energy · NUS School of Design & Environment',
        energy: {
          total: 86,
          components: [
            { label: 'Cooling',   value: 37, color: '#4A90D9', desc: 'Hybrid cooling system combining chilled ceilings and natural ventilation reduces HVAC load by ~30% vs a conventional building. Over 50% of spaces are naturally ventilated.' },
            { label: 'Equipment', value: 32, color: '#F5A623', desc: 'Computers, monitors, lab equipment and studio devices. Smart power management and occupancy-based scheduling reduce standby consumption across studios and offices.' },
            { label: 'Lighting',  value: 17, color: '#7ED321', desc: 'Full LED with daylight-linked dimming sensors. South-facing shading fins and deep overhangs maximise natural daylight, cutting artificial lighting hours significantly.' },
          ]
        }
      }
    };

    // ── UI helpers ─────────────────────────────────────────────────────
    const chartPanel = document.getElementById('chart-panel');
    const bottomPanel = document.getElementById('bottom-panel');
    const scanHint    = document.getElementById('scan-hint');
    const expandedEl  = document.getElementById('bottom-expanded');
    let chartInstance = null, detailsOpen = false;

    function toggleDetails() {
      detailsOpen = !detailsOpen;
      expandedEl.classList.toggle('open', detailsOpen);
      document.getElementById('details-btn').textContent = detailsOpen ? 'HIDE ↓' : 'SEE DETAILS ↑';
    }

    function renderChart(b) {
      document.getElementById('chart-building-name').textContent = b.name;
      const { components, total } = b.energy;
      document.getElementById('total-value').textContent = total + ' kWh/m²/yr';
      const legend = document.getElementById('legend');
      legend.innerHTML = '';
      components.forEach(c => {
        legend.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${c.color}"></div><span class="legend-label">${c.label}</span><span class="legend-value">${c.value}<span class="legend-pct"> kWh</span></span></div>`;
      });
      if (chartInstance) chartInstance.destroy();
      const ctx = document.getElementById('energy-chart').getContext('2d');
      chartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: { labels: components.map(c => c.label), datasets: [{ data: components.map(c => c.value), backgroundColor: components.map(c => c.color), borderWidth: 2, borderColor: '#fff' }] },
        options: { cutout: '60%', plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.raw} kWh/m²/yr` } } }, animation: { duration: 600 } }
      });
    }

    function renderBottom(b) {
      document.getElementById('bottom-bname').textContent = b.name;
      document.getElementById('bottom-tagline').textContent = b.tagline;
      const inner = document.getElementById('bottom-expanded-inner');
      const { components, total } = b.energy;
      inner.innerHTML = '';
      components.forEach(c => {
        const pct = Math.round((c.value / total) * 100);
        inner.innerHTML += `<div class="detail-item"><div class="detail-color-bar" style="background:${c.color}"></div><div class="detail-content"><div class="detail-header"><span class="detail-name">${c.label}</span><span class="detail-val">${c.value} kWh/m²/yr</span></div><div class="detail-desc">${c.desc}</div><div class="detail-bar-bg"><div class="detail-bar-fill" style="width:${pct}%; background:${c.color}"></div></div></div></div>`;
      });
    }

    function showBuilding(b) {
      renderChart(b); renderBottom(b);
      chartPanel.classList.add('visible');
      bottomPanel.classList.add('visible');
      scanHint.style.opacity = '0';
    }

    function hideBuilding() {
      chartPanel.classList.remove('visible');
      bottomPanel.classList.remove('visible');
      scanHint.style.opacity = '1';
      detailsOpen = false;
      expandedEl.classList.remove('open');
      document.getElementById('details-btn').textContent = 'SEE DETAILS ↑';
    }

    // ── Calibration ────────────────────────────────────────────────────
    const cal = {
      pos: { x: 0, y: 0, z: 0 },
      rot: { x: -90, y: 0, z: 0 },
      scale: 0.01,
      active: false,
      sens: 0.003
    };

    function toggleCal() {
      cal.active = !cal.active;
      document.getElementById('cal-toggle').classList.toggle('active', cal.active);
      document.getElementById('cal-panel').classList.toggle('open', cal.active);
      document.getElementById('cal-overlay').classList.toggle('active', cal.active);
    }

    function applyTransform() {
      const el = document.getElementById('model-sde4');
      el.setAttribute('position', `${cal.pos.x.toFixed(3)} ${cal.pos.y.toFixed(3)} ${cal.pos.z.toFixed(3)}`);
      el.setAttribute('rotation', `${cal.rot.x.toFixed(1)} ${cal.rot.y.toFixed(1)} ${cal.rot.z.toFixed(1)}`);
      const s = cal.scale.toFixed(4);
      el.setAttribute('scale', `${s} ${s} ${s}`);
      document.getElementById('cv-px').textContent = cal.pos.x.toFixed(3);
      document.getElementById('cv-py').textContent = cal.pos.y.toFixed(3);
      document.getElementById('cv-pz').textContent = cal.pos.z.toFixed(3);
      document.getElementById('cv-rx').textContent = cal.rot.x.toFixed(1);
      document.getElementById('cv-ry').textContent = cal.rot.y.toFixed(1);
      document.getElementById('cv-rz').textContent = cal.rot.z.toFixed(1);
      document.getElementById('cv-sc').textContent = cal.scale.toFixed(4);
    }

    function adjRot(axis, deg) { cal.rot[axis] = (cal.rot[axis] + deg + 360) % 360; if (cal.rot[axis] > 180) cal.rot[axis] -= 360; applyTransform(); }
    function adjScale(factor) { cal.scale *= factor; applyTransform(); }

    function setSens(v) {
      cal.sens = v;
      ['slow','med','fast'].forEach(id => document.getElementById('sens-'+id).classList.remove('on'));
      if (v === 0.001) document.getElementById('sens-slow').classList.add('on');
      else if (v === 0.003) document.getElementById('sens-med').classList.add('on');
      else document.getElementById('sens-fast').classList.add('on');
    }

    function resetCal() {
      cal.pos = { x: 0, y: 0, z: 0 };
      cal.rot = { x: -90, y: 0, z: 0 };
      cal.scale = 0.01;
      applyTransform();
    }

    function copyVals() {
      const p = cal.pos, r = cal.rot, s = cal.scale.toFixed(4);
      const txt = `position="${p.x.toFixed(3)} ${p.y.toFixed(3)} ${p.z.toFixed(3)}" rotation="${r.x.toFixed(1)} ${r.y.toFixed(1)} ${r.z.toFixed(1)}" scale="${s} ${s} ${s}"`;
      navigator.clipboard.writeText(txt).then(() => {
        const btn = document.getElementById('cal-copy');
        const orig = btn.textContent;
        btn.textContent = '✓ COPIED!';
        setTimeout(() => btn.textContent = orig, 1500);
      });
    }

    // ── Touch gesture handling (on overlay so we own the events) ──────────
    let lastGesture = null;
    const overlay = document.getElementById('cal-overlay');

    function readGesture(touches) {
      if (!touches.length) return null;
      if (touches.length === 1) return { n: 1, x: touches[0].clientX, y: touches[0].clientY };
      const dx = touches[1].clientX - touches[0].clientX;
      const dy = touches[1].clientY - touches[0].clientY;
      return {
        n: 2,
        cx: (touches[0].clientX + touches[1].clientX) / 2,
        cy: (touches[0].clientY + touches[1].clientY) / 2,
        dist: Math.hypot(dx, dy),
        angle: Math.atan2(dy, dx)
      };
    }

    overlay.addEventListener('touchstart', e => {
      e.preventDefault();
      lastGesture = readGesture(Array.from(e.touches));
    }, { passive: false });

    overlay.addEventListener('touchmove', e => {
      e.preventDefault();
      const cur = readGesture(Array.from(e.touches));
      if (!lastGesture || cur.n !== lastGesture.n) { lastGesture = cur; return; }

      if (cur.n === 1) {
        cal.pos.x += (cur.x - lastGesture.x) * cal.sens;
        cal.pos.y -= (cur.y - lastGesture.y) * cal.sens;
      } else {
        if (lastGesture.dist > 5) cal.scale *= cur.dist / lastGesture.dist;
        const twist = (cur.angle - lastGesture.angle) * (180 / Math.PI);
        cal.rot.y += twist;
        cal.pos.z += (cur.cy - lastGesture.cy) * cal.sens;
      }

      lastGesture = cur;
      applyTransform();
    }, { passive: false });

    overlay.addEventListener('touchend', () => { lastGesture = null; });

    // ── Rotate handle ──────────────────────────────────────────────────
    const rotateBtn     = document.getElementById('rotate-btn');
    const rotateOverlay = document.getElementById('rotate-overlay');
    let lastRotX = null;

    let lastRotY = null;

    rotateBtn.addEventListener('touchstart', e => {
      e.preventDefault();
      rotateBtn.classList.add('dragging');
      rotateOverlay.classList.add('active');
      lastRotX = e.touches[0].clientX;
      lastRotY = e.touches[0].clientY;
    }, { passive: false });

    rotateOverlay.addEventListener('touchmove', e => {
      e.preventDefault();
      if (lastRotX === null) return;
      const dx = e.touches[0].clientX - lastRotX;
      const dy = e.touches[0].clientY - lastRotY;
      cal.rot.y += dx * 0.5;
      cal.rot.x += dy * 0.5;
      lastRotX = e.touches[0].clientX;
      lastRotY = e.touches[0].clientY;
      applyTransform();
    }, { passive: false });

    rotateOverlay.addEventListener('touchend', () => {
      rotateBtn.classList.remove('dragging');
      rotateOverlay.classList.remove('active');
      lastRotX = null;
      lastRotY = null;
    });

    // ── MindAR wiring ──────────────────────────────────────────────────
    document.querySelector('a-scene').addEventListener('loaded', () => {
      const targetEl = document.getElementById('target-sde4');
      const modelEl  = document.getElementById('model-sde4');

      targetEl.addEventListener('targetFound', () => {
        modelEl.setAttribute('highlight-building', 'active', true);
        rotateBtn.classList.add('visible');
        showBuilding(BUILDINGS.sde4);
      });

      targetEl.addEventListener('targetLost', () => {
        modelEl.setAttribute('highlight-building', 'active', false);
        rotateBtn.classList.remove('visible');
        hideBuilding();
      });
    });
  </script>
</body>
</html>
