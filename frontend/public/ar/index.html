<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>SDE4 AR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100dvh; overflow: hidden; font-family: -apple-system, sans-serif; }

    #back-btn {
      position: fixed; top: 16px; left: 16px; z-index: 1000;
      background: rgba(0,0,0,0.55); color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 9px 14px; font-size: 11px; letter-spacing: 0.1em;
      cursor: pointer; border-radius: 4px; text-decoration: none;
    }
    #scan-hint {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      z-index: 1000; background: rgba(0,0,0,0.55); color: #fff;
      padding: 11px 18px; font-size: 11px; letter-spacing: 0.1em;
      border-radius: 4px; pointer-events: none; transition: opacity 0.4s; white-space: nowrap;
    }

    /* ── Chart panel ── */
    #chart-panel {
      position: fixed; top: 12px; right: 12px; z-index: 999;
      width: 200px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.35); border-radius: 10px; padding: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      opacity: 0; transform: translateX(16px);
      transition: opacity 0.35s ease, transform 0.35s ease; pointer-events: none;
    }
    #chart-panel.visible { opacity: 1; transform: translateX(0); pointer-events: auto; }
    #chart-building-name { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #111; margin-bottom: 2px; }
    #chart-subtitle { font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; color: #555; margin-bottom: 10px; }
    #chart-container { position: relative; width: 100%; height: 130px; margin-bottom: 10px; }
    .legend { display: flex; flex-direction: column; gap: 6px; }
    .legend-item { display: flex; align-items: center; gap: 7px; }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { font-size: 10px; color: #333; flex: 1; }
    .legend-value { font-size: 10px; font-weight: 600; color: #111; }
    .divider { height: 1px; background: rgba(0,0,0,0.12); margin: 10px 0; }
    #total-row { display: flex; justify-content: space-between; align-items: center; }
    #total-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; color: #555; }
    #total-value { font-size: 11px; font-weight: 700; color: #111; }

    /* ── AR labels (HTML overlay, always clickable) ── */
    .ar-label {
      position: fixed; z-index: 998;
      transform: translate(-50%, -50%);
      display: none; align-items: center; gap: 8px;
      background: rgba(12, 12, 28, 0.93);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 8px; padding: 10px 13px 10px 10px;
      min-width: 110px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.45);
      cursor: pointer; pointer-events: auto;
      user-select: none; -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    .ar-label:active { opacity: 0.7; }
    .ar-label-bar { width: 3px; border-radius: 2px; height: 28px; flex-shrink: 0; }
    .ar-label-title {
      font-size: 12px; font-weight: 800; color: white;
      letter-spacing: 0.07em; text-transform: uppercase;
    }
    .ar-label-sub { font-size: 9px; color: rgba(255,255,255,0.42); margin-top: 2px; letter-spacing: 0.03em; }

    /* iPad and larger — bigger labels */
    @media (min-width: 768px) {
      .ar-label {
        gap: 10px; border-radius: 10px;
        padding: 14px 18px 14px 14px; min-width: 160px;
      }
      .ar-label-bar { width: 4px; height: 38px; }
      .ar-label-title { font-size: 15px; }
      .ar-label-sub { font-size: 10px; margin-top: 3px; }
    }

    /* ── Detail slide-up panel ── */
    #detail-panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 1001;
      background: rgba(10, 10, 18, 0.95);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px 20px 0 0;
      padding: 12px 24px 52px;
      transform: translateY(100%);
      transition: transform 0.45s cubic-bezier(0.34, 1.15, 0.64, 1);
    }
    #detail-panel.visible { transform: translateY(0); }
    #detail-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.18); border-radius: 2px; margin: 0 auto 22px; }
    #detail-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
    #detail-color-bar { width: 4px; height: 44px; border-radius: 2px; flex-shrink: 0; }
    #detail-title { font-size: 20px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; color: #fff; flex: 1; }
    #detail-value { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.55); margin-top: 3px; }
    #detail-close {
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.14);
      color: #fff; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    #detail-desc { font-size: 14px; line-height: 1.8; color: rgba(255,255,255,0.68); margin-bottom: 22px; }
    #detail-bar-bg { height: 5px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
    #detail-bar-fill { height: 100%; border-radius: 3px; transition: width 0.75s cubic-bezier(0.4,0,0.2,1); width: 0%; }
    #detail-pct { font-size: 10px; color: rgba(255,255,255,0.38); letter-spacing: 0.06em; text-transform: uppercase; }

    #maps-panel {
      position: fixed; bottom: 16px; right: 16px; z-index: 1000;
      width: 170px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.35); border-radius: 10px; padding: 12px 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      display: none; opacity: 0; transform: translateY(8px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    #maps-panel.visible { opacity: 1; transform: translateY(0); }
    #maps-panel-name { font-size: 13px; font-weight: 700; color: #111; letter-spacing: 0.04em; }
    #maps-panel-addr { font-size: 10px; color: #555; margin-top: 2px; margin-bottom: 10px; line-height: 1.5; }
    #maps-panel-link {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600; color: #1a73e8;
      text-decoration: none; letter-spacing: 0.03em;
    }
  </style>
</head>

      <div id="maps-panel-name">SDE4</div>

      <svg width="11" height="11" viewBox="0 0 24 24" fill="#1a73e8"><path d="M19 19H5V5h7V3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>

    <line id="line-equipment" stroke="#000000" stroke-width="2" visibility="hidden"/>
    <line id="line-cooling"   stroke="#000000" stroke-width="2" visibility="hidden"/>
    <line id="line-lighting"  stroke="#000000" stroke-width="2" visibility="hidden"/>

    <div id="total-row">

    </div>

    <div id="detail-header">
      <div id="detail-color-bar"></div>
      <div style="flex:1">
        <div id="detail-title"></div>
        <div id="detail-value"></div>
      </div>
      <button id="detail-close" onclick="closeDetail()">×</button>
    </div>
    <p id="detail-desc"></p>
    <div id="detail-bar-bg"><div id="detail-bar-fill"></div></div>
    <div id="detail-pct"></div>

      if (!d) return;
      document.getElementById('detail-title').textContent = d.label;
      document.getElementById('detail-value').textContent = d.value;
      document.getElementById('detail-desc').textContent  = d.desc;
      document.getElementById('detail-color-bar').style.background  = d.color;
      document.getElementById('detail-bar-fill').style.background   = d.color;
      document.getElementById('detail-bar-fill').style.width        = '0%';
      document.getElementById('detail-pct').textContent = `${d.pct}% of total energy use`;
      detailPanel.classList.add('visible');
      requestAnimationFrame(() => {
        document.getElementById('detail-bar-fill').style.width = d.pct + '%';
      });
    }

    function closeDetail() { detailPanel.classList.remove('visible'); }

    // ── Chart ────────────────────────────────────────────────────────────
    function showChart() {
      if (!chartInstance) {
        const { components, total } = BUILDING_ENERGY;
        document.getElementById('total-value').textContent = total + ' kWh/m²/yr';
        const legend = document.getElementById('legend');
        legend.innerHTML = '';
        components.forEach(c => {
          legend.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${c.color}"></div><span class="legend-label">${c.label}</span><span class="legend-value">${c.value} kWh</span></div>`;
        });
        const ctx = document.getElementById('energy-chart').getContext('2d');
        chartInstance = new Chart(ctx, {
          type: 'doughnut',
          data: { labels: components.map(c=>c.label), datasets: [{ data: components.map(c=>c.value), backgroundColor: components.map(c=>c.color), borderWidth: 2, borderColor: 'rgba(255,255,255,0.3)' }] },
          options: { cutout: '60%', plugins: { legend: { display: false } }, animation: { duration: 600 } }
        });
      }
      chartPanel.classList.add('visible');
      scanHint.style.opacity = '0';
      const mp = document.getElementById('maps-panel');
      mp.style.display = 'block';
      requestAnimationFrame(() => mp.classList.add('visible'));
    }

    function hideUI() {
      if (foundTargets.size > 0) return;
      chartPanel.classList.remove('visible');
      closeDetail();
      scanHint.style.opacity = '1';
      const mp = document.getElementById('maps-panel');
      mp.classList.remove('visible');
      setTimeout(() => { mp.style.display = 'none'; }, 300);
      ['equipment','cooling','lighting'].forEach(t => {
        document.getElementById('ar-label-' + t).style.display = 'none';
        const l = document.getElementById('line-' + t);
        if (l) l.setAttribute('visibility', 'hidden');
      });
    }

    // ── HTML label overlay — projects 3D marker world pos → screen px ───
    const sceneEl = document.querySelector('a-scene');
    const _tmpVec  = new THREE.Vector3();
    const _tmpVec2 = new THREE.Vector3();

    // Local-space anchor positions (where the dot sits on the building surface)
    const ANCHOR_LOCAL = {
      equipment: [-0.22, -0.06, 0.013],
      cooling:   [ 0.05, -0.09, 0.013],
      lighting:  [ 0.26,  0.02, 0.013],
    };

    function updateOverlays() {
      if (foundTargets.size === 0) return;

      const camera = sceneEl.camera;
      if (!camera) return;

      const tIdx = [...foundTargets][0];
      const W = window.innerWidth, H = window.innerHeight;
      const PAD = 10;
      const targetEl = document.getElementById(`target-${tIdx}`);

      [['equipment','eq'],['cooling','co'],['lighting','li']].forEach(([type, sh]) => {
        const marker  = document.getElementById(`m-${sh}-${tIdx}`);
        const label   = document.getElementById(`ar-label-${type}`);
        const svgLine = document.getElementById(`line-${type}`);
        if (!marker || !label) return;

        // Project the label marker → desired screen position
        marker.object3D.getWorldPosition(_tmpVec);
        _tmpVec.project(camera);

        if (_tmpVec.z > 1) {
          label.style.display = 'none';
          if (svgLine) svgLine.setAttribute('visibility', 'hidden');
          return;
        }

        const sx = (_tmpVec.x + 1) / 2 * W;
        const sy = (-_tmpVec.y + 1) / 2 * H;

        // Show label so offsetWidth/Height are measurable
        label.style.display = 'flex';
        const hw = label.offsetWidth  / 2;
        const hh = label.offsetHeight / 2;

        // Clamp so label never clips any edge
        const cx = Math.max(hw + PAD, Math.min(W - hw - PAD, sx));
        const cy = Math.max(hh + PAD, Math.min(H - hh - PAD, sy));
        label.style.left = cx + 'px';
        label.style.top  = cy + 'px';

        // Draw SVG line: from building anchor dot → top-center of label
        if (svgLine && targetEl) {
          const [lx, ly, lz] = ANCHOR_LOCAL[type];
          _tmpVec2.set(lx, ly, lz);
          _tmpVec2.applyMatrix4(targetEl.object3D.matrixWorld);
          _tmpVec2.project(camera);
          const ax = (_tmpVec2.x + 1) / 2 * W;
          const ay = (-_tmpVec2.y + 1) / 2 * H;
          const rect = label.getBoundingClientRect();
          svgLine.setAttribute('x1', ax.toFixed(1));
          svgLine.setAttribute('y1', ay.toFixed(1));
          svgLine.setAttribute('x2', (rect.left + rect.width / 2).toFixed(1));
          svgLine.setAttribute('y2', rect.top.toFixed(1));
          svgLine.setAttribute('visibility', 'visible');
        }
      });
    }

    // Run overlay update at ~30 fps
    setInterval(updateOverlays, 33);

    // ── MindAR wiring ────────────────────────────────────────────────────
    sceneEl.addEventListener('loaded', () => {
      for (let i = 0; i < 12; i++) {
        const el = document.getElementById(`target-${i}`);
        el.addEventListener('targetFound', () => { foundTargets.add(i); showChart(); });
        el.addEventListener('targetLost',  () => { foundTargets.delete(i); hideUI(); });
      }
    });
  </script>
</body>
</html>
