<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Campus AR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100dvh; overflow: hidden; font-family: -apple-system, sans-serif; }

    #back-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 999;
      background: rgba(0,0,0,0.55);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 9px 14px;
      font-size: 11px;
      letter-spacing: 0.1em;
      cursor: pointer;
      border-radius: 4px;
      text-decoration: none;
    }

    #scan-hint {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      background: rgba(0,0,0,0.55);
      color: #fff;
      padding: 11px 18px;
      font-size: 11px;
      letter-spacing: 0.1em;
      border-radius: 4px;
      pointer-events: none;
      transition: opacity 0.4s;
      white-space: nowrap;
    }

    /* ── Info panel ── */
    #info-panel {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 999;
      width: 200px;
      background: rgba(255,255,255,0.93);
      border-radius: 10px;
      padding: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      opacity: 0;
      transform: translateX(16px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      pointer-events: none;
    }

    #info-panel.visible {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    #info-building-name {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #111;
      margin-bottom: 2px;
    }

    #info-subtitle {
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 10px;
    }

    #chart-container {
      position: relative;
      width: 100%;
      height: 130px;
      margin-bottom: 10px;
    }

    .legend {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .legend-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-label {
      font-size: 10px;
      color: #444;
      flex: 1;
    }

    .legend-value {
      font-size: 10px;
      font-weight: 600;
      color: #111;
    }

    .legend-pct {
      font-size: 9px;
      color: #888;
      margin-left: 2px;
    }

    .divider {
      height: 1px;
      background: #eee;
      margin: 10px 0;
    }

    #total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #total-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
    }

    #total-value {
      font-size: 11px;
      font-weight: 700;
      color: #111;
    }
  </style>
</head>
<body>
  <a href="/" id="back-btn">← BACK</a>
  <div id="scan-hint">POINT CAMERA AT A BUILDING</div>

  <!-- Info panel (top-right, fixed) -->
  <div id="info-panel">
    <div id="info-building-name"></div>
    <div id="info-subtitle">Energy Use Intensity</div>
    <div id="chart-container">
      <canvas id="energy-chart"></canvas>
    </div>
    <div class="legend" id="legend"></div>
    <div class="divider"></div>
    <div id="total-row">
      <span id="total-label">Total EUI</span>
      <span id="total-value"></span>
    </div>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: /ar/targets.mind; autoStart: true; uiLoading: yes; uiError: yes; uiScanning: yes;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <a-asset-item id="campus-model" src="/scene.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Target 0: SDE4 -->
    <a-entity id="target-sde4" mindar-image-target="targetIndex: 0">
      <a-entity
        gltf-model="#campus-model"
        scale="0.005 0.005 0.005"
        position="0 0 0"
        rotation="0 0 0"
        id="model-sde4"
      ></a-entity>
    </a-entity>
  </a-scene>

  <script>
    const buildings = {
      'target-sde4': {
        name: 'SDE4',
        nodeName: 'SDE4',
        energy: {
          components: [
            { label: 'Cooling',    value: 37, color: '#4A90D9' },
            { label: 'Equipment',  value: 32, color: '#F5A623' },
            { label: 'Lighting',   value: 17, color: '#7ED321' },
          ]
        }
      }
    };

    const infoPanel  = document.getElementById('info-panel');
    const scanHint   = document.getElementById('scan-hint');
    let chartInstance = null;

    function renderPanel(building) {
      document.getElementById('info-building-name').textContent = building.name;

      const components = building.energy.components;
      const total = components.reduce((s, c) => s + c.value, 0);

      document.getElementById('total-value').textContent = total + ' kWh/m²/yr';

      // Legend
      const legend = document.getElementById('legend');
      legend.innerHTML = '';
      components.forEach(c => {
        const pct = Math.round((c.value / total) * 100);
        legend.innerHTML += `
          <div class="legend-item">
            <div class="legend-dot" style="background:${c.color}"></div>
            <span class="legend-label">${c.label}</span>
            <span class="legend-value">${c.value}<span class="legend-pct"> kWh</span></span>
          </div>`;
      });

      // Pie chart
      if (chartInstance) chartInstance.destroy();
      const ctx = document.getElementById('energy-chart').getContext('2d');
      chartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: components.map(c => c.label),
          datasets: [{
            data: components.map(c => c.value),
            backgroundColor: components.map(c => c.color),
            borderWidth: 2,
            borderColor: '#fff',
          }]
        },
        options: {
          cutout: '60%',
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => ` ${ctx.label}: ${ctx.raw} kWh/m²/yr`
              }
            }
          },
          animation: { duration: 600 }
        }
      });

      infoPanel.classList.add('visible');
      scanHint.style.opacity = '0';
    }

    function hidePanel() {
      infoPanel.classList.remove('visible');
      scanHint.style.opacity = '1';
    }

    function filterModel(modelEl, targetNodeName) {
      const mesh = modelEl.getObject3D('mesh');
      if (!mesh) return;
      mesh.traverse(obj => {
        obj.visible = (obj.name === targetNodeName || obj.name === '');
      });
    }

    Object.entries(buildings).forEach(([targetId, building]) => {
      const targetEl = document.getElementById(targetId);
      const modelEl  = document.getElementById('model-' + targetId.replace('target-', ''));

      targetEl.addEventListener('targetFound', () => {
        renderPanel(building);
        filterModel(modelEl, building.nodeName);
      });

      targetEl.addEventListener('targetLost', () => hidePanel());

      modelEl.addEventListener('model-loaded', () => {
        filterModel(modelEl, building.nodeName);
      });
    });
  </script>
</body>
</html>
