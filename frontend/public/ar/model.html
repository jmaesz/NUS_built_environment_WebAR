<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>NUScape-AR — Model</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100dvh; overflow: hidden; font-family: -apple-system, sans-serif; }
    a-scene, a-scene canvas, .a-canvas {
      position: fixed !important; top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important; object-fit: cover !important;
    }

    #ui-layer { position: fixed; inset: 0; z-index: 999; pointer-events: none; }
    #ui-layer > * { pointer-events: auto; }

    #back-btn {
      position: absolute; top: 16px; left: 16px;
      background: rgba(0,0,0,0.55); color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 9px 14px; font-size: 11px; letter-spacing: 0.1em;
      border-radius: 4px; text-decoration: none;
      display: block; width: 100px; text-align: center;
    }

    #scan-hint {
      position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.55); color: #fff;
      padding: 11px 18px; font-size: 11px; letter-spacing: 0.1em;
      border-radius: 4px; pointer-events: none;
      transition: opacity 0.4s; white-space: nowrap;
    }

    #detail-panel {
      position: absolute; top: 16px; right: 12px;
      width: 255px; z-index: 999;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.35); border-radius: 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      opacity: 0; transform: translateX(16px); pointer-events: none;
      transition: opacity 0.35s ease, transform 0.35s ease;
      display: none;
    }
    #detail-panel.visible {
      opacity: 1; transform: translateX(0); pointer-events: auto; display: block;
    }
    #panel-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 12px 14px 8px;
    }
    #close-btn {
      background: rgba(0,0,0,0.2); border: none; color: #fff;
      width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
      font-size: 12px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-left: 8px;
    }
    #panel-name { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #111; }
    #panel-full { font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; color: #555; margin-top: 2px; }
    #panel-body { padding: 0 14px 12px; }
    #chart-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    #chart-wrap { position: relative; width: 95px; height: 95px; flex-shrink: 0; }
    .legend { display: flex; flex-direction: column; gap: 7px; flex: 1; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { font-size: 9px; color: #333; flex: 1; }
    .legend-value { font-size: 9px; font-weight: 600; color: #111; }
    .divider { height: 1px; background: rgba(0,0,0,0.12); margin: 8px 0; }
    #total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    #total-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; color: #555; }
    #total-value { font-size: 11px; font-weight: 700; color: #111; }
    #maps-btn {
      display: flex; align-items: center; justify-content: center; gap: 5px;
      background: rgba(0,0,0,0.55); color: #4fc3f7;
      border: 1px solid rgba(79,195,247,0.35); border-radius: 6px;
      padding: 8px 12px; font-size: 10px; font-weight: 700; letter-spacing: 0.04em;
      text-decoration: none; width: 100%;
    }
  </style>
</head>
<body>
  <div id="ui-layer">
    <a href="/" id="back-btn">← BACK</a>

    <div id="detail-panel">
      <div id="panel-header">
        <div>
          <div id="panel-name">—</div>
          <div id="panel-full"></div>
        </div>
        <button id="close-btn" onclick="closeDetail()">✕</button>
      </div>
      <div id="panel-body">
        <div id="chart-row">
          <div id="chart-wrap"><canvas id="energy-chart"></canvas></div>
          <div class="legend" id="legend"></div>
        </div>
        <div class="divider"></div>
        <div id="total-row">
          <span id="total-label">Annual Total</span>
          <span id="total-value"></span>
        </div>
        <a id="maps-btn" href="#" target="_blank" rel="noopener">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="#4fc3f7">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
          </svg>
          Open in Google Maps
        </a>
      </div>
    </div>

    <div id="scan-hint">POINT CAMERA AT CAMPUS MODEL</div>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: /ar/targets-model.mind; autoStart: true; uiLoading: yes; uiError: yes; uiScanning: yes; missTolerance: 10; filterMinCF: 0.0001; filterBeta: 0.01;"
    color-space="sRGB" renderer="colorManagement: true"
    vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

    <a-camera id="camera" position="0 0 0" look-controls="enabled: false"
      cursor="fuse: false; rayOrigin: mouse"
      raycaster="objects: .label-hit; far: 10">
    </a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="model-target">
      <!-- labels injected by JS -->
    </a-entity>
  </a-scene>

  <script>
    // ── Billboard component: label always faces camera ─────────────────────────
    AFRAME.registerComponent('billboard', {
      tick: function () {
        const cam = this.el.sceneEl.camera;
        if (cam) this.el.object3D.quaternion.copy(cam.quaternion);
      }
    });

    // ── Building data ──────────────────────────────────────────────────────────
    const BUILDINGS = {
      'E3': {
        full: 'Faculty of Engineering Block 3',
        equipment_kWh: 1122637, lighting_kWh: 735489, cooling_kWh: 1542890,
        mapsUrl: 'https://www.google.com/maps/search/?api=1&query=E3+Faculty+of+Engineering+Block+3+NUS+Singapore'
      },
      'E4': {
        full: 'Faculty of Engineering Block 4',
        equipment_kWh: 2410173, lighting_kWh: 1205789, cooling_kWh: 1601209,
        mapsUrl: 'https://www.google.com/maps/search/?api=1&query=E4+Faculty+of+Engineering+Block+4+NUS+Singapore'
      },
      'E4A': {
        full: 'Faculty of Engineering Block 4A',
        equipment_kWh: 1478244, lighting_kWh: 614040, cooling_kWh: 992888,
        mapsUrl: 'https://www.google.com/maps/search/?api=1&query=E4A+Faculty+of+Engineering+Block+4A+NUS+Singapore'
      },
      'E6': {
        full: 'Faculty of Engineering Block 6',
        equipment_kWh: 3696553, lighting_kWh: 1535491, cooling_kWh: 3291141,
        mapsUrl: 'https://www.google.com/maps/search/?api=1&query=E6+Faculty+of+Engineering+Block+6+NUS+Singapore'
      },
      'E7': {
        full: 'Faculty of Engineering Block 7',
        equipment_kWh: 1820000, lighting_kWh: 760000, cooling_kWh: 1540000,
        mapsUrl: 'https://www.google.com/maps/search/?api=1&query=E7+Faculty+of+Engineering+Block+7+NUS+Singapore'
      },
      'E8': {
        full: 'Faculty of Engineering Block 8',
        equipment_kWh: 1533068, lighting_kWh: 766981, cooling_kWh: 1111118,
        mapsUrl: 'https://www.google.com/maps/search/?api=1&query=E8+Engineering+Workshop+NUS+Singapore'
      },
      'T-Lab': {
        full: 'Temasek Laboratories at NUS',
        equipment_kWh: 8268699, lighting_kWh: 2362486, cooling_kWh: 5668682,
        mapsUrl: 'https://www.google.com/maps/search/?api=1&query=Temasek+Laboratories+NUS+Singapore'
      }
    };

    // ── Label positions from pixel coords in the training image ───────────────
    const LABELS = [
      { key: 'E7',    pos: '-0.299 0.20 -0.246' },
      { key: 'E4',    pos:  '0.179 0.20 -0.205' },
      { key: 'E4A',   pos: '-0.063 0.20 -0.147' },
      { key: 'E6',    pos: '-0.326 0.20 -0.054' },
      { key: 'E8',    pos: '-0.129 0.20  0.004' },
      { key: 'T-Lab', pos: '-0.094 0.20  0.219' },
      { key: 'E3',    pos:  '0.143 0.20  0.210' },
    ];

    // ── Build label entities ───────────────────────────────────────────────────
    const targetEl = document.getElementById('model-target');

    LABELS.forEach(({ key, pos }) => {
      const group = document.createElement('a-entity');
      group.setAttribute('position', pos);

      // Leader line down to model surface
      const line = document.createElement('a-cylinder');
      line.setAttribute('radius', '0.004');
      line.setAttribute('height', '0.18');
      line.setAttribute('position', '0 -0.09 0');
      line.setAttribute('material', 'color: #ffffff; opacity: 0.45; shader: flat; transparent: true');
      group.appendChild(line);

      // Billboard wrapper
      const bb = document.createElement('a-entity');
      bb.setAttribute('billboard', '');

      // Invisible hit plane (larger for easy tapping)
      const hit = document.createElement('a-plane');
      hit.setAttribute('width', '0.32');
      hit.setAttribute('height', '0.12');
      hit.setAttribute('class', 'label-hit');
      hit.dataset.key = key;
      hit.setAttribute('material', 'opacity: 0.001; transparent: true; side: double');
      bb.appendChild(hit);

      // Background card
      const bg = document.createElement('a-plane');
      bg.setAttribute('width', '0.28');
      bg.setAttribute('height', '0.095');
      bg.setAttribute('material', 'color: #0d0d1a; opacity: 0.92; shader: flat; side: double');
      bb.appendChild(bg);

      // Accent bar
      const accent = document.createElement('a-box');
      accent.setAttribute('width', '0.006');
      accent.setAttribute('height', '0.083');
      accent.setAttribute('depth', '0.002');
      accent.setAttribute('position', '-0.128 0 0.001');
      accent.setAttribute('material', 'color: #4fc3f7; shader: flat');
      bb.appendChild(accent);

      // Building name text
      const nameText = document.createElement('a-text');
      nameText.setAttribute('value', key);
      nameText.setAttribute('color', '#ffffff');
      nameText.setAttribute('align', 'center');
      nameText.setAttribute('width', '0.6');
      nameText.setAttribute('position', '0.01 0.016 0.002');
      nameText.setAttribute('wrap-count', '18');
      bb.appendChild(nameText);

      // Tap hint
      const hint = document.createElement('a-text');
      hint.setAttribute('value', 'tap for details');
      hint.setAttribute('color', '#88aaff');
      hint.setAttribute('align', 'center');
      hint.setAttribute('width', '0.44');
      hint.setAttribute('position', '0.01 -0.017 0.002');
      hint.setAttribute('wrap-count', '22');
      bb.appendChild(hint);

      // Pulse animation on the card
      bg.setAttribute('animation', 'property: scale; from: 1 1 1; to: 1.04 1.04 1; dir: alternate; dur: 1400; loop: true; easing: easeInOutSine');

      group.appendChild(bb);
      targetEl.appendChild(group);

      // Click handler
      hit.addEventListener('click', () => showDetail(key));
    });

    // ── Chart ──────────────────────────────────────────────────────────────────
    const COLORS = { equipment: '#F5A623', lighting: '#7ED321', cooling: '#4A90D9' };
    let chartInstance = null;

    function fmtMWh(kwh) { return (kwh / 1000).toFixed(0) + ' MWh/yr'; }

    function showDetail(key) {
      const b = BUILDINGS[key];
      const total = b.equipment_kWh + b.lighting_kWh + b.cooling_kWh;

      document.getElementById('panel-name').textContent = key;
      document.getElementById('panel-full').textContent = b.full;
      document.getElementById('total-value').textContent = fmtMWh(total);
      document.getElementById('maps-btn').href = b.mapsUrl;

      const components = [
        { label: 'Equipment', key: 'equipment_kWh', color: COLORS.equipment },
        { label: 'Cooling',   key: 'cooling_kWh',   color: COLORS.cooling   },
        { label: 'Lighting',  key: 'lighting_kWh',  color: COLORS.lighting  },
      ];

      const legend = document.getElementById('legend');
      legend.innerHTML = '';
      components.forEach(c => {
        const pct = Math.round(b[c.key] / total * 100);
        legend.innerHTML += `
          <div class="legend-item">
            <div class="legend-dot" style="background:${c.color}"></div>
            <span class="legend-label">${c.label}</span>
            <span class="legend-value">${pct}%&nbsp;·&nbsp;${fmtMWh(b[c.key])}</span>
          </div>`;
      });

      if (chartInstance) chartInstance.destroy();
      chartInstance = new Chart(document.getElementById('energy-chart'), {
        type: 'doughnut',
        data: {
          labels: components.map(c => c.label),
          datasets: [{
            data: components.map(c => b[c.key]),
            backgroundColor: components.map(c => c.color),
            borderWidth: 2,
            borderColor: 'rgba(255,255,255,0.3)'
          }]
        },
        options: { cutout: '60%', plugins: { legend: { display: false } }, animation: { duration: 600 } }
      });

      const panel = document.getElementById('detail-panel');
      panel.style.display = 'block';
      requestAnimationFrame(() => panel.classList.add('visible'));
    }

    function closeDetail() {
      const panel = document.getElementById('detail-panel');
      panel.classList.remove('visible');
      setTimeout(() => { panel.style.display = 'none'; }, 350);
    }

    // ── MindAR target events ───────────────────────────────────────────────────
    const hint = document.getElementById('scan-hint');
    document.getElementById('model-target').addEventListener('targetFound', () => {
      hint.style.opacity = '0';
    });
    document.getElementById('model-target').addEventListener('targetLost', () => {
      hint.style.opacity = '1';
    });
  </script>
</body>
</html>
