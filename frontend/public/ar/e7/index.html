<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>E7 AR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100dvh; overflow: hidden; font-family: -apple-system, sans-serif; }

    #back-btn {
      position: fixed; top: 16px; left: 16px; z-index: 1000;
      background: rgba(0,0,0,0.55); color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 9px 14px; font-size: 11px; letter-spacing: 0.1em;
      cursor: pointer; border-radius: 4px; text-decoration: none;
      display: block; width: 100px; text-align: center;
    }
    #scan-hint {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      z-index: 1000; background: rgba(0,0,0,0.55); color: #fff;
      padding: 11px 18px; font-size: 11px; letter-spacing: 0.1em;
      border-radius: 4px; pointer-events: none; transition: opacity 0.4s; white-space: nowrap;
    }

    /* ── Chart panel ── */
    #chart-panel {
      position: fixed; top: 12px; right: 12px; z-index: 999;
      width: 220px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.35); border-radius: 10px; padding: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      opacity: 0; transform: translateX(16px);
      transition: opacity 0.35s ease, transform 0.35s ease; pointer-events: none;
    }
    #chart-panel.visible { opacity: 1; transform: translateX(0); pointer-events: auto; }
    #chart-building-name { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #111; margin-bottom: 2px; }
    #chart-subtitle { font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; color: #555; margin-bottom: 10px; }
    #chart-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    #chart-container { position: relative; width: 95px; height: 95px; flex-shrink: 0; }
    .legend { display: flex; flex-direction: column; gap: 7px; flex: 1; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { font-size: 9px; color: #333; flex: 1; }
    .legend-value { font-size: 9px; font-weight: 600; color: #111; }
    .divider { height: 1px; background: rgba(0,0,0,0.12); margin: 8px 0; }
    #total-row { display: flex; justify-content: space-between; align-items: center; }
    #total-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; color: #555; }
    #total-value { font-size: 11px; font-weight: 700; color: #111; }


    #maps-panel {
      position: fixed; bottom: 16px; right: 16px; z-index: 1000;
      width: 180px; border-radius: 12px; overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.25);
      display: none; opacity: 0; transform: translateY(8px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      -webkit-tap-highlight-color: transparent; text-decoration: none;
    }
    #maps-panel.visible { opacity: 1; transform: translateY(0); }
    #maps-panel-img-wrap { position: relative; }
    #maps-panel-img-wrap img { display: block; width: 100%; height: auto; }
    #maps-panel-top {
      position: absolute; top: 8px; left: 8px;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);
      border-radius: 6px; padding: 4px 8px;
      font-size: 12px; font-weight: 800; color: #fff; letter-spacing: 0.06em;
    }
    #maps-panel-bottom {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.72));
      padding: 18px 10px 10px;
    }
    #maps-panel-addr-lbl { font-size: 9px; color: rgba(255,255,255,0.75); line-height: 1.4; margin-bottom: 5px; }
    #maps-panel-cta {
      display: flex; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 700; color: #4fc3f7; letter-spacing: 0.04em;
    }

    #thermal-btn {
      position: fixed; top: 58px; left: 16px; z-index: 1000;
      width: 100px; text-align: center;
      background: rgba(0,0,0,0.55); color: #00e0a0;
      border: 1px solid rgba(0,224,160,0.4);
      padding: 9px 14px; font-size: 11px; letter-spacing: 0.1em;
      cursor: pointer; border-radius: 4px; font-family: -apple-system, sans-serif;
    }
    #thermal-btn.active {
      background: #00e0a0; color: #000;
      border-color: #00e0a0;
      box-shadow: 0 0 12px rgba(0,224,160,0.7);
    }

    #orient-btn {
      position: fixed; top: 100px; left: 16px; z-index: 1000;
      width: 100px; text-align: center;
      background: rgba(0,0,0,0.55); color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 9px 14px; font-size: 11px; letter-spacing: 0.1em;
      cursor: pointer; border-radius: 4px; font-family: -apple-system, sans-serif;
      display: none; /* hidden by default, shown on phone only */
    }
    #orient-btn.active {
      background: rgba(255,255,255,0.18); color: #fff;
      border-color: rgba(255,255,255,0.6);
    }
    @media (max-width: 768px) {
      #orient-btn { display: block; }
    }

    /* ── Landscape layout ──
       Phone held landscape CW: portrait bottom-left → landscape top-right,
       portrait bottom-right → landscape bottom-right.
       rotate(90deg) around center makes text readable in landscape. ── */
    body.landscape #chart-panel {
      top: auto; bottom: 12px;
      right: 12px; left: auto;
      width: 260px;
      transform-origin: center;
      transform: rotate(90deg);
      transition: opacity 0.35s ease;
      opacity: 0; pointer-events: none;
    }
    body.landscape #chart-panel.visible {
      opacity: 1; transform: rotate(90deg); pointer-events: auto;
    }

    body.landscape #maps-panel {
      bottom: 12px; top: auto;
      left: 12px; right: auto;
      width: 180px; height: auto;
      transform-origin: center;
      transform: rotate(90deg);
      transition: opacity 0.3s ease;
    }
    body.landscape #maps-panel.visible {
      opacity: 1; transform: rotate(90deg);
    }
  </style>

  <script>
    const DETAILS = {
      equipment: {
        label: 'Equipment', value: '45 kWh/m²/yr', pct: 39, color: '#F5A623',
        desc: 'Research-grade lab instruments, computers, and fabrication machinery drive equipment loads. Scheduled power-down policies and smart metering per lab reduce idle consumption significantly.'
      },
      cooling: {
        label: 'Cooling', value: '51 kWh/m²/yr', pct: 44, color: '#4A90D9',
        desc: 'Central chilled water plant serves design studios and workshops. Variable air volume systems with CO₂-based demand control ventilation keep cooling efficient even at high occupancy.'
      },
      lighting: {
        label: 'Lighting', value: '20 kWh/m²/yr', pct: 17, color: '#7ED321',
        desc: 'Full LED luminaires with occupancy and daylight sensors. Glazed facades and light shelves channel natural light deep into studios, reducing daytime artificial lighting by up to 40%.'
      }
    };

    const BUILDING_ENERGY = { total: 116, components: [
      { label: 'Cooling',   value: 51, color: '#4A90D9' },
      { label: 'Equipment', value: 45, color: '#F5A623' },
      { label: 'Lighting',  value: 20, color: '#7ED321' },
    ]};

    const chartPanel  = document.getElementById('chart-panel');
    const scanHint    = document.getElementById('scan-hint');
    const mapsPanel   = document.getElementById('maps-panel');
    let chartInstance = null;
    let foundTargets  = new Set();
    let mapsHideTimer = null;

    // ── Chart ────────────────────────────────────────────────────────────
    function showChart() {
      if (!chartInstance) {
        const { components, total } = BUILDING_ENERGY;
        document.getElementById('total-value').textContent = total + ' kWh/m²/yr';
        const legend = document.getElementById('legend');
        legend.innerHTML = '';
        components.forEach(c => {
          legend.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${c.color}"></div><span class="legend-label">${c.label}</span><span class="legend-value">${c.value} kWh</span></div>`;
        });
        const ctx = document.getElementById('energy-chart').getContext('2d');
        chartInstance = new Chart(ctx, {
          type: 'doughnut',
          data: { labels: components.map(c=>c.label), datasets: [{ data: components.map(c=>c.value), backgroundColor: components.map(c=>c.color), borderWidth: 2, borderColor: 'rgba(255,255,255,0.3)' }] },
          options: { cutout: '60%', plugins: { legend: { display: false } }, animation: { duration: 600 } }
        });
      }
      chartPanel.classList.add('visible');
      scanHint.style.opacity = '0';
      if (mapsHideTimer) { clearTimeout(mapsHideTimer); mapsHideTimer = null; }
      mapsPanel.style.display = 'block';
      requestAnimationFrame(() => mapsPanel.classList.add('visible'));
    }

    function hideUI() {
      if (foundTargets.size > 0) return;
      chartPanel.classList.remove('visible');
      closeArDetail();
      scanHint.style.opacity = '1';
      mapsPanel.classList.remove('visible');
      mapsHideTimer = setTimeout(() => { mapsPanel.style.display = 'none'; mapsHideTimer = null; }, 300);
    }

    // ── HTML label overlay — projects 3D marker world pos → screen px ───
    const sceneEl = document.querySelector('a-scene');
    const _arVec = new THREE.Vector3();
    const arTaps = [];

    function arScreenPos(entity) {
      entity.object3D.getWorldPosition(_arVec);
      _arVec.project(sceneEl.camera);
      const r = sceneEl.canvas.getBoundingClientRect();
      return { x: (_arVec.x + 1) / 2 * r.width + r.left,
               y: (-_arVec.y + 1) / 2 * r.height + r.top };
    }

    function dispatchArTap(cx, cy) {
      for (const t of arTaps) {
        if (!t.entity || !t.entity.object3D) continue;
        const sp = arScreenPos(t.entity);
        const dx = cx - sp.x, dy = cy - sp.y;
        if (Math.sqrt(dx * dx + dy * dy) < t.radius) { t.fn(); return; }
      }
    }

    let _lastTouch = 0;
    document.addEventListener('touchend', e => {
      _lastTouch = Date.now();
      const t = e.changedTouches[0];
      dispatchArTap(t.clientX, t.clientY);
    });
    document.addEventListener('click', e => {
      if (Date.now() - _lastTouch < 500) return;
      dispatchArTap(e.clientX, e.clientY);
    });

    // ── Thermal camera mode ──────────────────────────────────────────────
    const BUILDING_COLORS = [
      { h: 73, s: 0.75, v: 0.78, temp: 0.85 }, // E7 — chartreuse #ADD129, unique h:72 gap
    ];

    function matchBuilding(h, s, v) {
      // E7 chartreuse: hue ~73°, no other building within 40° of this range
      if (s < 0.45 || s > 0.88 || v < 0.40) return null;
      for (const b of BUILDING_COLORS) {
        const dh = Math.min(Math.abs(h - b.h), 360 - Math.abs(h - b.h));
        if (dh <= 14) return b;
      }
      return null;
    }

    function rgbToHsv(r, g, b) {
      const rr = r / 255, gg = g / 255, bb = b / 255;
      const max = Math.max(rr, gg, bb), min = Math.min(rr, gg, bb), d = max - min;
      const s = max === 0 ? 0 : d / max;
      let h = 0;
      if (d !== 0) {
        if (max === rr)      h = ((gg - bb) / d % 6 + 6) % 6;
        else if (max === gg) h = (bb - rr) / d + 2;
        else                 h = (rr - gg) / d + 4;
        h *= 60;
      }
      return [h, s, max];
    }

    function jetColor(t) {
      const b = 0.45 + t * 0.55;
      return [Math.round(0 * b), Math.round(224 * b), Math.round(160 * b)];
    }

    let THERMAL_W = 640, THERMAL_H = 480;
    let T_X0, T_X1, T_Y0, T_Y1;
    let thermalActive = false;
    let thermalVideo = null;
    let thermalAnimId = null;
    let thermalCanvas = null;
    let thermalCtx = null;
    let arCanvas = null;

    function thermalLoop() {
      if (!thermalActive || !thermalVideo || !thermalCanvas) return;
      if (thermalVideo.readyState >= 2) {
        const vw = thermalVideo.videoWidth || THERMAL_W, vh = thermalVideo.videoHeight || THERMAL_H;
        const cvScale = Math.max(THERMAL_W / vw, THERMAL_H / vh);
        const csw = THERMAL_W / cvScale, csh = THERMAL_H / cvScale;
        thermalCtx.drawImage(thermalVideo, (vw - csw) / 2, (vh - csh) / 2, csw, csh, 0, 0, THERMAL_W, THERMAL_H);
        const img = thermalCtx.getImageData(0, 0, THERMAL_W, THERMAL_H);
        const d = img.data;

        let minY = THERMAL_H, maxY = 0;
        for (let i = 0; i < d.length; i += 4) {
          const px = (i >> 2) % THERMAL_W, py = Math.floor((i >> 2) / THERMAL_W);
          if (px < T_X0 || px >= T_X1 || py < T_Y0 || py >= T_Y1) continue;
          const [h, s, v] = rgbToHsv(d[i], d[i+1], d[i+2]);
          if (matchBuilding(h, s, v)) { if (py < minY) minY = py; if (py > maxY) maxY = py; }
        }
        const buildingH = minY <= maxY ? maxY - minY : 0;
        const useMinY = Math.max(0, minY - Math.round(buildingH * 0.18));
        const useMaxY = minY <= maxY ? maxY : THERMAL_H;
        const yRange = Math.max(useMaxY - useMinY, 1);

        for (let i = 0; i < d.length; i += 4) {
          const px = (i >> 2) % THERMAL_W, py = Math.floor((i >> 2) / THERMAL_W);
          d[i+3] = 0;
          if (px < T_X0 || px >= T_X1 || py < T_Y0 || py >= T_Y1) continue;
          const [h, s, v] = rgbToHsv(d[i], d[i+1], d[i+2]);
          if (matchBuilding(h, s, v)) {
            const lum = (d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114) / 255;
            const yNorm = (py - useMinY) / yRange;
            const posTemp = 0.90 - yNorm * 0.82;
            const temp = Math.max(0, Math.min(1, lum));
            const [tr, tg, tb] = jetColor(temp);
            d[i] = tr; d[i+1] = tg; d[i+2] = tb; d[i+3] = 255;
          }
        }
        thermalCtx.putImageData(img, 0, 0);
      }
      thermalAnimId = requestAnimationFrame(thermalLoop);
    }

    function setupThermalCanvas() {
      if (thermalCanvas) return true;
      thermalVideo = document.querySelector('video');
      if (!thermalVideo || !arCanvas) return false;
      const aframeCanvas = arCanvas;
      THERMAL_W = window.innerWidth;
      THERMAL_H = window.innerHeight;
      T_X0 = Math.round(THERMAL_W * 0.05); T_X1 = Math.round(THERMAL_W * 0.95);
      T_Y0 = Math.round(THERMAL_H * 0.02); T_Y1 = Math.round(THERMAL_H * 0.78);
      thermalCanvas = document.createElement('canvas');
      thermalCanvas.width = THERMAL_W;
      thermalCanvas.height = THERMAL_H;
      thermalCanvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;display:none;pointer-events:none;';
      aframeCanvas.parentNode.insertBefore(thermalCanvas, aframeCanvas);
      thermalCtx = thermalCanvas.getContext('2d', { willReadFrequently: true });
      return true;
    }

    function enableThermal() {
      if (!setupThermalCanvas()) { console.warn('Thermal: video or canvas not ready yet'); return; }
      thermalActive = true;
      thermalCanvas.style.display = 'block';
      document.getElementById('thermal-btn').classList.add('active');
      thermalAnimId = requestAnimationFrame(thermalLoop);
    }

    function disableThermal() {
      thermalActive = false;
      if (thermalCanvas) thermalCanvas.style.display = 'none';
      document.getElementById('thermal-btn').classList.remove('active');
      if (thermalAnimId) { cancelAnimationFrame(thermalAnimId); thermalAnimId = null; }
    }

    function toggleThermal() {
      if (thermalActive) disableThermal(); else enableThermal();
    }

    let isLandscape = false;
    function toggleOrient() {
      isLandscape = !isLandscape;
      document.body.classList.toggle('landscape', isLandscape);
      const btn = document.getElementById('orient-btn');
      btn.textContent = isLandscape ? '⇄ PORTRAIT' : '⇄ LANDSCAPE';
      btn.classList.toggle('active', isLandscape);
    }

    // ── Audio narration ──────────────────────────────────────────────────
    const AUDIO_TEXT = `E7, the Engineering Design Innovation Centre, is NUS's hub for interdisciplinary engineering and design. ` +
      `Completed in 2017, the building houses design studios, fabrication labs, and collaborative maker spaces spanning seven floors. ` +
      `Its energy strategy focuses on efficient cooling of high-density lab spaces, smart occupancy-based lighting control, ` +
      `and equipment scheduling to reduce standby loads from research instrumentation. ` +
      `With a total energy use intensity of 116 kilowatt-hours per square metre per year, ` +
      `E7 benchmarks well against comparable research and innovation facilities in the tropics.`;

    function pickFemaleVoice() {
      const voices = window.speechSynthesis.getVoices();
      return voices.find(v => /samantha|victoria|karen|moira|tessa|fiona|zira|google uk english female|google us english/i.test(v.name))
          || voices.find(v => v.lang.startsWith('en') && /female/i.test(v.name))
          || voices.find(v => v.lang.startsWith('en'))
          || voices[0] || null;
    }

    let speakerEl = null;
    const captionEls = [], captionTxts = [];
    let typewriterTimer = null;

    function hideCaption() {
      if (captionEls[activeTarget]) captionEls[activeTarget].setAttribute('visible', 'false');
      if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer = null; }
    }

    function makeCaption(targetEl, idx) {
      const WRAP = 36, LINE_H = 0.038, PAD = 0.04;

      function countLines(text) {
        let lines = 1, col = 0;
        for (const w of text.split(' ')) {
          if (col > 0 && col + 1 + w.length > WRAP) { lines++; col = w.length; }
          else { col += (col ? 1 : 0) + w.length; }
        }
        return lines;
      }
      const boxH = +((countLines(AUDIO_TEXT) * LINE_H + PAD * 2) * (4 / 6)).toFixed(3);

      const el = document.createElement('a-entity');
      el.setAttribute('position', '-0.88 0.325 0.02');
      el.setAttribute('visible', 'false');

      const bg = document.createElement('a-plane');
      bg.setAttribute('width', '0.52');
      bg.setAttribute('height', String(boxH));
      bg.setAttribute('material', 'color: #000000; opacity: 0.9; shader: flat; side: double');
      el.appendChild(bg);

      const txt = document.createElement('a-text');
      txt.setAttribute('value', '');
      txt.setAttribute('width', '0.46');
      txt.setAttribute('color', '#ffffff');
      txt.setAttribute('align', 'center');
      txt.setAttribute('baseline', 'top');
      txt.setAttribute('position', `0 ${+(boxH / 2 - PAD).toFixed(3)} 0.002`);
      txt.setAttribute('wrap-count', String(WRAP));
      el.appendChild(txt);

      targetEl.appendChild(el);
      captionEls[idx] = el;
      captionTxts[idx] = txt;
    }

    function startTypewriter(utter) {
      const words = AUDIO_TEXT.split(' ');
      let wordIdx = 0;
      let usedBoundary = false;
      const txt = captionTxts[activeTarget];

      txt.setAttribute('value', '');

      utter.onboundary = evt => {
        if (evt.name !== 'word') return;
        usedBoundary = true;
        if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer = null; }
        const end = evt.charIndex + (evt.charLength || 1);
        txt.setAttribute('value', AUDIO_TEXT.substring(0, end));
      };

      typewriterTimer = setInterval(() => {
        if (usedBoundary) { clearInterval(typewriterTimer); typewriterTimer = null; return; }
        if (wordIdx >= words.length) { clearInterval(typewriterTimer); typewriterTimer = null; return; }
        wordIdx++;
        txt.setAttribute('value', words.slice(0, wordIdx).join(' '));
      }, 390);
    }

    function toggleAudio() {
      if (window.speechSynthesis.speaking) {
        window.speechSynthesis.cancel();
        hideCaption(); return;
      }
      const utter = new SpeechSynthesisUtterance(AUDIO_TEXT);
      utter.rate = 0.95;
      const trySpeak = () => {
        const v = pickFemaleVoice();
        if (v) utter.voice = v;
        utter.onend = utter.onerror = hideCaption;
        if (captionEls[activeTarget]) captionEls[activeTarget].setAttribute('visible', 'true');
        startTypewriter(utter);
        window.speechSynthesis.speak(utter);
      };
      if (window.speechSynthesis.getVoices().length) { trySpeak(); }
      else { window.speechSynthesis.onvoiceschanged = trySpeak; }
    }

    function makeSpeakerFor(targetEl) {
      speakerEl = document.createElement('a-entity');
      speakerEl.setAttribute('position', '-0.52 0.325 0.02');

      const model = document.createElement('a-gltf-model');
      model.setAttribute('src', '/ar/volume.glb');
      model.setAttribute('scale', '0.083 0.083 0.083');
      speakerEl.appendChild(model);

      const label = document.createElement('a-text');
      label.setAttribute('value', "listen to building's detail");
      label.setAttribute('align', 'center');
      label.setAttribute('color', '#000000');
      label.setAttribute('position', '0 -0.08 0.001');
      label.setAttribute('width', '0.5');
      speakerEl.appendChild(label);

      targetEl.appendChild(speakerEl);
      arTaps.push({ entity: speakerEl, radius: 70, fn: toggleAudio });
    }

    // ── AR label cards + detail panel ────────────────────────────────────
    let activeTarget = -1;
    const arDetailEls = [], arDetailTitleEls = [], arDetailValueEls = [];
    const arDetailDescEls = [], arDetailBarEls = [], arDetailPctEls = [], arDetailAccentEls = [];

    const AR_LABEL_DEFS = [
      { key: 'equipment', pos: '-0.55 -0.25 0.03', color: '#F5A623' },
      { key: 'cooling',   pos: ' 0.00 -0.25 0.03', color: '#4A90D9' },
      { key: 'lighting',  pos: ' 0.55 -0.25 0.03', color: '#7ED321' },
    ];

    function makeArLabels(targetEl) {
      AR_LABEL_DEFS.forEach(({ key, pos, color }) => {
        const d = DETAILS[key];
        const card = document.createElement('a-entity');
        card.setAttribute('position', pos);

        const bg = document.createElement('a-plane');
        bg.setAttribute('width', '0.26'); bg.setAttribute('height', '0.09');
        bg.setAttribute('material', 'color:#111111; opacity:0.88; shader:flat; side:double');
        card.appendChild(bg);

        const bar = document.createElement('a-box');
        bar.setAttribute('width', '0.007'); bar.setAttribute('height', '0.076'); bar.setAttribute('depth', '0.002');
        bar.setAttribute('position', '-0.119 0 0.001');
        bar.setAttribute('material', `color:${color}; shader:flat`);
        card.appendChild(bar);

        const title = document.createElement('a-text');
        title.setAttribute('value', d.label.toUpperCase());
        title.setAttribute('color', '#ffffff'); title.setAttribute('width', '0.21');
        title.setAttribute('align', 'center'); title.setAttribute('position', '0 0.018 0.002');
        title.setAttribute('wrap-count', '22');
        card.appendChild(title);

        const sub = document.createElement('a-text');
        sub.setAttribute('value', 'Tap for details');
        sub.setAttribute('color', '#aaaaaa'); sub.setAttribute('width', '0.17');
        sub.setAttribute('align', 'center'); sub.setAttribute('position', '0 -0.014 0.002');
        sub.setAttribute('wrap-count', '22');
        card.appendChild(sub);

        targetEl.appendChild(card);
        arTaps.push({ entity: card, radius: 65, fn: () => showArDetail(key) });
      });
    }

    function makeArDetail(targetEl, idx) {
      const detailEl = document.createElement('a-entity');
      detailEl.setAttribute('position', '0.08 0.04 0.06');
      detailEl.setAttribute('visible', 'false');

      const bg = document.createElement('a-plane');
      bg.setAttribute('width', '0.65'); bg.setAttribute('height', '0.38');
      bg.setAttribute('material', 'color:#0a0a12; opacity:0.95; shader:flat; side:double');
      detailEl.appendChild(bg);

      const accentEl = document.createElement('a-box');
      accentEl.setAttribute('width', '0.007'); accentEl.setAttribute('height', '0.36'); accentEl.setAttribute('depth', '0.002');
      accentEl.setAttribute('position', '-0.312 0 0.001');
      accentEl.setAttribute('material', 'color:#ffffff; shader:flat');
      detailEl.appendChild(accentEl);

      const titleEl = document.createElement('a-text');
      titleEl.setAttribute('color', '#ffffff'); titleEl.setAttribute('width', '0.54');
      titleEl.setAttribute('align', 'center'); titleEl.setAttribute('position', '0 0.155 0.002');
      titleEl.setAttribute('wrap-count', '28');
      detailEl.appendChild(titleEl);

      const valueEl = document.createElement('a-text');
      valueEl.setAttribute('color', '#aaaaaa'); valueEl.setAttribute('width', '0.44');
      valueEl.setAttribute('align', 'center'); valueEl.setAttribute('position', '0 0.112 0.002');
      valueEl.setAttribute('wrap-count', '28');
      detailEl.appendChild(valueEl);

      const descEl = document.createElement('a-text');
      descEl.setAttribute('color', '#cccccc'); descEl.setAttribute('width', '0.58');
      descEl.setAttribute('align', 'left'); descEl.setAttribute('baseline', 'top');
      descEl.setAttribute('align', 'center'); descEl.setAttribute('position', '0 0.072 0.002');
      descEl.setAttribute('wrap-count', '44');
      detailEl.appendChild(descEl);

      const barBg = document.createElement('a-box');
      barBg.setAttribute('width', '0.58'); barBg.setAttribute('height', '0.012'); barBg.setAttribute('depth', '0.001');
      barBg.setAttribute('position', '0.005 -0.135 0.002');
      barBg.setAttribute('material', 'color:#333333; shader:flat');
      detailEl.appendChild(barBg);

      const barEl = document.createElement('a-box');
      barEl.setAttribute('height', '0.012'); barEl.setAttribute('depth', '0.002');
      barEl.setAttribute('material', 'color:#ffffff; shader:flat');
      detailEl.appendChild(barEl);

      const pctEl = document.createElement('a-text');
      pctEl.setAttribute('color', '#888888'); pctEl.setAttribute('width', '0.5');
      pctEl.setAttribute('align', 'center'); pctEl.setAttribute('position', '0 -0.155 0.002');
      pctEl.setAttribute('wrap-count', '36');
      detailEl.appendChild(pctEl);

      const closeBtn = document.createElement('a-entity');
      closeBtn.setAttribute('position', '0.292 0.162 0.003');
      const closeBg = document.createElement('a-circle');
      closeBg.setAttribute('radius', '0.024'); closeBg.setAttribute('material', 'color:#333333; shader:flat');
      closeBtn.appendChild(closeBg);
      const closeTxt = document.createElement('a-text');
      closeTxt.setAttribute('value', 'X'); closeTxt.setAttribute('color', '#ffffff');
      closeTxt.setAttribute('align', 'center'); closeTxt.setAttribute('baseline', 'center');
      closeTxt.setAttribute('position', '0 0 0.001'); closeTxt.setAttribute('width', '0.12');
      closeBtn.appendChild(closeTxt);
      detailEl.appendChild(closeBtn);

      targetEl.appendChild(detailEl);
      arDetailEls[idx] = detailEl;
      arDetailTitleEls[idx] = titleEl;
      arDetailValueEls[idx] = valueEl;
      arDetailDescEls[idx] = descEl;
      arDetailBarEls[idx] = barEl;
      arDetailPctEls[idx] = pctEl;
      arDetailAccentEls[idx] = accentEl;
      arTaps.push({ entity: closeBtn, radius: 55, fn: closeArDetail });
    }

    function showArDetail(key) {
      const i = activeTarget;
      if (i < 0 || !arDetailEls[i]) return;
      const d = DETAILS[key];
      arDetailTitleEls[i].setAttribute('value', d.label.toUpperCase());
      arDetailValueEls[i].setAttribute('value', d.value);
      arDetailDescEls[i].setAttribute('value', d.desc);
      arDetailPctEls[i].setAttribute('value', `${d.pct}% of total energy use`);
      arDetailAccentEls[i].setAttribute('material', `color:${d.color}; shader:flat`);
      const barW = (d.pct / 100) * 0.58;
      arDetailBarEls[i].setAttribute('width', String(barW.toFixed(3)));
      arDetailBarEls[i].setAttribute('height', '0.012'); arDetailBarEls[i].setAttribute('depth', '0.002');
      arDetailBarEls[i].setAttribute('position', `${(-0.295 + barW / 2).toFixed(3)} -0.135 0.002`);
      arDetailBarEls[i].setAttribute('material', `color:${d.color}; shader:flat`);
      arDetailEls[i].setAttribute('visible', 'true');
    }

    function closeArDetail() {
      if (activeTarget >= 0 && arDetailEls[activeTarget]) {
        arDetailEls[activeTarget].setAttribute('visible', 'false');
      }
    }

    // ── MindAR wiring ────────────────────────────────────────────────────
    sceneEl.addEventListener('loaded', () => {
      document.querySelectorAll('[id^="target-"] a-box, [id^="target-"] a-sphere').forEach(el => el.remove());

      arCanvas = sceneEl.canvas;

      const PIN_Y = 0.27;
      const FRONT_TARGETS = new Set([0, 1, 2, 3]);

      function makePinFor(targetEl) {
        const pin = document.createElement('a-gltf-model');
        pin.setAttribute('src', '/ar/map_pin.glb');
        pin.setAttribute('scale', '0.167 0.167 0.167');
        pin.setAttribute('position', `0 ${PIN_Y} 0`);
        pin.setAttribute('animation', 'property: position; from: 0 ' + PIN_Y + ' 0; to: 0 ' + (PIN_Y + 0.06) + ' 0; dir: alternate; dur: 1600; loop: true; easing: easeInOutSine');
        targetEl.appendChild(pin);
      }

      for (let i = 0; i < 4; i++) {
        const el = document.getElementById(`target-${i}`);
        if (!el) continue;
        if (FRONT_TARGETS.has(i)) { makePinFor(el); }
        if (i === 0 || i === 1 || i === 3) { makeSpeakerFor(el); }
        makeCaption(el, i);
        makeArLabels(el);
        makeArDetail(el, i);
        el.addEventListener('targetFound', () => { foundTargets.add(i); activeTarget = i; showChart(); });
        el.addEventListener('targetLost',  () => { foundTargets.delete(i); hideUI(); });
      }
    });
  </script>
