<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dot Calibration</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 16px; gap: 12px; }
    h2 { font-size: 13px; letter-spacing: 0.1em; color: #aaa; }
    #wrap { position: relative; width: 100%; max-width: 420px; cursor: crosshair; }
    #wrap img { width: 100%; display: block; }
    .pin { position: absolute; width: 12px; height: 12px; background: #f5c518; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; box-shadow: 0 0 0 3px rgba(245,197,24,0.4); }
    .pin-label { position: absolute; background: rgba(0,0,0,0.85); color: #f5c518; font-size: 10px; padding: 2px 5px; border-radius: 2px; transform: translate(-50%, -180%); white-space: nowrap; pointer-events: none; }
    #log { width: 100%; max-width: 420px; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 12px; font-size: 12px; line-height: 1.8; color: #0f0; min-height: 80px; white-space: pre; overflow-x: auto; }
    #clear { background: #333; color: #fff; border: none; padding: 8px 18px; font-family: monospace; font-size: 12px; cursor: pointer; border-radius: 4px; }
    #clear:hover { background: #555; }
    p.hint { font-size: 11px; color: #666; }
  </style>
</head>
<body>
  <h2>ANNOTATION DOT CALIBRATOR</h2>
  <p class="hint">Click anywhere on the image — coordinates appear below</p>

  <div id="wrap">
    <img id="img" src="/demo-ar.png" alt="demo" />
  </div>

  <div id="log">// click the image to record positions</div>
  <button id="clear" onclick="clearPins()">CLEAR ALL</button>

  <script>
    const wrap = document.getElementById('wrap');
    const log  = document.getElementById('log');
    const pins = [];

    const LABELS = ['back','panel','desc','label','maps'];
    let count = 0;

    wrap.addEventListener('click', function(e) {
      const rect = wrap.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const pctLeft = ((x / rect.width)  * 100).toFixed(1);
      const pctTop  = ((y / rect.height) * 100).toFixed(1);

      const name = LABELS[count % LABELS.length] || ('dot' + count);
      count++;

      // draw pin
      const pin = document.createElement('div');
      pin.className = 'pin';
      pin.style.left = pctLeft + '%';
      pin.style.top  = pctTop  + '%';

      const lbl = document.createElement('div');
      lbl.className = 'pin-label';
      lbl.textContent = name;
      lbl.style.left = pctLeft + '%';
      lbl.style.top  = pctTop  + '%';

      wrap.appendChild(pin);
      wrap.appendChild(lbl);
      pins.push(pin, lbl);

      // update log
      const line = `{ id: '${name}', top: '${pctTop}%', left: '${pctLeft}%' },`;
      if (log.textContent.startsWith('//')) log.textContent = '';
      log.textContent += line + '\n';
    });

    function clearPins() {
      pins.forEach(p => p.remove());
      pins.length = 0;
      count = 0;
      log.textContent = '// click the image to record positions';
    }
  </script>
</body>
</html>
